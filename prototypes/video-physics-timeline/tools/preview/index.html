<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebM 軌跡預覽器</title>
  <style>
    :root { color-scheme: dark; --bg:#07111f; --panel:#101d30; --line:#31445f; --ink:#e9f2ff; --muted:#9db0c9; --accent:#4dd8f0; --warn:#ffd166; --bad:#ff718d; --ok:#77e0a0; }
    * { box-sizing:border-box; } body { margin:0; background:radial-gradient(circle at 10% 0%,#14365a,transparent 38rem),var(--bg); color:var(--ink); font:15px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; }
    button,input,select,textarea { font:inherit; } button,input,select,textarea { border:1px solid var(--line); border-radius:8px; background:#0a1525; color:var(--ink); } button { padding:8px 12px; cursor:pointer; font-weight:700; } button:hover { border-color:var(--accent); } button:disabled { cursor:not-allowed; opacity:.45; }
    input,select { width:100%; padding:7px 8px; } textarea { width:100%; min-height:190px; padding:10px; resize:vertical; font:12px/1.45 ui-monospace,Consolas,monospace; }
    .shell { width:min(1280px,100%); margin:auto; padding:24px clamp(14px,3vw,42px) 48px; } h1 { margin:0; letter-spacing:-.03em; } h2 { margin:0 0 12px; font-size:1rem; } p { margin:0; } .sub { margin-top:6px; color:var(--muted); }
    .notice { margin:18px 0; padding:10px 12px; border:1px solid var(--line); border-radius:9px; color:var(--muted); background:rgba(16,29,48,.78); } .notice.error { border-color:var(--bad); color:#ffd6df; background:rgba(105,18,42,.35); } .notice.ok { border-color:var(--ok); color:#c8ffe1; }
    .layout { display:grid; grid-template-columns:minmax(0,1fr) 310px; gap:18px; } .card { padding:16px; border:1px solid var(--line); border-radius:12px; background:rgba(16,29,48,.88); box-shadow:0 18px 42px rgba(0,0,0,.2); }
    canvas { display:block; width:100%; height:auto; border:1px solid var(--line); border-radius:10px; background:#06101c; touch-action:none; cursor:crosshair; } .legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:9px; color:var(--muted); font-size:.82rem; } .dot { display:inline-block; width:10px; height:10px; margin-right:5px; border-radius:50%; vertical-align:-1px; }
    .timeline { margin-top:16px; } .frame-readout { display:flex; justify-content:space-between; gap:12px; color:var(--muted); font:600 .84rem ui-monospace,Consolas,monospace; } .range-wrap { position:relative; margin:10px 0; padding:8px 0; } #frameRange { position:relative; z-index:2; margin:0; padding:0; accent-color:var(--accent); } .handoff-band,.trigger-mark { position:absolute; pointer-events:none; } .handoff-band { z-index:1; top:8px; height:16px; background:rgba(255,209,102,.25); border-radius:3px; } .trigger-mark { z-index:3; top:4px; width:2px; height:24px; background:var(--warn); } .buttons { display:flex; gap:8px; flex-wrap:wrap; } #playButton { background:var(--accent); color:#06202a; border-color:#7deafa; }
    .fields { display:grid; grid-template-columns:1fr 1fr; gap:11px; } .field { display:grid; gap:5px; } .field.full { grid-column:1 / -1; } label { color:var(--muted); font-size:.8rem; font-weight:700; } .unit { color:#758aa5; font-weight:400; } .help { margin-top:12px; color:var(--muted); font-size:.82rem; } .source-files { margin-top:10px; display:grid; gap:8px; } .source-files label { display:flex; align-items:center; justify-content:space-between; gap:8px; } .source-files input { max-width:172px; font-size:.75rem; }
    .output { margin-top:18px; } .output-head { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:8px; } .paste-area { margin-top:10px; } .paste-area textarea { min-height:110px; } .file-note { margin-top:10px; color:var(--muted); font-size:.8rem; }
    @media (max-width:860px) { .layout { grid-template-columns:1fr; } } @media (max-width:500px) { .fields { grid-template-columns:1fr; } .field.full { grid-column:auto; } .shell { padding-inline:12px; } }
  </style>
</head>
<body>
  <main class="shell">
    <header><h1>WebM 軌跡預覽器</h1><p class="sub">調整程序化影片球的參數；球點座標直接使用產生器的共用逐幀數學。</p></header>
    <p id="sourceStatus" class="notice" role="status">正在載入 timeline-config.json 與 render settings…</p>
    <p id="validationStatus" class="notice" hidden role="alert"></p>
    <div class="layout">
      <section class="card">
        <canvas id="previewCanvas" aria-label="可拖曳的球桌與發球軌跡預覽"></canvas>
        <div class="legend"><span><i class="dot" style="background:#4dd8f0"></i>完整軌跡</span><span><i class="dot" style="border:2px solid #fff;background:transparent"></i>起點（可拖曳）</span><span><i class="dot" style="background:#ffd166"></i>Anchor（可拖曳）</span></div>
        <div class="timeline">
          <div class="frame-readout"><span id="frameReadout">Frame —</span><span id="timeReadout">— s</span></div>
          <div class="range-wrap" id="rangeWrap"><span id="handoffBand" class="handoff-band"></span><span id="triggerMark" class="trigger-mark"></span><input id="frameRange" type="range" min="0" max="0" value="0" disabled aria-label="影片影格"></div>
          <div class="buttons"><button id="backButton" type="button" disabled>−1 frame</button><button id="playButton" type="button" disabled>播放</button><button id="nextButton" type="button" disabled>+1 frame</button></div>
        </div>
      </section>
      <aside class="card"><h2>參數控制</h2>
        <div class="fields">
          <div class="field full"><label for="serveSelect">Serve</label><select id="serveSelect" disabled></select></div>
          <div class="field"><label for="startX">start_uv.x</label><input id="startX" type="number" min="0" max="1" step="0.001" disabled></div>
          <div class="field"><label for="startY">start_uv.y</label><input id="startY" type="number" min="0" max="1" step="0.001" disabled></div>
          <div class="field"><label for="anchorX">anchor_uv.x</label><input id="anchorX" type="number" min="0" max="1" step="0.001" disabled></div>
          <div class="field"><label for="anchorY">anchor_uv.y</label><input id="anchorY" type="number" min="0" max="1" step="0.001" disabled></div>
          <div class="field"><label for="triggerTime">physics_trigger_time_sec <span class="unit" id="frameStep"></span></label><input id="triggerTime" type="number" min="0" disabled></div>
          <div class="field"><label for="durationTime">expected_duration_sec <span class="unit">frame-aligned</span></label><input id="durationTime" type="number" min="0" disabled></div>
          <div class="field full"><label for="handoffTime">handoff.duration_sec <span class="unit">(&gt; 0)</span></label><input id="handoffTime" type="number" min="0.0001" step="0.01" disabled></div>
        </div>
        <p class="help">直接拖曳畫布上的白色起點或黃色 anchor；數值與完整 JSON 會立即同步。</p>
        <div class="source-files"><label>手動載入 timeline JSON <input id="timelineFile" type="file" accept="application/json,.json"></label><label>手動載入 render settings <input id="settingsFile" type="file" accept="application/json,.json"></label></div>
      </aside>
    </div>
    <section class="card output"><div class="output-head"><h2>完整 timeline-config.json</h2><button id="copyButton" type="button" disabled>複製到剪貼簿</button></div><textarea id="outputJson" readonly aria-label="完整 timeline JSON 輸出"></textarea><p class="file-note">貼回設定檔後，執行 <code>node tools/generate-webm.mjs --force</code> 重新編譯。</p><div class="paste-area"><label for="importJson">貼上完整 JSON 後匯入</label><textarea id="importJson" placeholder="貼上 timeline-config.json…"></textarea><button id="importButton" type="button">載入貼上的 JSON</button></div></section>
  </main>
  <script type="module" src="./preview.js"></script>
</body>
</html>
