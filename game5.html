<!DOCTYPE html>
<html lang="zh-TW" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Game 5 · 技術＋方向判斷</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#f0f6fc;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;
  --red:#ff7b72;--yellow:#d29922;
}
*{box-sizing:border-box}
html,body{margin:0;height:100vh;height:100dvh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
body{display:grid;grid-template-rows:auto auto 1fr}
header{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);background:#0b1017}
h1{font-size:20px;margin:0}
.badge{color:var(--yellow);font-weight:800;font-size:13px}
.top-bar{display:flex;gap:8px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);background:#0b1017}
.top-bar select{flex:1;min-width:0;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:7px;padding:8px 9px;font-weight:800;font-size:13px}
.top-bar button{flex:0 0 auto;width:auto;padding:8px 14px;font-size:13px;white-space:nowrap}
main{display:grid;grid-template-columns:minmax(0,1fr) 320px;min-height:0}
.scene-wrap{position:relative;min-height:0;background:#05070a}
canvas{display:block;width:100%;height:100%;touch-action:manipulation}
.hud{position:absolute;left:12px;top:12px;display:grid;gap:8px;max-width:min(480px,calc(100% - 24px));pointer-events:none}
.hud-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pill{background:rgba(13,17,23,.85);border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.24)}
.pill.ok{border-color:rgba(63,185,80,.6);color:var(--green)}
.pill.bad{border-color:rgba(255,123,114,.65);color:var(--red)}
.pill.warn{border-color:rgba(210,153,34,.65);color:var(--yellow)}
.center-tip{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(13,17,23,.88);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-weight:800;color:var(--text);text-align:center;min-width:min(520px,calc(100% - 24px))}
.action-pad{position:absolute;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:9px;align-items:end}
.action-zone{display:grid;grid-template-rows:auto 1fr;gap:7px;min-height:108px;padding:8px;border:1px solid rgba(88,166,255,.34);border-radius:8px;background:rgba(13,17,23,.34);box-shadow:0 10px 26px rgba(0,0,0,.22);backdrop-filter:blur(2px)}
.action-zone.direction-zone{border-color:rgba(210,153,34,.4)}
.zone-label{font-size:12px;font-weight:900;color:rgba(240,246,252,.72);text-shadow:0 1px 2px rgba(0,0,0,.7)}
.zone-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;align-content:end}
.zone-actions button{min-height:58px;font-size:16px;background:rgba(33,38,45,.72);box-shadow:0 8px 18px rgba(0,0,0,.22)}
.zone-actions .technique-button{min-height:68px;padding:6px;background:rgba(13,17,23,.28);border-color:rgba(240,246,252,.18);overflow:hidden}
.zone-actions .technique-button:hover{background:rgba(13,17,23,.42)}
.zone-actions .technique-button.active{background:rgba(88,166,255,.18)}
.technique-button:disabled .technique-icon{opacity:.34;filter:grayscale(.25)}
.technique-icon{display:block;width:100%;height:44px;object-fit:contain;opacity:.78;filter:drop-shadow(0 7px 10px rgba(0,0,0,.42));transition:opacity .15s ease, transform .15s ease}
.technique-button:hover .technique-icon,.technique-button.active .technique-icon{opacity:1;transform:scale(1.03)}
.technique-button{display:flex;flex-direction:column;align-items:center;gap:2px}
.direction-button{font-size:22px;font-weight:900}
.direction-button.active{background:rgba(210,153,34,.24);border-color:rgba(210,153,34,.75);color:var(--yellow)}
.action-cue{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(.94);background:rgba(13,17,23,.72);border:1px solid rgba(240,246,252,.28);border-radius:12px;padding:14px 22px;font-size:20px;font-weight:900;color:var(--text);text-align:center;pointer-events:none;opacity:0;transition:opacity 160ms ease, transform 160ms ease;z-index:5;white-space:nowrap}
.action-cue.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
/* 方向 C 影片配置慣例：影片浮在畫面上方一塊固定比例區域，桌面場景全程可見，
   觸球後影片淡出、物理球接手（見 prototypes/video-physics-timeline/direction-c/）。 */
.video-frame{position:absolute;left:10%;top:4%;width:80%;height:38%;overflow:hidden;border:2px solid rgba(219,234,254,.55);border-radius:14px;background:#000;box-shadow:0 10px 26px rgba(0,0,0,.5);z-index:6;transition:opacity 240ms ease}
.video-frame video{width:100%;height:100%;object-fit:cover;display:block}
.video-frame.exiting{opacity:0}
.video-frame[hidden]{display:none}
aside{border-left:1px solid var(--border);background:var(--surface);min-height:0;overflow:auto}
.section{padding:12px;border-bottom:1px solid var(--border)}
h2{font-size:14px;margin:0 0 8px;color:var(--yellow)}
.list{display:grid;gap:7px}
button{width:100%;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:7px;padding:11px 12px;font-weight:900;font-size:15px;cursor:pointer}
button:hover{border-color:var(--blue)}
button.primary{background:var(--blue);color:#06101f;border-color:var(--blue)}
button.good{background:rgba(63,185,80,.18);border-color:rgba(63,185,80,.65)}
button.warn{background:rgba(210,153,34,.14);border-color:rgba(210,153,34,.65);color:var(--yellow)}
button.active{outline:2px solid var(--blue);background:rgba(88,166,255,.18)}
button:disabled{opacity:.45;cursor:not-allowed}
.tech-grid{display:grid;gap:8px}
.option-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:7px;background:rgba(13,17,23,.45);font-size:13px;font-weight:800;color:var(--text);cursor:pointer}
.option-row input{width:18px;height:18px;accent-color:var(--blue)}
.field-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:7px;background:rgba(13,17,23,.45)}
.field-row label{white-space:nowrap}
.field-row select{flex:1}
.serve-picker-row{align-items:stretch}
#serveSelect{min-width:0;width:100%;font-weight:900}
.meta{font-size:12px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
.result{font-size:16px;font-weight:900;line-height:1.45}
.result.ok{color:var(--green)}
.result.bad{color:var(--red)}
.small{font-size:12px;color:var(--muted)}
/* 手機版：正式遊玩畫面，全部塞進一個 viewport 高度，不需要捲動。側邊欄
   （測試／校準用的細部設定）整個隱藏，只留看球、影片、按鍵這些真的要玩才需要
   的東西。桌面版維持原本雙欄，側邊欄照舊可見（校準/研究用）。 */
@media (max-width: 820px){
  h1{font-size:16px}
  header{height:40px;padding:0 10px}
  .badge{display:none}
  .top-bar{padding:6px 8px;gap:6px}
  .top-bar select{font-size:12px;padding:7px 8px}
  .top-bar button{padding:7px 10px;font-size:12px}
  main{grid-template-columns:1fr}
  aside{display:none}
  .center-tip{bottom:8px;min-width:calc(100% - 16px);font-size:12px;padding:8px 10px}
  .hud{left:8px;top:8px;gap:5px}
  .pill{padding:5px 7px;font-size:11px}
  .video-frame{left:6%;top:3%;width:88%;height:34%}
  .action-pad{left:6px;right:6px;bottom:6px;gap:6px}
  .action-zone{min-height:88px;padding:6px}
  .zone-actions button{min-height:46px;font-size:13px;padding:6px}
  .zone-actions .technique-button{min-height:54px;padding:4px}
  .technique-icon{height:40px}
  .direction-button{font-size:18px}
  .action-cue{font-size:16px;padding:10px 16px;top:40%}
}
</style>
</head>
<body translate="no" class="notranslate">
<header>
  <h1>Game 5 · 技術＋方向判斷</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="badge">Serve → Direction + Technique → Return</div>
    <div id="buildVersion" style="font-size:11px;color:#555;font-family:monospace" title="build version">-----</div>
  </div>
</header>
<div class="top-bar">
  <select id="serveSelect"></select>
  <button id="playBtn" class="primary">開始發球</button>
  <button id="nextBtn">下一球</button>
</div>
<main>
  <section class="scene-wrap">
    <canvas id="scene"></canvas>
    <div class="hud">
      <div class="hud-row">
        <div class="pill" id="serveName">載入中</div>
        <div class="pill" id="phaseText">準備</div>
      </div>
      <div class="hud-row">
        <div class="pill" id="choiceText">尚未選擇</div>
        <div class="pill" id="scoreText">成功 0 / 失分 0</div>
      </div>
    </div>
    <div class="video-frame" id="videoFrame" hidden>
      <video id="serveVideo" playsinline muted preload="metadata"></video>
    </div>
    <div class="action-pad" id="actionPad">
      <div class="action-zone direction-zone">
        <div class="zone-label">方向判斷（側旋修正，選填）</div>
        <div class="zone-actions direction-actions">
          <button class="direction-button" type="button" data-direction="left" title="判斷來球側旋需要向左修正" aria-label="向左修正">← 左</button>
          <button class="direction-button" type="button" data-direction="right" title="判斷來球側旋需要向右修正" aria-label="向右修正">右 →</button>
        </div>
      </div>
      <div class="action-zone technique-zone">
        <div class="zone-label">回擊技術</div>
        <div class="zone-actions">
          <button class="technique-button" type="button" data-return-technique="push" title="切球" aria-label="切球"><img class="technique-icon" src="images/techniques/cut.png" alt="">切球</button>
          <button class="technique-button" type="button" data-return-technique="attack" title="平推/攻球" aria-label="平推攻球"><img class="technique-icon" src="images/techniques/attack.png" alt="">平推/攻球</button>
        </div>
      </div>
    </div>
    <div class="action-cue" id="actionCue"></div>
    <div class="center-tip" id="centerTip">讀取 physics-presets.json...</div>
  </section>
  <aside>
    <div class="section">
      <h2>發球 Preset</h2>
      <div id="serveCount" class="small"></div>
    </div>
    <div class="section">
      <h2>回擊技術</h2>
      <div class="small">球停在可回擊點時，先判斷側旋方向（可不選），再按技術鍵即時回擊。方向鍵是固定補償量，不是每球都要按——沒有側旋的球按了方向鍵反而會出界。</div>
    </div>
    <div class="section" id="controlsSection">
      <h2>操作（測試／校準用，正式遊玩不需要）</h2>
      <div class="list">
        <label class="option-row">
          <input id="trajectoryToggle" type="checkbox">
          <span>顯示軌跡</span>
        </label>
        <div class="field-row" id="speedRow">
          <label for="speedControl" style="font-size:12px;font-weight:800;color:var(--muted)">遊戲速度</label>
          <select id="speedControl">
            <option value="0.25">0.25x（很慢，測試回擊用）</option>
            <option value="0.5">0.5x（慢）</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x（正常）</option>
            <option value="1.5">1.5x（快）</option>
            <option value="2">2x（很快）</option>
          </select>
        </div>
        <div class="field-row" id="difficultyRow">
          <label for="difficultyControl" style="font-size:12px;font-weight:800;color:var(--muted)">難度</label>
          <select id="difficultyControl">
            <option value="beginner" selected>beginner（全提示）</option>
            <option value="practice">practice（只閃最高點）</option>
            <option value="match">match（關閉提示）</option>
          </select>
        </div>
        <div class="field-row" id="autoTimingRow">
          <label style="font-size:12px;font-weight:800;color:var(--muted)">
            <input type="checkbox" id="autoTimingToggle" />
            自動最佳時機回擊（測試用）
          </label>
          <select id="autoTimingTechnique">
            <option value="forehand:push" selected>正手切球</option>
            <option value="backhand:push">反手切球</option>
            <option value="forehand:forehand_attack">正手攻球</option>
            <option value="backhand:backhand_attack">反手攻球</option>
          </select>
        </div>
        <div class="field-row" id="rangeSolutionRow">
          <label style="font-size:12px;font-weight:800;color:var(--muted)">
            <input type="checkbox" id="rangeSolutionToggle" />
            範圍解模式（呈現動作多樣性，非套招）
          </label>
        </div>
      </div>
    </div>
    <div class="section">
      <h2>判定</h2>
      <div id="resultText" class="result">尚未開始</div>
      <div id="detailText" class="meta" style="margin-top:8px"></div>
    </div>
  </aside>
</main>

<script src="vendor/three.r128.min.js"></script>
<script src="shared-physics-core.js"></script>
<script src="prototypes/video-physics-timeline/direction-c/direction-c-engine.js"></script>
<script>
const BALL_RENDER_RADIUS = 0.022;
const DT = 1 / 120;
const MAX_STEPS = 520;
const BALL_COLORS = {default:0xffd84d, rising:0x4488ff, sideRising:0x66bbff, apex:0xffffff, falling:0xef9f27};
const TIMING_HINT = {threshold:0.05, flashMs:100, sideRisingHoldMs:220};
const MISS_Y = TABLE.top - BALL_RADIUS;
const BUILD_VERSION = 'v9j21';
// ── 物理引擎 v2：真實觸桌接觸力學（docs/physics-engine-v2-plan.md Phase 1-4）──
// 逐字對齊 tools/physics-v2-contact-mechanics.js，取代舊的 BOUNCE_PHYSICS/applyBounceSpin。      // kg，ITTF 2.7g // 薄殼球轉動慣量係數：I = ALPHA * M * R²
// 回擊：球拍接觸力學（Phase 6，docs/physics-engine-v2-plan.md）。
// 攻球/切球改用跟球對桌面同一套接觸力學（bounceOffPlane，見上方），球拍視為
// 一個有自己法向量、自己揮拍速度的「移動中的平面」。球拍材質（膠皮/底板）
// 目前先用一組共用的合理預設值，之後要做不同膠皮/底板時，只需要覆寫
// PADDLE_RESTITUTION_LOW/HIGH / PADDLE_FRICTION 這幾個常數，不用動接觸力學本身。
// 拍面法向反彈係數：文獻顯示會隨撞擊速度線性下降（低速~2m/s 約 0.9，高速~12m/s 約 0.75，
// 差異可達 0.15），不是固定值，見 dynamicPaddleEpsilon()。
const PADDLE_RESTITUTION_LOW = 0.9;   // 低速（~2m/s）反彈係數上限
const PADDLE_RESTITUTION_HIGH = 0.75; // 高速（~12m/s）反彈係數下限
const PADDLE_SPEED_LOW = 2.0;
const PADDLE_SPEED_HIGH = 12.0;
const PADDLE_FRICTION = 0.4;        // 拍面切向摩擦係數，工程估計值（無精確文獻，之後可依膠皮種類覆寫）
// ── Stage 4a 切球接觸模型（2026-07-14 從 return-studio.html 移植）────────────
// 逐字對齊 return-studio.html：切球改用彈簧-阻尼子步進積分（球陷入海綿壓縮→
// 釋放的真實動態過程），取代簡單瞬時碰撞；反彈方向不是純剛體拍面法向量，是
// 法向量跟「球實際接近方向反方向」的 Y-Z-only 混合（PADDLE_BLEND），取代原本
// computeAdaptivePushTiltX() 的手動回歸公式（EXPERIMENT_LOG.md EXP-037「移除
// tiltX hack，blend 改 y-z 平面」，architecture 已在 return-studio.html 驗證過，
// 這次寫回 game4.html，對應 OPEN_ITEMS.md TODO-001/TODO-007）。攻球等其他技術
// 維持原本的瞬時碰撞公式，不受影響。詳細物理推導見 return-studio.html 同名常數
// /函式的註解，這裡不重複。
const PADDLE_BLEND = 0.605;
const PADDLE_SPRING_K = BALL_MASS * (Math.PI / 0.005) ** 2;
const PADDLE_DAMPING_RATIO = 0.0421;
const BLADE_NODE_MASS = BALL_MASS * 0.15;
const BLADE_SPRING_K = BLADE_NODE_MASS * (Math.PI / 0.0008) ** 2;
const BLADE_DAMPING_RATIO = 0.03;
const TANGENT_KP = 1.0;
// vel/spin/planeVel 都是模擬尺度，bounceOffPlaneSubstepped 內部轉真實 m/s 計算
// （乘 SIM_TIME_DILATION，結尾除回去）。
const SIM_TIME_DILATION = Math.sqrt(9.8 / 4.2);
// 切球觸球瞬間手腕「自然減速」的速率，0=接觸期間等速（逐字對齊 return-studio.html
// 目前的部署值）。
const PUSH_WRIST_BRAKE_RATE = 0;
function restitutionToDampingRatio(e){
  const L = Math.log(e);
  return -L / Math.sqrt(Math.PI * Math.PI + L * L);
}
function speedDependentSpongeDampingRatio(impactSpeedReal){
  const t = clamp((impactSpeedReal - PADDLE_SPEED_LOW) / (PADDLE_SPEED_HIGH - PADDLE_SPEED_LOW), 0, 1);
  const e = PADDLE_RESTITUTION_LOW + (PADDLE_RESTITUTION_HIGH - PADDLE_RESTITUTION_LOW) * t;
  return restitutionToDampingRatio(e);
}
// executionVariance：範圍解模式（RANGE_SOLUTION_MODE）用的動作抖動幅度，模擬人手每次
// 揮拍不會一模一樣。數值是校準過的安全範圍（用 13 顆有效發球批次測試，確保抖動後
// 大部分情況仍然成功，不會做出明知不可行的動作）：push 容錯空間大用 0.12，
// attack 容錯空間較窄用 0.08。見 docs/physics-engine-v2-plan.md Phase 6。
// racketNormalTiltY：拍面垂直開合角度，世界座標絕對值（跟揮拍方向無關）。
// racketNormalTiltX：拍面平面偏轉角度，繞「揮拍方向」這個軸旋轉的相對角度
// （見上方 computeRacketNormal()）——不是世界座標的絕對左右偏移。
const TECHNIQUES = {
  forehand_attack: {label:'正手攻球', model:'attack', techniqueVel:{x:0, y:-0.234, z:-1}, racketNormalTiltY:0.1, racketNormalTiltX:0, executionVariance:{vel:0.08, normal:0.024}},
  backhand_attack: {label:'反手攻球', model:'attack', techniqueVel:{x:0, y:-0.234, z:-1}, racketNormalTiltY:0.1, racketNormalTiltX:0, executionVariance:{vel:0.08, normal:0.024}},
  // 切球：拍面角度（racketNormalTiltY/X）跟揮拍方向（swingDirection）固定不變、獨立於彼此，
  // 只有力道大小依球況調整（adaptivePush，見 computeAdaptivePushLift()/computeAdaptivePushDrive()）。
  // 2026-07-14 從舊的「單一 magnitude 乘固定方向」公式回寫成 return-studio.html 已驗證過的拆分版本
  // （拖高/往前送兩個獨立分量，各自 clamp），修正舊公式把 Y/Z 分量綁死同一比例、搜尋空間裡沒有
  // 「往前下」揮拍方向可選的問題。racketNormalTiltY/swingDirection 這兩個欄位只有在 adaptivePush
  // 關閉時才會被讀到（目前沒有 UI 開關，adaptivePush 恆為 true），數值對齊
  // PUSH_TILT_Y/PUSH_LIFT_BASE/PUSH_DRIVE_BASE，避免萬一之後加開關時數字對不上。
  // 見 return-studio.html、docs/ARCHIVE/physics-engine-v2-plan.md。
  push: {label:'切球', model:'push', techniqueVel:{x:0, y:0, z:-0.4},
    racketNormalTiltY:1.0, racketNormalTiltX:0, swingDirection:normalize({x:0, y:0.28, z:-0.56}),
    adaptivePush:true, executionVariance:{vel:0.12, normal:0.036}}
  // loop（拉球）2026-07-15 拿掉：舊 direct model 未套用球拍接觸力學，之後要重做才會加回來。
};
let presets = [];
let selectedServeIndex = 0;
let phase = 'loading';
let selectedSide = null;
let selectedTechnique = null;
let servePath = [];
let serveVelocities = [];

  return new THREE.Line(geometry, material);

function tickCamera(){
  const f = CAM_CFG.lerpFactor ?? 0.025;
  if(phase === 'serve'){
    if(!camBounceTriggered && ball.position.z > camTriggerZ && hitPoint){
      camBounceTriggered = true;
      camPosTarget.set(hitPoint.x, CAM_INTERCEPT_Y, CAM_HOME_POS.z);
    }
    camera.position.lerp(camPosTarget, f * 2);
    const tx = ball.position.x * 0.1;
    camLookCurrent.x += (tx - camLookCurrent.x) * f;
    camLookCurrent.y = CAM_LOOK_AT.y;
    camLookCurrent.z = CAM_LOOK_AT.z;
  } else if(phase === 'return'){
    camera.position.lerp(camPosTarget, f);
    if(selectedSide === 'backhand'){
      camLookCurrent.lerp(hitPointVec, f);
    } else {
      camLookCurrent.lerp(camLookTarget, f);
    }
  } else {
    camera.position.lerp(camPosTarget, f);
    camLookCurrent.lerp(CAM_LOOK_AT, f);
  }
  camera.position.y = CAM_INTERCEPT_Y;
  camera.lookAt(camLookCurrent);
}
function applyCamConfig(){
  CAM_INTERCEPT_Y = CAM_CFG.height ?? CAM_INTERCEPT_Y;
  CAM_HOME_POS.setY(CAM_INTERCEPT_Y);

    CAM_LOOK_AT.set(CAM_CFG.lookAt.x ?? 0, CAM_CFG.lookAt.y ?? 0.5, CAM_CFG.lookAt.z ?? 0.3);
  }
  camera.position.y = CAM_INTERCEPT_Y;
  camera.lookAt(CAM_LOOK_AT);
}

}

function solveVelocity(start, target, time, gravity){
  return {
    x:(target.x - start.x) / time,
    y:(target.y - start.y - 0.5 * gravity * time * time) / time,
    z:(target.z - start.z) / time
  };
}

// ── 物理引擎 v2：接觸力學（逐字對齊 tools/physics-v2-contact-mechanics.js）──
function contactSlipSpeed(vel, spin){
  const slipZ = vel.z - (spin.topspin || 0) * BALL_RADIUS;
  const slipX = vel.x + (spin.sidespin || 0) * BALL_RADIUS;
  return Math.hypot(slipX, slipZ);
}
// 完整一次觸桌反彈：回傳新的 vel/spin（spin 現在會隨每次觸桌真的改變，不再是常數）
// ── 物理引擎 v2：球拍接觸力學（通用版，任意拍面法向 + 拍面自身速度）──────────
// 跟球對桌面同一套接觸力學（法向反彈 + 切向庫倫摩擦/純滾動判斷），差別是：
// 桌面法向永遠是 +y、永遠靜止；球拍法向可以任意傾斜、且球拍本身有揮拍速度。
// 退化成 planeNormal=(0,1,0)、planeVel=0 時，跟 bounceWithSpinPhysical() 完全一致
// （已用 tools/racket-contact-mechanics.js 驗證過，見 docs/physics-engine-v2-plan.md）。
// 注意：這裡用的是「真正的 2D 向量庫倫摩擦」（單一共用摩擦衝量預算，方向沿實際
// 滑動向量），比桌面版本「x/z 各自獨立摩擦力預算」的簡化更嚴謹；兩者只有在
// 滑動剛好落在單一軸上時才會完全一致，混合滑動時數值會有些微差異（更精確）。
function crossVec3(a, b){
  return {x:a.y*b.z-a.z*b.y, y:a.z*b.x-a.x*b.z, z:a.x*b.y-a.y*b.x};
}
function subVec3(a, b){ return {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}; }
function scaleVec3(v, s){ return {x:v.x*s, y:v.y*s, z:v.z*s}; }
function dotVec3(a, b){ return a.x*b.x + a.y*b.y + a.z*b.z; }
// Rodrigues 旋轉公式：把向量 v 繞單位軸 axis 轉 angle 弳度。
function rotateAroundAxis(v, axis, angle){
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  const crossTerm = crossVec3(axis, v);
  const dotTerm = dotVec3(axis, v);
  return addVec(addVec(scaleVec3(v, cosA), scaleVec3(crossTerm, sinA)), scaleVec3(axis, dotTerm * (1 - cosA)));
}
// 拍面法向量：垂直角度（tiltY）是世界座標的絕對開合角度；平面角度（tiltX）
// 改成繞「揮拍方向」這個軸旋轉的相對角度，不是世界座標的絕對左右偏移。
// 見 docs/physics-engine-v2-plan.md「拍面平面角度改為相對揮拍方向」。
function computeRacketNormal(tiltY, tiltX, swingDirRef){
  const verticalTilted = normalize({x:0, y:tiltY || 0, z:-1});
  if(!tiltX) return verticalTilted;
  const axis = normalize(swingDirRef);
  return rotateAroundAxis(verticalTilted, axis, tiltX);
}
// blend：反彈方向不是純剛體拍面法向量，是法向量跟「球實際接近方向反方向」的混合，
// 模擬球陷入海綿滑動時，回彈方向被滑動方向帶偏的效應。只用 Y-Z（垂直）分量算接近
// 方向，刻意排除X分量——左右方向不該耦合進「這球到底是上旋還是下旋」的判斷。
// blend=0 時直接回傳原始 planeNormal。用球面線性插值（slerp）而非線性插值+標準化，
// 避免拍面角度大時等效法向量在某個角度突然180度反轉（逐字對齊 return-studio.html，
// 完整推導見該檔案同名函式註解）。
function computeBlendedNormal(vel, planeVel, planeNormal, blend){
  if(!blend) return planeNormal;
  const relVelRaw = subVec3(vel, planeVel);
  const relYZ = {x:0, y:relVelRaw.y, z:relVelRaw.z};
  const relSpeed = Math.hypot(relYZ.y, relYZ.z);
  if(relSpeed <= 1e-9) return planeNormal;
  const approachDir = scaleVec3(relYZ, -1 / relSpeed);
  const cosTheta = clamp(dotVec3(planeNormal, approachDir), -1, 1);
  const theta = Math.acos(cosTheta);
  if(theta < 1e-6) return planeNormal;
  if(theta > Math.PI - 1e-6){
    return normalize(addVec(scaleVec3(planeNormal, 1 - blend), scaleVec3(approachDir, blend)));
  }
  const sinTheta = Math.sin(theta);
  const wPlane = Math.sin((1 - blend) * theta) / sinTheta;
  const wApproach = Math.sin(blend * theta) / sinTheta;
  return normalize(addVec(scaleVec3(planeNormal, wPlane), scaleVec3(approachDir, wApproach)));
}
function bounceOffPlane(vel, spin, planeNormal, planeVel, restitution, friction){
  const omega = {x:(spin && spin.topspin) || 0, y:0, z:(spin && spin.sidespin) || 0};
  const relVel = subVec3(vel, planeVel);
  const normalSpeed = dotVec3(relVel, planeNormal); // 應該 < 0（正在靠近拍面）
  const normalImpulse = BALL_MASS * (1 + restitution) * Math.abs(normalSpeed);
  const normalRelAfter = -restitution * normalSpeed;
  const r = scaleVec3(planeNormal, -BALL_RADIUS);
  const rotContact = crossVec3(omega, r);
  const contactRelVel = add(relVel, rotContact);
  const normalComp = scaleVec3(planeNormal, dotVec3(contactRelVel, planeNormal));
  const tangentSlip = subVec3(contactRelVel, normalComp);
  const slipMag = Math.hypot(tangentSlip.x, tangentSlip.y, tangentSlip.z);
  const comTangent = subVec3(relVel, scaleVec3(planeNormal, normalSpeed));
  let tangentRelAfter, omegaAfter;
  if(slipMag < 1e-9){
    tangentRelAfter = comTangent;
    omegaAfter = omega;
  } else {
    const e1 = scaleVec3(tangentSlip, 1 / slipMag);
    const e2 = crossVec3(planeNormal, e1); // 右手系：e1, e2, planeNormal
    const v1 = dotVec3(comTangent, e1);
    const v2 = dotVec3(comTangent, e2);
    // slip_e1 = v1 - (ω·e2)*R，slip_e2 = v2 - (-ω·e1)*R（推導見 tools/racket-contact-mechanics.js）
    const r1 = bounceTangentialAxis(v1, dotVec3(omega, e2), normalImpulse, friction);
    const r2 = bounceTangentialAxis(v2, -dotVec3(omega, e1), normalImpulse, friction);
    tangentRelAfter = add(scaleVec3(e1, r1.v2), scaleVec3(e2, r2.v2));
    const normalSpinComp = scaleVec3(planeNormal, dotVec3(omega, planeNormal));
    omegaAfter = add(add(normalSpinComp, scaleVec3(e2, r1.omega2)), scaleVec3(e1, -r2.omega2));
  }
  const velAfterRel = add(scaleVec3(planeNormal, normalRelAfter), tangentRelAfter);
  const velAfter = add(velAfterRel, planeVel);
  return {vel:velAfter, spin:{topspin:omegaAfter.x, sidespin:omegaAfter.z}};
}
// 逐步積分接觸模型（2026-07-14 從 return-studio.html 移植，逐字對齊）：法向用
// 「兩級串聯彈簧-阻尼」取代固定反彈係數——球先壓縮海綿+膠皮（第一級，spring1），
// 海綿再壓縮木板（第二級，spring2），木板頂著拍柄/手（固定端）。切向摩擦（旋轉）
// 由 spring1 在球面接觸點的力驅動，沿用既有 bounceTangentialAxis() 同一套推導但
// 改成連續黏性阻尼力 Pxy=-TANGENT_KP·vs（見 return-studio.html 同名函式完整註解，
// 含 wristBrakeRate/SIM_TIME_DILATION 的物理意義，這裡不重複）。
function bounceOffPlaneSubstepped(vel, spin, planeNormal, planeVel, springK, dampingRatio, friction, opts){
  opts = opts || {};
  const dt = opts.dt || 0.00002;
  const maxSteps = opts.maxSteps || 3000;
  const wristBrakeRate = opts.wristBrakeRate || 0;
  const D = SIM_TIME_DILATION;
  const velLab = scaleVec3(vel, D);
  const wallVel0 = scaleVec3(planeVel, D);
  const relVelReal0 = subVec3(velLab, wallVel0);
  const rawNormalDot = dotVec3(relVelReal0, planeNormal);
  const normalSpeedReal = -rawNormalDot;
  if(normalSpeedReal <= 0) return bounceOffPlane(vel, spin, planeNormal, planeVel, 0, friction); // 沒在接近，直接不反彈
  const effectiveDampingRatio = speedDependentSpongeDampingRatio(normalSpeedReal);
  const dampingC = effectiveDampingRatio * 2 * Math.sqrt(springK * BALL_MASS);
  const bladeDampingC = BLADE_DAMPING_RATIO * 2 * Math.sqrt(BLADE_SPRING_K * BLADE_NODE_MASS);
  const omega0 = scaleVec3({x:(spin && spin.topspin) || 0, y:0, z:(spin && spin.sidespin) || 0}, D);
  const r = scaleVec3(planeNormal, -BALL_RADIUS);
  const contactRelVel = addVec(relVelReal0, crossVec3(omega0, r));
  const trueSlip = subVec3(contactRelVel, scaleVec3(planeNormal, dotVec3(contactRelVel, planeNormal)));
  const slipMag = Math.hypot(trueSlip.x, trueSlip.y, trueSlip.z);
  let e1;
  if(slipMag > 1e-9){
    e1 = scaleVec3(trueSlip, 1 / slipMag);
  } else {
    const arbitrary = Math.abs(planeNormal.x) < 0.9 ? {x:1,y:0,z:0} : {x:0,y:1,z:0};
    e1 = normalize(subVec3(arbitrary, scaleVec3(planeNormal, dotVec3(arbitrary, planeNormal))));
  }
  const e2 = crossVec3(planeNormal, e1);
  const normalSpinComp = scaleVec3(planeNormal, dotVec3(omega0, planeNormal));
  let om1 = dotVec3(omega0, e2), om2 = -dotVec3(omega0, e1);
  let negBall = -dotVec3(velLab, planeNormal);
  let ballV1 = dotVec3(velLab, e1), ballV2 = dotVec3(velLab, e2);
  let negNode = -dotVec3(wallVel0, planeNormal);
  let x1 = 0, x2 = 0, t = 0;
  for(let i = 0; i < maxSteps; i++){
    const wallVelNow = wristBrakeRate ? scaleVec3(wallVel0, Math.exp(-wristBrakeRate * t)) : wallVel0;
    const negWallN = -dotVec3(wallVelNow, planeNormal);
    const v1rel = negBall - negNode;
    const F1 = -springK * x1 - dampingC * v1rel;
    const F2 = -BLADE_SPRING_K * x2 - bladeDampingC * (negNode - negWallN);
    negBall += (F1 / BALL_MASS) * dt;
    negNode += ((-F1 + F2) / BLADE_NODE_MASS) * dt;
    x1 += (negBall - negNode) * dt;
    x2 += (negNode - negWallN) * dt;
    const normalForceNow = Math.max(0, -F1);
    if(normalForceNow > 0){
      const wallV1 = dotVec3(wallVelNow, e1), wallV2 = dotVec3(wallVelNow, e2);
      const Fcap = friction * normalForceNow;
      {
        const slip = (ballV1 - wallV1) - om1 * BALL_RADIUS;
        const FtRaw = -TANGENT_KP * slip;
        const Ft = clamp(FtRaw, -Fcap, Fcap);
        ballV1 += (Ft / BALL_MASS) * dt;
        om1 -= (Ft * BALL_RADIUS / BALL_INERTIA) * dt;
      }
      {
        const slip = (ballV2 - wallV2) - om2 * BALL_RADIUS;
        const FtRaw = -TANGENT_KP * slip;
        const Ft = clamp(FtRaw, -Fcap, Fcap);
        ballV2 += (Ft / BALL_MASS) * dt;
        om2 -= (Ft * BALL_RADIUS / BALL_INERTIA) * dt;
      }
    }
    t += dt;
    if(x1 <= 0 && i > 5){
      const vBallN = -negBall;
      const velAfterLab = addVec(scaleVec3(planeNormal, vBallN), addVec(scaleVec3(e1, ballV1), scaleVec3(e2, ballV2)));
      const velAfter = scaleVec3(velAfterLab, 1 / D);
      const omegaFinal = scaleVec3(addVec(addVec(normalSpinComp, scaleVec3(e2, om1)), scaleVec3(e1, -om2)), 1 / D);
      return {vel: velAfter, spin: {topspin: omegaFinal.x, sidespin: omegaFinal.z}, dwellMs: t * 1000, effectiveEpsilon: negBall / normalSpeedReal};
    }
  }
  return {vel, spin, dwellMs: t * 1000, regime: 'overdamped_no_exit'};
}
// push 技術改用 Stage 4a 逐步積分接觸模型，blend 先算出「等效法向量」（Y-Z-only，
// 見 computeBlendedNormal），整個接觸期間固定用這個等效法向量做壓縮/釋放積分。
// 其他技術（攻球等）維持原本的瞬時碰撞公式，不受影響。epsilon 是為非切球技術
// 準備的，切球這條分支不會用到它（呼叫端仍會算，跟攻球共用同一段呼叫邏輯）。
function applyPushContact(incomingVel, spin, racketNormal, planeVel, epsilon, tech, blend){
  if(tech.model === 'push'){
    const effNormal = computeBlendedNormal(incomingVel, planeVel, racketNormal, blend);
    return bounceOffPlaneSubstepped(incomingVel, spin, effNormal, planeVel, PADDLE_SPRING_K, PADDLE_DAMPING_RATIO, PADDLE_FRICTION, {wristBrakeRate: PUSH_WRIST_BRAKE_RATE});
  }
  return bounceOffPlane(incomingVel, spin, racketNormal, planeVel, epsilon, PADDLE_FRICTION);
}
function simulatePath(start, velocity, options){
  const gravity = options.gravity ?? -4.2;
  // spin 現在是可變狀態：物理引擎 v2 下，每次觸桌旋轉都會真的改變（不再是套用整段路徑的常數）

      velocities.push(clone(vel));

    velocities.push(clone(vel));

      bestYNudge = yNudge;
      best = candidate;
      bestScore = score;

    for(const yNudge of yNudges) consider(time, yNudge);

    bestScore = serveBounceScore(preset, best);

      speedIdealMax:5.2,
      speedHardMax:5.7,

      vySoftMax:0.18,
      vyHardMax:0.35,
      speedIdealMin:2.0,
      speedIdealMax:3.6,
      speedHardMax:4.1,
      speedReject:4.8

    yNudges:[-0.12, -0.05, 0, 0.08, 0.16, 0.28, 0.42, 0.58],
    vySoftMax:0.85,
    vyHardMax:1.15,

    speedReject:2.65

function findServeBounceTime(preset){

function findHitIndex(path){

    // 若有第二個我方桌面 bounce，強制在它的 index 之前截斷
    const nextBounce = path.bounces[receiverBounceIdx + 1];
    const hardStop = nextBounce ? nextBounce.index : path.points.length;
    const start = receiverBounce.index + 1;
    for(let i = start; i < Math.min(hardStop, path.points.length - 1); i++){
      if(path.points[i].y > TABLE.top && path.velocities[i]?.y < -TIMING_HINT.threshold) return i;
    }
    for(let i = start; i < Math.min(hardStop, path.points.length - 1); i++){
      if(path.points[i].y > TABLE.top && path.points[i + 1].y < path.points[i].y) return Math.min(i + 1, hardStop - 1);
    }
    return Math.min(hardStop - 1, start + 15);
  }

    const hardStop = nextBounce ? nextBounce.index : path.points.length;
    const start = path.bounces[receiverBounceIdx].index + 1;
    for(let i = start; i < Math.min(hardStop, path.points.length - 1); i++){

    }

    animation = null;

  const duration = Math.max(700, safePoints.length * (speedMs || 10));
  function tick(now){

// 維持原本就存在的獨立弱項（tiltX/瞄準修正另一組問題，不是這次的目標）；
// no_spin_long_* 兩顆從「落桌但過網164cm」變成飛出界——切球本來就不是打
// 不轉球該用的技術，這兩顆本來就不代表真實使用情境，可接受。
const PUSH_LIFT_BASE = 0.28;
const PUSH_LIFT_K = 0.04;
const PUSH_LIFT_FLOOR = 0;
const PUSH_LIFT_NEUTRAL = 2;
const PUSH_LIFT_MAX = 3.0;
const PUSH_LIFT_VY_K = 0; // 2026-07-14: vy 適應性補正。搜描結果：vyK 越大振繚越嚴重、最低過網不斷下降。最佳值 = 0（不修正）。詳見 AI_CONTEXT/lift_vy_k_calibration_2026-07-14_raw.json。 // 2026-07-14: vy 適應性補正——來球下沖角度大（|vy| 大）時減少拖高，壓平彈道。待搜描棡減小。
const PUSH_DRIVE_BASE = 0.56;
const PUSH_DRIVE_K = 0.19;
const PUSH_DRIVE_FLOOR = 0.1;
const PUSH_DRIVE_NEUTRAL = 2;
const PUSH_DRIVE_MAX = 3.0;
function computeAdaptivePushLift(incomingVel){
  const speed = Math.hypot(incomingVel.x, incomingVel.z);
  // vy 適應性（2026-07-14）：來球下沖角度大（|vy| 大）時自動減少拖高力道。
  // 解決連續對打中過網高度在 11cm 和 72cm 之間振繚 60cm 的問題。
  // 球從高處下沖時 vy 更負，已有下降動量，不需要額外拖高。
  const vyCorrection = PUSH_LIFT_VY_K * Math.max(0, -incomingVel.y);
  return clamp(PUSH_LIFT_BASE - PUSH_LIFT_K * (speed - PUSH_LIFT_NEUTRAL) - vyCorrection, PUSH_LIFT_FLOOR, PUSH_LIFT_MAX);
}
function computeAdaptivePushDrive(incomingVel){
  const speed = Math.hypot(incomingVel.x, incomingVel.z);
  return clamp(PUSH_DRIVE_BASE - PUSH_DRIVE_K * (speed - PUSH_DRIVE_NEUTRAL), PUSH_DRIVE_FLOOR, PUSH_DRIVE_MAX);
}
// tiltX（2026-07-14 移除手動標註回歸公式，改回傳固定 0，同步 return-studio.html）：
// 舊版用「球例校正資料庫」10 顆樣本回歸出 tiltX 跟來球左右速度的關係，但使用者
// 澄清正常切球不該靠轉拍面去抵銷側旋（那是來不及選位置時的應急做法），正常做法
// 是靠瞄準方向過量修正；拍面角度該固定。EXPERIMENT_LOG.md EXP-037 已用
// PADDLE_BLEND 的 Y-Z-only 機制取代這個回歸公式（架構性突破，在 return-studio.html
// 驗證過），這次隨 Stage 4a 接觸模型一起寫回 game4.html，回歸公式改為死碼移除。
function computeAdaptivePushTiltX(){
  return 0;
}
// tiltY：固定拍面角度（2026-07-14 從 return-studio.html 回寫）。舊版依接觸
// 當下殘留旋轉量內插（0.006×|topspin|，clamp 0.4~0.55），是拖高/往前送還
// 沒拆開之前校準的數字，物理意義已經不同。return-studio.html 2026-07-13
// 用 tools/push-tilty-*-sweep-calibration.js 重新掃描，搭配 PUSH_LIFT/DRIVE_BASE
// 縮小成 0.8 倍，收斂到固定值 PUSH_TILT_Y=1.0（45°），11 顆校準發球全過網。
const PUSH_TILT_Y = 1.0;
function computeAdaptivePushTiltY(){
  return PUSH_TILT_Y;
}
function makeRacketReturnVelocity(incomingVel, incomingSpin, tech, hitPoint, gravity){
  const spin = incomingSpin || {topspin:0, sidespin:0};
  let baseTechVel = speedScaledTechniqueVel(incomingVel, tech);
  if(tech.adaptivePush){
    const lift = computeAdaptivePushLift(incomingVel);
    const drive = computeAdaptivePushDrive(incomingVel);
    baseTechVel = {x:0, y:lift, z:-drive};
    tech.swingDirection = baseTechVel;
  }
  // 平面角度是相對揮拍方向的旋轉，所以要先知道實際的揮拍方向參考向量：
  // 切球自適應力道公式開啟時用 swingDirection；其他情況（攻球）就用實際
  // 要打出去的球拍速度方向本身。
  const swingDirRef = tech.adaptivePush ? tech.swingDirection : baseTechVel;
  const tiltX = tech.adaptivePush ? computeAdaptivePushTiltX() : tech.racketNormalTiltX;
  const tiltY = tech.adaptivePush ? computeAdaptivePushTiltY() : tech.racketNormalTiltY;
  const racketNormalBase = computeRacketNormal(tiltY, tiltX, swingDirRef);
  const {techVel, racketNormal} = applyExecutionVariance(baseTechVel, racketNormalBase, tech);
  const epsilon = dynamicPaddleEpsilon(incomingVel, techVel, racketNormal);
  // push 技術改用 Stage 4a 接觸模型（applyPushContact/bounceOffPlaneSubstepped），
  // blend 要跟最終真正套用的碰撞一致傳進瞄準求解，否則瞄準跟實際碰撞用不同物理
  // （2026-07-14 從 return-studio.html 移植，見上方 PADDLE_BLEND 註解）。
  const blend = tech.model === 'push' ? PADDLE_BLEND : 0;
  // 只借用求解器的方向正負號當「哪邊才是對的」地面真值，大小不用——固定補償
  // 量模型（見 SIDESPIN_COMPENSATION_C 上方註解）。
  const aimedSign = signOf(solveRacketVelXForTargetLandingX(incomingVel, spin, racketNormal, techVel, epsilon, PADDLE_FRICTION, hitPoint, gravity, RETURN_TARGET_X, blend, tech));
  let compensationX = 0;
  if(selectedDirectionInput && aimedSign !== 0){
    const pressedSign = selectedDirectionInput === 'left' ? -1 : 1;
    compensationX = (pressedSign === aimedSign ? 1 : -1) * SIDESPIN_COMPENSATION_C;
  }
  const planeVel = {x:compensationX, y:techVel.y, z:techVel.z};
  return applyPushContact(incomingVel, spin, racketNormal, planeVel, epsilon, tech, blend);
}
function makeReturnVelocity(incomingVel, incomingSpin, tech, hitPoint, gravity){
  return makeRacketReturnVelocity(incomingVel, incomingSpin, tech, hitPoint, gravity);
}
function judgeReturn(result, contactPhase){
  const firstBounce = result.bounces[0] || null;
  const netClearance = result.netY == null ? null : result.netY - (TABLE.height + TABLE.net);
  let ok = false;
  let reason = '出界';
  if(netClearance != null && netClearance < 0){
    reason = '掛網';
  }else if(firstBounce && firstBounce.z > 0){
    reason = '落在自己桌面';
  }else if(firstBounce && firstBounce.z < 0 && Math.abs(firstBounce.x) <= TABLE.width/2 && Math.abs(firstBounce.z) <= TABLE.length/2){
    ok = true;
    reason = '成功落在對方桌面';
  }
  const detail = [
    `第一落點：${firstBounce ? `${firstBounce.x.toFixed(2)}, ${firstBounce.z.toFixed(2)}` : '無'}`,
    `過網高度：${netClearance == null ? '未測到' : netClearance.toFixed(3) + ' m'}`,
    `擊球時機：${timingLabel(contactPhase)}`,
    `發球：${currentPreset().label}`
  ].join('\n');
  showResult(ok, reason, detail);
  setPhase('result');
  document.getElementById('centerTip').textContent = ok ? '成功，按下一球繼續' : `${reason}，按下一球再試`;
  // 階段三：歸位；正手先略超中軸再回
  if(selectedSide === 'forehand'){
    const arc = CAM_CFG.forehand?.returnArc ?? 0.1;
    camPosTarget.set(CAM_HOME_POS.x - arc, CAM_HOME_POS.y, CAM_HOME_POS.z);
    startCamReturn();
    setTimeout(()=>{ resetCam(false); startCamReturn(); }, 200);
  } else {
    resetCam(false);
    startCamReturn();
  }
}
function renderServeButtons(){
  const select = document.getElementById('serveSelect');
  select.innerHTML = presets.map((preset, index)=>`
    <option value="${index}" ${index === selectedServeIndex ? 'selected' : ''}>${preset.label}</option>
  `).join('');
  document.getElementById('serveCount').textContent = presets.length ? `共 ${presets.length} 顆發球` : '尚未載入發球';
}
async function loadPresets(){
  // 同時載入 physics-presets.json 和 camera-config.json
  const [presetsRes, camRes] = await Promise.all([
    fetch('physics-presets.json?v=' + Date.now()),
    fetch('camera-config.json?v=' + Date.now()).catch(() => null)
  ]);
  if(!presetsRes.ok) throw new Error('physics-presets.json 載入失敗');
  if(camRes?.ok){
    CAM_CFG = await camRes.json();
    applyCamConfig();
  }
  const data = await presetsRes.json();
  presets = data.serves || [];
  renderServeButtons();
}
async function loadVideoLibrary(){
  const res = await fetch('videos.json?v=' + Date.now());
  if(!res.ok) throw new Error('videos.json 載入失敗');
  const all = await res.json();
  const byCategory = {};
  all.filter(v => v.kind === 'video' && v.reviewStatus === 'approved').forEach(v => {
    (byCategory[v.spinType] ||= []).push(v);
  });
  videoLibrary = byCategory;
}
// 發球 preset -> 影片分類。sidebackspin_half_long_backhand 依 2026-07-15 判斷（命名雖是
// sidebackspin，物理上更接近不夠乾淨的下旋球，見 SIDESPIN_COMPENSATION_C 校準時的討論）
// 歸入下旋，不進側旋判斷題庫。真正的側旋球分左右時，用跟切球判定同一套求解器算出的
// 方向正負號分類——這樣「配到的影片分類」跟「按鍵判定的對錯」內部保證一致，不是宣稱
// 真人影片鏡頭方向跟這個 sign 對得上（方向 C 本來就是「介面語意，不是真人軌跡量測」）。
function videoCategoryForPreset(preset, vel, spin, point, gravity){
  const id = preset.id;
  if(id === 'sidebackspin_half_long_backhand' || id.startsWith('backspin_')) return 'contact_backspin';
  if(id.startsWith('no_spin_')) return 'contact_nospin';
  if(id.startsWith('sidebackspin_')){
    const tech = {...TECHNIQUES.push};
    const lift = computeAdaptivePushLift(vel);
    const drive = computeAdaptivePushDrive(vel);
    const baseTechVel = {x:0, y:lift, z:-drive};
    tech.swingDirection = baseTechVel;
    const tiltY = computeAdaptivePushTiltY();
    const tiltX = computeAdaptivePushTiltX();
    const racketNormal = computeRacketNormal(tiltY, tiltX, baseTechVel);
    const epsilon = dynamicPaddleEpsilon(vel, baseTechVel, racketNormal);
    const aimedX = solveRacketVelXForTargetLandingX(vel, spin, racketNormal, baseTechVel, epsilon, PADDLE_FRICTION, point, gravity, RETURN_TARGET_X, PADDLE_BLEND, tech);
    return signOf(aimedX) < 0 ? 'contact_sidebackspin_left' : 'contact_sidebackspin_right';
  }
  return null;
}
function pickVideoForPreset(preset, vel, spin, point, gravity){
  const category = videoCategoryForPreset(preset, vel, spin, point, gravity);
  const pool = category ? videoLibrary[category] : null;
  if(!pool || !pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}
// 方向 C 影片配置：影片播到「粗估觸球點」（沒有逐支標註時用比例猜，見
// VIDEO_CONTACT_FRACTION_GUESS）就開始淡出、同時讓已經算好的物理發球進場——複刻
// C3（影片淡出 + 訓練球同時入場）驗證過的手感，只是拿掉逐幀標註的精確度依賴。
// 之後 auto-contact-tagger 補齊全庫的真實觸球時間後，triggerTimeSec 應該換成標註值。
const VIDEO_CONTACT_FRACTION_GUESS = 0.7;
function playServeVideo(videoEntry, onHandoff){
  const frame = document.getElementById('videoFrame');
  const videoEl = document.getElementById('serveVideo');
  let handedOff = false;
  const fallback = ()=>{
    if(handedOff) return;
    handedOff = true;
    frame.hidden = true;
    onHandoff();
  };
  frame.classList.remove('exiting');
  frame.hidden = false;
  videoEl.src = videoEntry.src;
  videoEl.currentTime = 0;
  videoEl.addEventListener('error', fallback, {once:true});
  videoEl.addEventListener('loadedmetadata', ()=>{
    if(handedOff) return;
    const duration = Number.isFinite(videoEl.duration) && videoEl.duration > 0 ? videoEl.duration : 1.2;
    const triggerTimeSec = duration * VIDEO_CONTACT_FRACTION_GUESS;
    videoExperiment = new DirectionCExperiment.Experiment(triggerTimeSec, duration);
    videoExperiment.start('C3', performance.now());
    const loop = now=>{
      if(handedOff) return;
      const snap = videoExperiment.tick(videoEl.currentTime, now);
      if(snap.state === 'OVERLAP' || snap.state === 'TRAINING'){
        handedOff = true;
        frame.classList.add('exiting');
        setTimeout(()=>{ videoEl.pause(); frame.hidden = true; }, 260);
        onHandoff();
        return;
      }
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }, {once:true});
  videoEl.play().catch(fallback);
}
document.getElementById('playBtn').addEventListener('click', playServe);
document.getElementById('serveSelect').addEventListener('change', event=>{
  selectedServeIndex = parseInt(event.target.value, 10) || 0;
  renderServeButtons();
  prepareServe();

  setTrajectoryVisibility();

});
document.getElementById('difficultyControl').addEventListener('change', event=>{
  DIFFICULTY_MODE = event.target.value || 'beginner';
  updateTimingHint(currentServeVel);
});
document.getElementById('autoTimingToggle').addEventListener('change', event=>{

});

  const [side, techniqueKey] = (event.target.value || 'forehand:push').split(':');
  AUTO_TIMING_SIDE = side;
  AUTO_TIMING_TECHNIQUE = techniqueKey;
  if(phase === 'idle') prepareServe(); // 重新計算 autoFireIndex（依新選的技術），發球中不打斷
});
document.getElementById('rangeSolutionToggle').addEventListener('change', event=>{
  RANGE_SOLUTION_MODE = event.target.checked;
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  selectedServeIndex = (selectedServeIndex + 1) % Math.max(1, presets.length);
  renderServeButtons();
  prepareServe();
  playServe();
});
document.querySelectorAll('[data-return-technique]').forEach(btn=>{
  btn.disabled = true;
  btn.addEventListener('click', event=>event.preventDefault());
  btn.addEventListener('pointerdown', event=>{
    if(btn.disabled || !inputWindowOpen) return;
    event.preventDefault();
    chooseReturnFromButton(btn.dataset.returnTechnique);
  });
});
// 方向鍵是獨立於技術鍵的狀態切換（可再按一次取消），不會立即觸發回擊——
// 真正判定/執行是按下技術鍵那一刻，讀取當下的 selectedDirectionInput。
document.querySelectorAll('[data-direction]').forEach(btn=>{
  btn.disabled = true;
  btn.addEventListener('click', ()=>{
    if(btn.disabled || !inputWindowOpen || pendingReturn || missResolved) return;
    const dir = btn.dataset.direction;
    selectedDirectionInput = selectedDirectionInput === dir ? null : dir;
    document.querySelectorAll('[data-direction]').forEach(b=>{
      b.classList.toggle('active', b.dataset.direction === selectedDirectionInput);
    });
  });
});
const buildVersionEl = document.getElementById('buildVersion');
buildVersionEl.textContent = Math.random().toString(36).slice(2, 7);
buildVersionEl.title = BUILD_VERSION;
resize();
updateScore();
Promise.all([
  loadVideoLibrary().catch(error=>{ console.warn('videos.json 載入失敗，本局改用純物理模式（無方向 C 影片）', error); }),
  loadPresets()
]).then(()=>prepareServe()).catch(error=>{
  document.getElementById('centerTip').textContent = error.message;
  document.getElementById('resultText').textContent = '載入失敗';
  document.getElementById('resultText').className = 'result bad';
  document.getElementById('detailText').textContent = String(error);
});
