<!DOCTYPE html>
<html lang="zh-TW" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>桌球物理攝影棚</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;--radius:10px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:#0b1016}
h1{font-size:20px;margin:0;font-weight:900}
.badge{font-size:12px;color:var(--yellow);font-weight:800}
.stage{display:grid;grid-template-columns:1fr 420px;height:calc(100vh - 54px);overflow:hidden}
.views{display:grid;grid-template-rows:minmax(240px,1.08fr) minmax(220px,.92fr);gap:8px;padding:8px;min-height:0}
.view{position:relative;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#05070a}
.view-label{position:absolute;left:10px;top:8px;z-index:2;font-size:12px;color:var(--muted);font-weight:800}
canvas{display:block;width:100%;height:100%}
.panel{border-left:1px solid var(--border);background:var(--surface);overflow:auto;max-height:calc(100vh - 54px)}
.section{padding:12px 14px;border-bottom:1px solid var(--border)}
.section h2{font-size:13px;margin:0 0 10px;color:var(--yellow)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid.two{grid-template-columns:repeat(2,1fr)}
.field{display:grid;gap:4px}
label{font-size:11px;color:var(--muted);font-weight:800}
input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;background:#080b10;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px}
input[readonly]{color:var(--yellow);background:#111720}
input[type=range]{padding:0}
textarea{min-height:116px;font-family:ui-monospace,Consolas,monospace;font-size:12px;line-height:1.45}
button{border:1px solid var(--blue);background:var(--blue);color:#06111f;border-radius:8px;padding:9px 10px;font-weight:900;cursor:pointer}
button.secondary{background:var(--surface2);color:var(--text);border-color:var(--border)}
button.warn{background:rgba(210,153,34,.12);color:var(--yellow);border-color:var(--yellow)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status{display:grid;gap:6px;font-size:12px;color:var(--muted);line-height:1.45}
.status strong{color:var(--text)}
.ok{color:var(--green)}
.bad{color:var(--red)}
.mono{font-family:ui-monospace,Consolas,monospace}
.preset-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
@media (max-width: 900px){
  .stage{grid-template-columns:1fr}
  .stage{height:auto;overflow:visible}
  .panel{border-left:0;border-top:1px solid var(--border);max-height:none}
  .views{position:sticky;top:0;z-index:5;height:54vh;min-height:380px;background:var(--bg)}
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body translate="no" class="notranslate">
<header>
  <h1>桌球物理攝影棚</h1>
  <div class="badge">Game 4 Studio v0</div>
</header>

<main class="stage">
  <section class="views">
    <div class="view">
      <div class="view-label">側面視角</div>
      <canvas id="sideView"></canvas>
    </div>
    <div class="view">
      <div class="view-label">我方視角</div>
      <canvas id="frontView"></canvas>
    </div>
  </section>

  <aside class="panel">
    <div class="section">
      <h2>作弊反推</h2>
      <div class="grid two" style="margin-bottom:8px">
        <div class="field">
          <label>反推模式</label>
          <select id="solveTarget">
            <option value="serve_bounces" selected>發球雙落點</option>
            <option value="first_bounce">指定第一落點</option>
            <option value="second_bounce">指定第二落點</option>
          </select>
        </div>
        <div class="field"><label>目標說明</label><input id="targetHint" readonly value="目標 = 第一跳 + 第二跳"></div>
      </div>
      <div class="grid">
        <div class="field"><label>起點 X</label><input id="startX" type="number" step="0.01" value="0.28"></div>
        <div class="field"><label>起點 Y</label><input id="startY" type="number" step="0.01" value="1.03"></div>
        <div class="field"><label>起點 Z</label><input id="startZ" type="number" step="0.01" value="-1.24"></div>
        <div class="field"><label>第一跳 X</label><input id="firstX" type="number" step="0.01" value="-0.08"></div>
        <div class="field"><label>第一跳 Y</label><input id="firstY" type="number" step="0.01" value="0.78"></div>
        <div class="field"><label>第一跳 Z</label><input id="firstZ" type="number" step="0.01" value="-0.34"></div>
        <div class="field"><label>第二跳 X</label><input id="targetX" type="number" step="0.01" value="-0.46"></div>
        <div class="field"><label>第二跳 Y</label><input id="targetY" type="number" step="0.01" value="0.78"></div>
        <div class="field"><label>第二跳 Z</label><input id="targetZ" type="number" step="0.01" value="0.88"></div>
      </div>
      <div class="grid two" style="margin-top:8px">
        <div class="field"><label>飛行時間</label><input id="flightTime" type="number" step="0.01" value="0.78"></div>
        <div class="field"><label>重力</label><input id="gravity" type="number" step="0.1" value="-4.2"></div>
      </div>
      <div class="grid" style="margin-top:8px">
        <div class="field"><label>反推 VX</label><input id="baseVx" readonly value="0"></div>
        <div class="field"><label>反推 VY</label><input id="baseVy" readonly value="0"></div>
        <div class="field"><label>反推 VZ</label><input id="baseVz" readonly value="0"></div>
      </div>
      <div class="status" style="margin-top:8px">球桌為真實 2.74m x 1.525m；球的物理直徑為 40mm，畫面中放大顯示方便調參。</div>
    </div>

    <div class="section">
      <h2>變因向量</h2>
      <div class="grid">
        <div class="field"><label>ΔX 速度</label><input id="varX" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label>ΔY 速度</label><input id="varY" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label>ΔZ 速度</label><input id="varZ" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label>前後旋</label><input id="topspin" type="number" step="0.05" value="-0.35"></div>
        <div class="field"><label>側旋</label><input id="sidespin" type="number" step="0.05" value="-0.18"></div>
        <div class="field"><label>彈跳</label><input id="bounce" type="number" step="0.01" value="0.84"></div>
      </div>
    </div>

    <div class="section">
      <h2>操作</h2>
      <div class="actions">
        <button id="playBtn" type="button">播放</button>
        <button id="resetBtn" type="button" class="secondary">重播</button>
        <button id="randomBtn" type="button" class="warn">產生散布</button>
        <button id="copyBtn" type="button" class="secondary">複製指令</button>
      </div>
    </div>

    <div class="section">
      <h2>分析</h2>
      <div class="status" id="status"></div>
    </div>

    <div class="section">
      <h2>Preset</h2>
      <div class="preset-row">
        <div class="field"><label>名稱</label><input id="presetName" value="側下長球到反手"></div>
        <button id="saveBtn" type="button">儲存</button>
      </div>
      <div class="preset-row" style="margin-top:8px">
        <div class="field"><label>已存參數</label><select id="presetSelect"></select></div>
        <button id="loadBtn" type="button" class="secondary">載入</button>
      </div>
    </div>

    <div class="section">
      <h2>匯出</h2>
      <textarea id="exportText" readonly></textarea>
    </div>
  </aside>
</main>

<script src="vendor/three.r128.min.js"></script>
<script>
const TABLE = { length: 2.74, width: 1.525, height: 0.76, top: 0.781, net: 0.1525 };
const BALL_RADIUS = 0.02;
const BALL_RENDER_RADIUS = 0.034;
const STORAGE_KEY = 'tt-physics-studio-presets-v1';
const PLAY_MIN_DURATION_MS = 3000;
const ids = ['solveTarget','startX','startY','startZ','firstX','firstY','firstZ','targetX','targetY','targetZ','flightTime','gravity','varX','varY','varZ','topspin','sidespin','bounce','presetName'];
let animation = null;
let playStart = 0;
let isPlaying = false;
let currentPath = [];
let scatterLines = [];

function num(id){ return parseFloat(document.getElementById(id).value); }
function setValue(id, value){ document.getElementById(id).value = value; }
function readState(){
  const start = {x:num('startX'), y:num('startY'), z:num('startZ')};
  const firstBounce = {x:num('firstX'), y:num('firstY'), z:num('firstZ')};
  const target = {x:num('targetX'), y:num('targetY'), z:num('targetZ')};
  return {
    id: document.getElementById('presetName').value.trim() || 'untitled',
    label: document.getElementById('presetName').value.trim() || '未命名',
    type: 'serve',
    mode: 'cheat_solve',
    start,
    firstBounce,
    secondBounce: target,
    target,
    solve: {targetMode:document.getElementById('solveTarget').value, flightTime:num('flightTime'), gravity:num('gravity')},
    variation: {
      velocity: {x:num('varX'), y:num('varY'), z:num('varZ')},
      spin: {topspin:num('topspin'), sidespin:num('sidespin')},
      bounce: num('bounce')
    }
  };
}
function applyState(state){
  setValue('presetName', state.label || state.id || '未命名');
  const firstBounce = state.firstBounce || (state.solve?.targetMode === 'first_bounce' ? state.target : null) || {x:-0.08,y:TABLE.top,z:-0.34};
  const secondBounce = state.secondBounce || state.target || {x:0,y:TABLE.top,z:0};
  ['x','y','z'].forEach(axis=>{
    setValue('start' + axis.toUpperCase(), state.start?.[axis] ?? 0);
    setValue('first' + axis.toUpperCase(), firstBounce[axis] ?? 0);
    setValue('target' + axis.toUpperCase(), secondBounce[axis] ?? 0);
  });
  setValue('flightTime', state.solve?.flightTime ?? 0.78);
  setValue('gravity', state.solve?.gravity ?? -4.2);
  document.getElementById('solveTarget').value = state.solve?.targetMode || state.solve?.target || 'serve_bounces';
  setValue('varX', state.variation?.velocity?.x ?? 0);
  setValue('varY', state.variation?.velocity?.y ?? 0);
  setValue('varZ', state.variation?.velocity?.z ?? 0);
  setValue('topspin', state.variation?.spin?.topspin ?? 0);
  setValue('sidespin', state.variation?.spin?.sidespin ?? 0);
  setValue('bounce', state.variation?.bounce ?? 0.84);
  updateStudio();
}
function solveVelocity(start, target, time, gravity){
  return {
    x: (target.x - start.x) / time,
    y: (target.y - start.y - 0.5 * gravity * time * time) / time,
    z: (target.z - start.z) / time
  };
}
function addVec(a,b){ return {x:a.x+b.x, y:a.y+b.y, z:a.z+b.z}; }
function cloneVec(v){ return {x:v.x, y:v.y, z:v.z}; }

function solveBaseVelocity(state){
  if(state.solve.targetMode === 'serve_bounces'){
    return solveServeBounceVelocity(state);
  }
  if(state.solve.targetMode === 'second_bounce'){
    return solveSecondBounceVelocity(state);
  }
  return solveVelocity(state.start, state.firstBounce || state.target, state.solve.flightTime, state.solve.gravity);
}
function solveServeBounceVelocity(state){
  let best = findServeBounceSeed(state);
  let bestScore = serveBounceScore(state, best);
  let steps = {x:0.2, y:0.16, z:0.2};
  for(let round=0; round<18; round++){
    let improved = false;
    for(const axis of ['x','y','z']){
      for(const dir of [-1,1]){
        const trial = {...best, [axis]: best[axis] + steps[axis] * dir};
        const score = serveBounceScore(state, trial);
        if(score < bestScore){
          best = trial;
          bestScore = score;
          improved = true;
        }
      }
    }
    if(!improved){
      steps.x *= 0.58;
      steps.y *= 0.58;
      steps.z *= 0.58;
    }
  }
  return best;
}
function findServeBounceSeed(state){
  const first = state.firstBounce || state.target;
  const times = [0.18, 0.22, 0.26, 0.3, 0.36, 0.44, 0.54, 0.66, 0.78];
  let best = solveVelocity(state.start, first, 0.34, state.solve.gravity);
  let bestScore = serveBounceScore(state, best);
  for(const time of times){
    const candidate = solveVelocity(state.start, first, time, state.solve.gravity);
    const score = serveBounceScore(state, candidate);
    if(score < bestScore){
      best = candidate;
      bestScore = score;
    }
  }
  return best;
}
function serveBounceScore(state, baseVel){
  const result = simulateWithBaseVelocity(state, baseVel, {x:0,y:0,z:0});
  const firstTarget = state.firstBounce || state.target;
  const secondTarget = state.target;
  const first = result.bounces[0];
  const second = result.bounces[1];
  const firstPoint = first || result.groundLanding || result.points[result.points.length - 1] || state.start;
  const secondPoint = second || firstPoint;
  const firstDx = firstPoint.x - firstTarget.x;
  const firstDz = firstPoint.z - firstTarget.z;
  const secondDx = secondPoint.x - secondTarget.x;
  const secondDz = secondPoint.z - secondTarget.z;
  const upwardPenalty = Math.max(0, baseVel.y) * 18;
  const noFirstPenalty = first ? 0 : 8;
  const noSecondPenalty = second ? 0 : 5;
  const netPenalty = result.netY == null ? 1.5 : Math.max(0, TABLE.height + TABLE.net - result.netY) * 10;
  return firstDx*firstDx*3.6 + firstDz*firstDz*3.6 + secondDx*secondDx + secondDz*secondDz + upwardPenalty + noFirstPenalty + noSecondPenalty + netPenalty;
}
function solveSecondBounceVelocity(state){
  const target = state.target;
  let best = findSecondBounceSeed(state);
  let bestScore = secondBounceScore(state, best);
  let steps = {x:0.35, y:0.25, z:0.35};
  for(let round=0; round<18; round++){
    let improved = false;
    for(const axis of ['x','y','z']){
      for(const dir of [-1,1]){
        const trial = {...best, [axis]: best[axis] + steps[axis] * dir};
        const score = secondBounceScore(state, trial);
        if(score < bestScore){
          best = trial;
          bestScore = score;
          improved = true;
        }
      }
    }
    if(!improved){
      steps.x *= 0.58;
      steps.y *= 0.58;
      steps.z *= 0.58;
    }
  }
  return best;
}
function findSecondBounceSeed(state){
  const target = state.target;
  const fallbackTime = Math.max(1.05, state.solve.flightTime);
  let best = solveVelocity(state.start, target, fallbackTime, state.solve.gravity);
  let bestScore = secondBounceScore(state, best);
  const times = [0.95, 1.1, 1.25, 1.4, 1.6, 1.85, 2.1];
  const ySpeeds = [0.18, 0.35, 0.55, 0.8, 1.05, 1.35, 1.7, 2.1];
  const xOffsets = [-0.8, -0.4, 0, 0.4, 0.8];
  const zOffsets = [-1.0, -0.5, 0, 0.5, 1.0];
  for(const time of times){
    const baseX = (target.x - state.start.x) / time;
    const baseZ = (target.z - state.start.z) / time;
    for(const y of ySpeeds){
      for(const xOffset of xOffsets){
        for(const zOffset of zOffsets){
          const candidate = {x:baseX + xOffset, y, z:baseZ + zOffset};
          const score = secondBounceScore(state, candidate);
          if(score < bestScore){
            best = candidate;
            bestScore = score;
          }
        }
      }
    }
  }
  return best;
}
function secondBounceScore(state, baseVel){
  const result = simulateWithBaseVelocity(state, baseVel, {x:0,y:0,z:0});
  const target = state.target;
  const second = result.bounces[1];
  const fallback = result.bounces[0] || result.groundLanding || result.points[result.points.length - 1] || state.start;
  const point = second || fallback;
  const dx = point.x - target.x;
  const dz = point.z - target.z;
  const dt = second?.t == null ? 1.5 : second.t - state.solve.flightTime;
  const missPenalty = second ? 0 : 4;
  return dx*dx + dz*dz + dt*dt*0.35 + missPenalty;
}
function simulate(state, variant){
  const baseVel = solveBaseVelocity(state);
  return simulateWithBaseVelocity(state, baseVel, variant || {x:0,y:0,z:0});
}
function simulateWithBaseVelocity(state, baseVel, variant){
  const velocity = addVec(baseVel, variant || {x:0,y:0,z:0});
  const spin = state.variation.spin;
  const bounce = state.variation.bounce;
  const gravity = state.solve.gravity;
  const pos = cloneVec(state.start);
  const vel = cloneVec(velocity);
  const points = [];
  const bounces = [];
  let netY = null;
  let firstLanding = null;
  let groundLanding = null;
  let crossedNet = false;
  for(let i=0;i<360;i++){
    const dt = 1/120;
    const t = (i + 1) * dt;
    const prev = cloneVec(pos);
    vel.y += gravity * dt;
    pos.x += vel.x * dt;
    pos.y += vel.y * dt;
    pos.z += vel.z * dt;
    if(!crossedNet && prev.z < 0 && pos.z >= 0){
      const ratio = (0 - prev.z) / (pos.z - prev.z || 1);
      netY = prev.y + (pos.y - prev.y) * ratio;
      crossedNet = true;
    }
    const onTable = Math.abs(pos.x) <= TABLE.width/2 && Math.abs(pos.z) <= TABLE.length/2;
    if(pos.y <= TABLE.top && vel.y < 0 && onTable && bounces.length < 2){
      pos.y = TABLE.top;
      const bouncePoint = {...cloneVec(pos), t};
      if(!firstLanding) firstLanding = bouncePoint;
      bounces.push(bouncePoint);
      vel.y = Math.abs(vel.y) * bounce;
      vel.z = (vel.z + spin.topspin * 0.55) * 0.86;
      vel.x = (vel.x + spin.sidespin * 0.42) * 0.86;
    }
    if(pos.y <= BALL_RADIUS && prev.y > BALL_RADIUS){
      const ratio = (BALL_RADIUS - prev.y) / (pos.y - prev.y || 1);
      groundLanding = {
        x: prev.x + (pos.x - prev.x) * ratio,
        y: BALL_RADIUS,
        z: prev.z + (pos.z - prev.z) * ratio,
        t: t - dt + dt * ratio
      };
      points.push(groundLanding);
      break;
    }
    points.push(cloneVec(pos));
    if(Math.abs(pos.x) > 3 || Math.abs(pos.z) > 4) break;
  }
  return {points, baseVel, velocity, netY, firstLanding, groundLanding, bounces};
}

function buildScene(){
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05070a);
  scene.fog = new THREE.Fog(0x05070a, 8, 18);
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const light = new THREE.DirectionalLight(0xffffff, 0.85);
  light.position.set(2,5,3);
  scene.add(light);

  const table = new THREE.Mesh(
    new THREE.BoxGeometry(TABLE.width, 0.04, TABLE.length),
    new THREE.MeshLambertMaterial({color:0x155c35})
  );
  table.position.set(0, TABLE.height, 0);
  scene.add(table);
  const edge = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(TABLE.width, 0.041, TABLE.length)),
    new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.6})
  );
  edge.position.set(0, TABLE.height, 0);
  scene.add(edge);
  const net = new THREE.Mesh(
    new THREE.BoxGeometry(TABLE.width, TABLE.net, 0.012),
    new THREE.MeshLambertMaterial({color:0xd9dee6, transparent:true, opacity:0.55})
  );
  net.position.set(0, TABLE.height + TABLE.net/2, 0);
  scene.add(net);
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(8,8),
    new THREE.MeshLambertMaterial({color:0x11151c})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  const axes = new THREE.AxesHelper(0.45);
  axes.position.set(-1.05, TABLE.top + 0.02, 1.55);
  scene.add(axes);
  return scene;
}

const scenes = [buildScene(), buildScene()];
const canvases = [document.getElementById('sideView'), document.getElementById('frontView')];
const renderers = canvases.map(canvas => new THREE.WebGLRenderer({canvas, antialias:true}));
const cameras = [
  new THREE.PerspectiveCamera(58, 1, 0.01, 30),
  new THREE.PerspectiveCamera(66, 1, 0.01, 30)
];
cameras[0].position.set(-2.75, 1.16, 0.04);
cameras[0].lookAt(0, TABLE.top, 0.12);
cameras[1].position.set(0, 1.55, 2.42);
cameras[1].lookAt(0, TABLE.top, -0.08);

function makeBall(scene){
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(BALL_RADIUS, 24, 24),
    new THREE.MeshPhongMaterial({color:0xffd84d, shininess:100})
  );
  scene.add(ball);
  ball.scale.setScalar(BALL_RENDER_RADIUS / BALL_RADIUS);
  return ball;
}
const balls = scenes.map(makeBall);
const markers = scenes.map(scene=>{
  const start = new THREE.Mesh(new THREE.SphereGeometry(0.035,16,16), new THREE.MeshBasicMaterial({color:0x58a6ff}));
  const first = new THREE.Mesh(new THREE.SphereGeometry(0.035,16,16), new THREE.MeshBasicMaterial({color:0xd29922}));
  const target = new THREE.Mesh(new THREE.SphereGeometry(0.035,16,16), new THREE.MeshBasicMaterial({color:0x3fb950}));
  scene.add(start, first, target);
  return {start,first,target};
});

function makeLine(scene, color, opacity){
  const geo = new THREE.BufferGeometry();
  const mat = new THREE.LineDashedMaterial({color, transparent:true, opacity, dashSize:0.04, gapSize:0.025});
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  return line;
}
const baseLines = scenes.map(scene=>makeLine(scene, 0x58a6ff, 0.55));
const variantLines = scenes.map(scene=>makeLine(scene, 0xffd84d, 0.9));

function setLine(line, points){
  const vecs = points.map(p=>new THREE.Vector3(p.x,p.y,p.z));
  line.geometry.dispose();
  line.geometry = new THREE.BufferGeometry().setFromPoints(vecs);
  line.computeLineDistances();
}
function clearScatter(){
  scatterLines.forEach(line=>line.parent?.remove(line));
  scatterLines = [];
}
function addScatter(paths){
  clearScatter();
  scenes.forEach(scene=>{
    paths.forEach(path=>{
      const line = makeLine(scene, 0xf85149, 0.28);
      setLine(line, path.points);
      scatterLines.push(line);
    });
  });
}

function resize(){
  canvases.forEach((canvas,index)=>{
    const box = canvas.parentElement.getBoundingClientRect();
    renderers[index].setSize(box.width, box.height, false);
    cameras[index].aspect = box.width / box.height;
    cameras[index].updateProjectionMatrix();
  });
  renderAll();
}
window.addEventListener('resize', resize);

function analyze(base, variant, state){
  setValue('baseVx', base.baseVel.x.toFixed(3));
  setValue('baseVy', base.baseVel.y.toFixed(3));
  setValue('baseVz', base.baseVel.z.toFixed(3));
  const netClearance = variant.netY == null ? null : variant.netY - (TABLE.height + TABLE.net);
  const landing = variant.firstLanding;
  const secondLanding = variant.bounces[1];
  const ground = variant.groundLanding || variant.points[variant.points.length - 1];
  const landingText = landing ? `${landing.x.toFixed(2)}, ${landing.z.toFixed(2)}` : '未落桌';
  const secondText = secondLanding ? `${secondLanding.x.toFixed(2)}, ${secondLanding.z.toFixed(2)}` : '未達第二跳';
  const groundText = ground ? `${ground.x.toFixed(2)}, ${ground.z.toFixed(2)}` : '未落地';
  const firstTarget = state.firstBounce || state.target;
  const secondTarget = state.target;
  const firstError = landing ? Math.hypot(landing.x - firstTarget.x, landing.z - firstTarget.z) : null;
  const secondError = secondLanding ? Math.hypot(secondLanding.x - secondTarget.x, secondLanding.z - secondTarget.z) : null;
  const firstOk = landing && firstError < 0.08;
  const secondOk = secondLanding && secondError < 0.1;
  const netOk = netClearance == null || netClearance > 0;
  const ok = state.solve.targetMode === 'serve_bounces'
    ? firstOk && secondOk && netOk
    : landing && Math.abs(landing.x) <= TABLE.width/2 && Math.abs(landing.z) <= TABLE.length/2 && netOk;
  const reason = !landing
    ? '未落桌'
    : !netOk
      ? '掛網風險'
      : state.solve.targetMode === 'serve_bounces' && !secondLanding
        ? '未達第二跳'
        : state.solve.targetMode === 'serve_bounces' && (!firstOk || !secondOk)
          ? '落點偏離'
          : ok ? '有效落桌' : '出界';
  document.getElementById('status').innerHTML = `
    <div>基礎速度：<strong class="mono">${base.baseVel.x.toFixed(2)}, ${base.baseVel.y.toFixed(2)}, ${base.baseVel.z.toFixed(2)}</strong></div>
    <div>變因後：<strong class="mono">${variant.velocity.x.toFixed(2)}, ${variant.velocity.y.toFixed(2)}, ${variant.velocity.z.toFixed(2)}</strong></div>
    <div>過網高度：<strong class="${netClearance == null || netClearance >= 0 ? 'ok' : 'bad'}">${netClearance == null ? '未過網' : netClearance.toFixed(3) + ' m'}</strong></div>
    <div>第一落點：<strong>${landingText}</strong>${firstError == null ? '' : ` / 誤差 ${firstError.toFixed(3)} m`}</div>
    <div>第二落點：<strong>${secondText}</strong>${secondError == null ? '' : ` / 誤差 ${secondError.toFixed(3)} m`}</div>
    <div>落地終點：<strong>${groundText}</strong></div>
    <div>判定：<strong class="${ok ? 'ok' : 'bad'}">${reason}</strong></div>
  `;
}
function exportPrompt(state){
  const payload = JSON.stringify(state, null, 2);
  return `請更新 physics-presets.json，加入或修改以下攝影棚參數：\n\n${payload}`;
}
function updateExport(state){
  document.getElementById('exportText').value = exportPrompt(state);
}
function updateStudio(){
  const state = readState();
  const hints = {
    serve_bounces: '目標 = 第一跳 + 第二跳',
    second_bounce: '目標 = 第二跳',
    first_bounce: '目標 = 第一跳'
  };
  document.getElementById('targetHint').value = hints[state.solve.targetMode] || hints.serve_bounces;
  const base = simulate({...state, variation:{...state.variation, spin:{topspin:0,sidespin:0}, bounce:state.variation.bounce}}, {x:0,y:0,z:0});
  const variant = simulate(state, state.variation.velocity);
  currentPath = variant.points;
  scenes.forEach((scene,index)=>{
    setLine(baseLines[index], base.points);
    setLine(variantLines[index], variant.points);
    markers[index].start.position.set(state.start.x, state.start.y, state.start.z);
    markers[index].first.position.set(state.firstBounce.x, state.firstBounce.y, state.firstBounce.z);
    markers[index].target.position.set(state.target.x, state.target.y, state.target.z);
    const first = variant.points[0] || state.start;
    balls[index].position.set(first.x, first.y, first.z);
  });
  analyze(base, variant, state);
  updateExport(state);
  renderAll();
}
function renderAll(){
  renderers.forEach((renderer,index)=>renderer.render(scenes[index], cameras[index]));
}
function setBallAtPathIndex(index){
  if(!currentPath.length) return;
  const safeIndex = Math.max(0, Math.min(currentPath.length - 1, index));
  const p = currentPath[safeIndex];
  balls.forEach(ball=>ball.position.set(p.x,p.y,p.z));
  renderAll();
}
function stopPlayback(){
  if(animation) cancelAnimationFrame(animation);
  animation = null;
  isPlaying = false;
  document.getElementById('playBtn').textContent = '播放';
}
function play(){
  stopPlayback();
  updateStudio();
  if(!currentPath.length) return;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '播放中';
  setBallAtPathIndex(0);
  playStart = performance.now();
  function tick(now){
    if(!isPlaying || !currentPath.length) return;
    const elapsed = now - playStart;
    const progress = Math.min(1, elapsed / PLAY_MIN_DURATION_MS);
    const i = Math.min(currentPath.length - 1, Math.floor(progress * (currentPath.length - 1)));
    setBallAtPathIndex(i);
    if(progress < 1){
      animation = requestAnimationFrame(tick);
    }else{
      stopPlayback();
    }
  }
  animation = requestAnimationFrame(tick);
}
function replay(){
  stopPlayback();
  updateStudio();
  setBallAtPathIndex(0);
  play();
}
function makeScatter(){
  const state = readState();
  const paths = [];
  for(let i=0;i<12;i++){
    const jitter = {
      x: state.variation.velocity.x + (Math.random() - 0.5) * 0.28,
      y: state.variation.velocity.y + (Math.random() - 0.5) * 0.16,
      z: state.variation.velocity.z + (Math.random() - 0.5) * 0.24
    };
    paths.push(simulate(state, jitter));
  }
  addScatter(paths);
  renderAll();
}
function loadPresets(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(err){ return []; }
}
function savePresets(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function renderPresetOptions(){
  const select = document.getElementById('presetSelect');
  const list = loadPresets();
  select.innerHTML = list.length
    ? list.map((p,i)=>`<option value="${i}">${p.label || p.id}</option>`).join('')
    : '<option value="-1">尚未儲存</option>';
}
function saveCurrent(){
  const list = loadPresets();
  const state = readState();
  state.id = state.label.replace(/\s+/g, '_').toLowerCase();
  const index = list.findIndex(p=>p.id === state.id);
  if(index >= 0) list[index] = state;
  else list.push(state);
  savePresets(list);
  renderPresetOptions();
}
function loadSelected(){
  const list = loadPresets();
  const index = parseInt(document.getElementById('presetSelect').value, 10);
  if(list[index]) applyState(list[index]);
}
async function copyPrompt(){
  const text = document.getElementById('exportText').value;
  try{ await navigator.clipboard.writeText(text); }
  catch(err){
    const area = document.getElementById('exportText');
    area.select();
    document.execCommand('copy');
  }
  const btn = document.getElementById('copyBtn');
  const old = btn.textContent;
  btn.textContent = '已複製';
  setTimeout(()=>btn.textContent = old, 1300);
}

ids.forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener('input', updateStudio);
});
document.getElementById('playBtn').addEventListener('click', play);
document.getElementById('resetBtn').addEventListener('click', replay);
document.getElementById('randomBtn').addEventListener('click', makeScatter);
document.getElementById('saveBtn').addEventListener('click', saveCurrent);
document.getElementById('loadBtn').addEventListener('click', loadSelected);
document.getElementById('copyBtn').addEventListener('click', copyPrompt);

renderPresetOptions();
resize();
updateStudio();
</script>
</body>
</html>
