<!DOCTYPE html>
<html lang="zh-TW" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>桌球物理攝影棚</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;--radius:10px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:#0b1016}
h1{font-size:20px;margin:0;font-weight:900}
.badge{font-size:12px;color:var(--yellow);font-weight:800}
.stage{display:grid;grid-template-columns:1fr 405px;height:calc(100vh - 54px);overflow:hidden}
.views{display:grid;grid-template-rows:minmax(240px,1.08fr) minmax(220px,.92fr);gap:8px;padding:8px;min-height:0}
.view{position:relative;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#05070a}
.view-label{position:absolute;left:10px;top:8px;z-index:2;font-size:12px;color:var(--muted);font-weight:800}
canvas{display:block;width:100%;height:100%}
canvas{touch-action:none;cursor:grab}
canvas.dragging{cursor:grabbing}
.panel{border-left:1px solid var(--border);background:var(--surface);overflow:auto;max-height:calc(100vh - 54px)}
.section{padding:7px 9px;border-bottom:1px solid var(--border)}
.section h2{font-size:11px;margin:0 0 6px;color:var(--yellow)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.grid.two{grid-template-columns:repeat(2,1fr)}
.field{display:grid;gap:3px}
label{font-size:9px;color:var(--muted);font-weight:800}
input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;background:#080b10;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px;font-size:12px}
input[readonly]{color:var(--yellow);background:#111720}
input[type=range]{padding:0}
textarea{min-height:116px;font-family:ui-monospace,Consolas,monospace;font-size:12px;line-height:1.45}
button{border:1px solid var(--blue);background:var(--blue);color:#06111f;border-radius:7px;padding:7px 8px;font-weight:900;cursor:pointer}
button.secondary{background:var(--surface2);color:var(--text);border-color:var(--border)}
button.warn{background:rgba(210,153,34,.12);color:var(--yellow);border-color:var(--yellow)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.status{display:grid;gap:3px;font-size:10.5px;color:var(--muted);line-height:1.3}
.status strong{color:var(--text)}
.ok{color:var(--green)}
.bad{color:var(--red)}
.mono{font-family:ui-monospace,Consolas,monospace}
.preset-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.stack{display:grid;gap:8px}
.toolbar{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:end}
.select-list{width:100%;min-height:180px;background:#080b10;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:4px}
.queue-list{display:grid;gap:6px;max-height:260px;overflow:auto}
.queue-item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center;padding:8px;border:1px solid var(--border);border-radius:8px;background:#111720}
.queue-item.current{border-color:var(--blue);box-shadow:0 0 0 1px rgba(88,166,255,.24) inset}
.queue-title{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{display:inline-flex;align-items:center;padding:2px 6px;border-radius:999px;font-size:10px;font-weight:800;border:1px solid var(--border);background:#0b1016;color:var(--muted)}
.chip.saved{border-color:rgba(63,185,80,.45);color:var(--green);background:rgba(63,185,80,.1)}
.chip.pending{border-color:rgba(210,153,34,.45);color:var(--yellow);background:rgba(210,153,34,.1)}
.chip.current{border-color:rgba(88,166,255,.5);color:var(--blue);background:rgba(88,166,255,.12)}
.chip.repo{border-color:rgba(139,148,158,.42)}
.inline-actions{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}
.inline-actions button{padding:6px 8px}
.hint{font-size:11px;color:var(--muted);line-height:1.45}
.toast{position:fixed;right:12px;top:12px;z-index:40;max-width:min(360px,calc(100vw - 24px));padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(22,27,34,.97);box-shadow:0 12px 32px rgba(0,0,0,.35);font-size:12px;font-weight:800;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .16s ease,transform .16s ease}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:rgba(63,185,80,.45);color:var(--green)}
.toast.warn{border-color:rgba(210,153,34,.45);color:var(--yellow)}
.toggle-line{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.toggle-line input{width:auto;min-height:auto}
.view-toggle,.mobile-dock,.stepper-panel{display:none}
@media (max-width: 900px){
  .stage{grid-template-columns:1fr}
  .stage{height:auto;overflow:visible}
  .panel{border-left:0;border-top:1px solid var(--border);max-height:none;padding-bottom:126px}
  header{padding:10px 12px}
  h1{font-size:18px}
  .views{position:sticky;top:0;z-index:5;height:44vh;min-height:315px;background:var(--bg);grid-template-rows:34px 1fr;gap:6px;padding:6px}
  .view-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .view-toggle button{padding:6px;font-size:12px;background:var(--surface2);color:var(--text);border-color:var(--border)}
  .view-toggle button.active{background:var(--blue);color:#06111f;border-color:var(--blue)}
  .views .view{display:none}
  .views .view.active{display:block}
  .grid{grid-template-columns:repeat(2,1fr)}
  .section{padding:8px 10px}
  input,select,textarea{min-height:38px;font-size:15px}
  label{font-size:10px}
  .mobile-dock{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;background:rgba(13,17,23,.96);border-top:1px solid var(--border)}
  .mobile-dock button{padding:10px 6px;font-size:13px}
  .stepper-panel{position:fixed;left:8px;right:8px;bottom:62px;z-index:21;display:none;gap:6px;padding:8px;background:rgba(22,27,34,.98);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .stepper-panel.active{display:grid}
  .stepper-title{font-size:11px;color:var(--muted);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stepper-buttons{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
  .stepper-buttons button{padding:8px 2px;font-size:12px;background:var(--surface2);color:var(--text);border-color:var(--border)}
  .toolbar{grid-template-columns:1fr 1fr}
  .toolbar .field{grid-column:1 / -1}
  .queue-item{grid-template-columns:1fr}
  .inline-actions{justify-content:flex-start}
}
@media (max-width: 900px) and (orientation: landscape){
  .stage{grid-template-columns:1fr 360px;height:calc(100vh - 46px);overflow:hidden}
  .views{position:static;height:auto;min-height:0}
  .panel{max-height:calc(100vh - 46px);border-left:1px solid var(--border);border-top:0}
}
</style>
</head>
<body translate="no" class="notranslate">
<header>
  <h1>桌球物理攝影棚</h1>
  <div class="badge">Game 4 Studio p7k4m</div>
</header>

<main class="stage">
  <section class="views">
    <div class="view-toggle" aria-label="切換視角">
      <button id="frontViewTab" type="button" class="active" data-view-target="front">我方視角</button>
      <button id="sideViewTab" type="button" data-view-target="side">側面視角</button>
    </div>
    <div class="view" data-view="side">
      <div class="view-label">側面視角</div>
      <canvas id="sideView"></canvas>
    </div>
    <div class="view active" data-view="front">
      <div class="view-label">我方視角</div>
      <canvas id="frontView"></canvas>
    </div>
  </section>

  <aside class="panel">
    <div class="section">
      <h2>作弊反推</h2>
      <div class="grid two" style="margin-bottom:8px">
        <div class="field">
          <label>反推模式</label>
          <select id="solveTarget">
            <option value="serve_bounces" selected>發球雙落點</option>
            <option value="first_bounce">指定第一落點</option>
            <option value="second_bounce">指定第二落點</option>
          </select>
        </div>
        <div class="field"><label>目標說明</label><input id="targetHint" readonly value="目標 = 第一跳 + 第二跳"></div>
      </div>
      <div class="grid">
        <div class="field"><label>起點 X</label><input id="startX" type="number" step="0.01" value="0.28" readonly></div>
        <div class="field"><label>發球高度</label><input id="startY" type="number" step="0.01" value="1.03"></div>
        <div class="field"><label>起點 Z</label><input id="startZ" type="number" step="0.01" value="-1.52" readonly></div>
        <div class="field"><label>第一跳 X</label><input id="firstX" type="number" step="0.01" value="-0.08"></div>
        <div class="field"><label>第一跳 Y</label><input id="firstY" type="number" step="0.01" value="0.78"></div>
        <div class="field"><label>第一跳 Z</label><input id="firstZ" type="number" step="0.01" value="-0.34"></div>
        <div class="field"><label>第二跳 X</label><input id="targetX" type="number" step="0.01" value="-0.46"></div>
        <div class="field"><label>第二跳 Y</label><input id="targetY" type="number" step="0.01" value="0.78"></div>
        <div class="field"><label>第二跳 Z</label><input id="targetZ" type="number" step="0.01" value="0.88"></div>
      </div>
      <div class="grid" style="margin-top:8px">
        <div class="field"><label>底線外距離</label><input id="baselineOffset" type="number" step="0.01" value="0.15"></div>
        <div class="field"><label>左右偏移</label><input id="lateralOffset" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label>共線誤差</label><input id="lineError" readonly value="0"></div>
      </div>
      <div class="grid" style="margin-top:8px">
        <div class="field"><label>第二段時間</label><input id="flightTime" type="number" step="0.01" value="0.74"></div>
        <div class="field"><label>目標過網高度</label><input id="netClearance" type="number" step="0.01" value="0.03"></div>
        <div class="field"><label>重力</label><input id="gravity" type="number" step="0.1" value="-4.2"></div>
      </div>
      <div class="grid" style="margin-top:8px">
        <div class="field"><label>反推 VX</label><input id="baseVx" readonly value="0"></div>
        <div class="field"><label>反推 VY</label><input id="baseVy" readonly value="0"></div>
        <div class="field"><label>反推 VZ</label><input id="baseVz" readonly value="0"></div>
      </div>
      <div class="status" style="margin-top:8px">球桌為真實 2.74m x 1.525m；球的物理直徑為 40mm，畫面中放大顯示方便調參。</div>
    </div>

    <div class="section">
      <h2>變因向量</h2>
      <div class="grid" style="margin-bottom:8px">
        <div class="field">
          <label>旋轉顯示單位</label>
          <select id="spinUnit">
            <option value="rps" selected>rps（畫面調整）</option>
            <option value="rad_s">rad/s（Game 4 儲存值）</option>
          </select>
        </div>
        <div class="field" style="grid-column:span 2">
          <label>單位說明</label>
          <input id="spinUnitHint" readonly value="畫面用 rps 調整；儲存/匯出自動轉成 rad/s">
        </div>
      </div>
      <div class="grid">
        <div class="field"><label>ΔX 速度</label><input id="varX" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label>ΔY 速度</label><input id="varY" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label>ΔZ 速度</label><input id="varZ" type="number" step="0.01" value="0.00"></div>
        <div class="field"><label id="topspinLabel">前後旋 (rps)</label><input id="topspin" type="number" step="0.5" value="-20"></div>
        <div class="field"><label id="sidespinLabel">側旋 (rps)</label><input id="sidespin" type="number" step="0.5" value="-20"></div>
        <div class="field"><label>彈跳</label><input id="bounce" type="number" step="0.01" value="0.95"></div>
      </div>
      <div class="grid" style="margin-top:8px">
        <div class="field">
          <label>旋轉模板</label>
          <select id="spinTemplateSelect">
            <option value="backspin_standard">純下旋模板</option>
            <option value="sidebackspin_standard">標準側下模板</option>
            <option value="no_spin_standard">不轉模板</option>
            <option value="sidebackspin_short_forehand">特殊側下模板</option>
          </select>
        </div>
        <div class="field">
          <label>目前匹配</label>
          <input id="spinTemplateStatus" readonly value="純下旋模板">
        </div>
        <div class="field" style="align-self:end">
          <button id="applySpinTemplateBtn" type="button" class="secondary">套用模板</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>操作</h2>
      <div class="actions">
        <button id="playBtn" type="button">播放</button>
        <button id="resetBtn" type="button" class="secondary">重播</button>
        <button id="randomBtn" type="button" class="warn">產生散布</button>
        <button id="copyBtn" type="button" class="secondary">複製指令</button>
      </div>
    </div>

    <div class="section">
      <h2>分析</h2>
      <div class="status" id="status"></div>
    </div>

    <div class="section">
      <h2>Preset</h2>
      <div class="stack" style="margin-bottom:8px">
        <div class="toolbar">
          <div class="field">
            <label>搜尋 repo preset</label>
            <input id="presetSearch" placeholder="可用名稱 / id / spin / length / placement 搜尋">
          </div>
          <button id="loadRepoBtn" type="button" class="secondary">載入選取</button>
          <button id="queueSelectedBtn" type="button" class="warn">加入待修</button>
        </div>
        <div class="field">
          <label>Game 4 目前 repo preset（可多選）</label>
          <select id="repoPresetSelect" class="select-list" size="8" multiple></select>
        </div>
        <div class="hint">先把有問題的球加入待修清單，再逐顆載入、修改、儲存。已儲存的球會顯示綠色標記。</div>
      </div>
      <div class="grid" style="margin-bottom:6px">
        <div class="field">
          <label>旋轉類型</label>
          <select id="presetSpinType">
            <option value="sidebackspin">側下</option>
            <option value="sidespin">側旋</option>
            <option value="backspin">下旋</option>
            <option value="topspin">上旋</option>
            <option value="no_spin">不轉</option>
          </select>
        </div>
        <div class="field">
          <label>長短</label>
          <select id="presetLength">
            <option value="short">短球</option>
            <option value="half_long">半出台</option>
            <option value="long">長球</option>
          </select>
        </div>
        <div class="field">
          <label>落點</label>
          <select id="presetPlacement">
            <option value="backhand">反手</option>
            <option value="middle">中路</option>
            <option value="forehand">正手</option>
            <option value="wide_forehand">大角正手</option>
            <option value="wide_backhand">大角反手</option>
          </select>
        </div>
      </div>
      <div class="preset-row">
        <div class="field"><label>名稱</label><input id="presetName" value="側下長球到反手"></div>
        <button id="saveBtn" type="button">儲存</button>
      </div>
      <div class="preset-row" style="margin-top:8px">
        <div class="status" id="editStatus"></div>
        <button id="saveCopyBtn" type="button" class="secondary">儲存並複製</button>
      </div>
      <label class="toggle-line" style="margin-top:8px">
        <input id="autoCopyOnSave" type="checkbox">
        儲存後自動複製目前這顆 preset
      </label>
      <div class="preset-row" style="margin-top:8px">
        <div class="field"><label>已存參數</label><select id="presetSelect"></select></div>
        <button id="loadBtn" type="button" class="secondary">載入</button>
      </div>
      <div class="field" style="margin-top:8px">
        <label>待修清單</label>
        <div id="issueQueue" class="queue-list"></div>
      </div>
      <div class="actions" style="margin-top:6px">
        <button id="copyQueueBtn" type="button" class="warn">複製待修已存</button>
        <button id="copyAllBtn" type="button" class="secondary">複製全部</button>
        <button id="clearQueueBtn" type="button" class="secondary">清空待修</button>
        <button id="clearPresetBtn" type="button" class="secondary">清空暫存</button>
      </div>
    </div>

    <div class="section">
      <h2>匯出</h2>
      <textarea id="exportText" readonly></textarea>
    </div>
  </aside>
</main>
<div id="toast" class="toast" aria-live="polite"></div>
<div class="stepper-panel" id="stepperPanel">
  <div class="stepper-title" id="stepperTitle">選取數字欄位後可微調</div>
  <div class="stepper-buttons">
    <button type="button" data-step-delta="-0.10">-0.10</button>
    <button type="button" data-step-delta="-0.05">-0.05</button>
    <button type="button" data-step-delta="-0.01">-0.01</button>
    <button type="button" data-step-delta="0.01">+0.01</button>
    <button type="button" data-step-delta="0.05">+0.05</button>
    <button type="button" data-step-delta="0.10">+0.10</button>
  </div>
</div>
<div class="mobile-dock">
  <button id="mobilePlayBtn" type="button">播放</button>
  <button id="mobileResetBtn" type="button" class="secondary">重播</button>
  <button id="mobileSaveBtn" type="button" class="warn">儲存</button>
  <button id="mobileCopyBtn" type="button" class="secondary">複製</button>
</div>

<script src="vendor/three.r128.min.js"></script>
<script>
const TABLE = { length: 2.74, width: 1.525, height: 0.76, top: 0.781, net: 0.1525 };
const BALL_RADIUS = 0.02;
const BALL_RENDER_RADIUS = 0.034;
const STORAGE_KEY = 'tt-physics-studio-presets-v1';
const TRACKER_KEY = 'tt-physics-studio-tracker-v1';
const SPIN_UNIT_KEY = 'tt-physics-studio-spin-unit-v1';
const RAD_PER_RPS = Math.PI * 2;
const PLAY_MIN_DURATION_MS = 3000;
const MAX_TABLE_BOUNCES = 8;
const BOUNCE_PHYSICS = {
  horizontalRestitution: 0.98,
  topspinKick: 0.30,
  sidespinKick: 0.22
};
const ids = ['solveTarget','startY','baselineOffset','lateralOffset','firstX','firstY','firstZ','targetX','targetY','targetZ','flightTime','netClearance','gravity','varX','varY','varZ','topspin','sidespin','bounce','presetSpinType','presetLength','presetPlacement','presetName'];
const PRESET_TAG_LABELS = {
  spinType: {sidebackspin:'側下', sidespin:'側旋', backspin:'下旋', topspin:'上旋', no_spin:'不轉'},
  length: {short:'短球', half_long:'半出台', long:'長球'},
  placement: {backhand:'反手', middle:'中路', forehand:'正手', wide_forehand:'大角正手', wide_backhand:'大角反手'}
};
const SPIN_TEMPLATES = {
  backspin_standard: {label:'純下旋模板', spinType:'backspin', topspin:-125.66, sidespin:0, bounce:0.88},
  sidebackspin_standard: {label:'標準側下模板', spinType:'sidebackspin', topspin:-125.66, sidespin:-125.66, bounce:0.88},
  no_spin_standard: {label:'不轉模板', spinType:'no_spin', topspin:0, sidespin:0, bounce:0.88},
  sidebackspin_short_forehand: {label:'特殊側下模板', spinType:'sidebackspin', topspin:-125.66, sidespin:-150.8, bounce:0.88}
};
let animation = null;
let playStart = 0;
let isPlaying = false;
let currentPath = [];
let scatterLines = [];
let activeStepperInput = null;
let dragPoint = null;
let dragPointerId = null;
let repoPresets = [];
let currentPresetId = '';
let currentPresetSource = 'manual';
let toastTimer = null;
let lastSpinUnit = 'rps';
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -TABLE.top);
const dragIntersection = new THREE.Vector3();

function num(id){ return parseFloat(document.getElementById(id).value); }
function setValue(id, value){ document.getElementById(id).value = value; }
function currentSpinUnit(){
  return document.getElementById('spinUnit')?.value || 'rps';
}
function radToRps(value){ return value / RAD_PER_RPS; }
function rpsToRad(value){ return value * RAD_PER_RPS; }
function displaySpinValue(rad){
  return currentSpinUnit() === 'rps' ? radToRps(rad) : rad;
}
function storedSpinValue(display){
  return currentSpinUnit() === 'rps' ? rpsToRad(display) : display;
}
function writeSpinField(id, radValue){
  const display = displaySpinValue(radValue || 0);
  setValue(id, Number.isFinite(display) ? Number(display.toFixed(currentSpinUnit() === 'rps' ? 2 : 3)) : 0);
}
function readSpinField(id){
  return storedSpinValue(num(id) || 0);

function computeServeStart(firstBounce, secondBounce, height, baselineOffset, lateralOffset){

  const dx = secondBounce.x - firstBounce.x;
  const dz = secondBounce.z - firstBounce.z;
  const t = Math.abs(dz) < 0.001 ? 0 : (startZ - firstBounce.z) / dz;
  const lineX = firstBounce.x + dx * t;
  const length = Math.hypot(dx, dz) || 1;
  const perpX = -dz / length;
  const perpZ = dx / length;
  return {
    x: lineX + perpX * lateralOffset,
    y: height,
    z: startZ + perpZ * lateralOffset
  };
}

  const bz = start.z - firstBounce.z;
  const length = Math.hypot(ax, az) || 1;
  return Math.abs(ax * bz - az * bx) / length;

  const dx = secondBounce.x - firstBounce.x;
  const dz = secondBounce.z - firstBounce.z;
  const length = Math.hypot(dx, dz) || 1;
  const perpX = -dz / length;
  const perpZ = dx / length;
  const lateralOffset = state.serveLine?.lateralOffset ?? ((start.x ?? autoStart.x) - autoStart.x) * perpX + ((start.z ?? autoStart.z) - autoStart.z) * perpZ;
  return {
    height: state.serveLine?.height ?? start.y ?? 1.03,
    baselineOffset,
    lateralOffset

}

    ? {x:incomingX / speed, z:incomingZ / speed}

function simulateWithBaseVelocity(state, baseVel, variant){
  const velocity = addVec(baseVel, variant || {x:0,y:0,z:0});
  const spin = state.variation.spin;
  const bounce = state.variation.bounce;
  const gravity = state.solve.gravity;
  const pos = cloneVec(state.start);
  const vel = cloneVec(velocity);
  const points = [];
  const bounces = [];
  let netY = null;
  let firstLanding = null;
  let groundLanding = null;
  let crossedNet = false;
  for(let i=0;i<360;i++){
    const dt = 1/120;
    const t = (i + 1) * dt;
    const prev = cloneVec(pos);
    vel.y += gravity * dt;
    pos.x += vel.x * dt;
    pos.y += vel.y * dt;
    pos.z += vel.z * dt;
    if(!crossedNet && prev.z < 0 && pos.z >= 0){
      const ratio = (0 - prev.z) / (pos.z - prev.z || 1);
      netY = prev.y + (pos.y - prev.y) * ratio;
      crossedNet = true;
    }
    const crossedTableTop = prev.y >= TABLE.top && pos.y <= TABLE.top;
    if(crossedTableTop && vel.y < 0){
      const ratio = (TABLE.top - prev.y) / (pos.y - prev.y || 1);
      const impact = {
        x: prev.x + (pos.x - prev.x) * ratio,
        y: TABLE.top,
        z: prev.z + (pos.z - prev.z) * ratio
      };
      const onTable = Math.abs(impact.x) <= TABLE.width/2 && Math.abs(impact.z) <= TABLE.length/2;
      if(onTable){
        pos.x = impact.x;
        pos.y = impact.y;
        pos.z = impact.z;
        const bouncePoint = {...cloneVec(pos), t: t - dt + dt * ratio};
        if(!firstLanding) firstLanding = bouncePoint;
        bounces.push(bouncePoint);
        if(bounces.length > MAX_TABLE_BOUNCES){
          points.push(bouncePoint);
          break;
        }
        applyBounceSpin(vel, spin, bounce);
      }
    }
    if(pos.y <= BALL_RADIUS && prev.y > BALL_RADIUS){
      const ratio = (BALL_RADIUS - prev.y) / (pos.y - prev.y || 1);
      groundLanding = {
        x: prev.x + (pos.x - prev.x) * ratio,
        y: BALL_RADIUS,
        z: prev.z + (pos.z - prev.z) * ratio,
        t: t - dt + dt * ratio
      };
      points.push(groundLanding);
      break;
    }
    points.push(cloneVec(pos));
    if(Math.abs(pos.x) > 3 || Math.abs(pos.z) > 4) break;
  }
  return {points, baseVel, velocity, netY, firstLanding, groundLanding, bounces};
}

function resize(){
  canvases.forEach((canvas,index)=>{
    const box = canvas.parentElement.getBoundingClientRect();
    if(box.width < 2 || box.height < 2) return;
    renderers[index].setSize(box.width, box.height, false);
    cameras[index].aspect = box.width / box.height;
    cameras[index].updateProjectionMatrix();
  });
  renderAll();
}
window.addEventListener('resize', resize);
function eventToNdc(event, canvas){
  const rect = canvas.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
}
function pointFromCanvas(event, canvasIndex){
  const canvas = canvases[canvasIndex];
  eventToNdc(event, canvas);
  raycaster.setFromCamera(pointer, cameras[canvasIndex]);
  return raycaster.ray.intersectPlane(dragPlane, dragIntersection)
    ? dragIntersection
    : null;
}
function nearestDragPoint(event, canvasIndex){
  const canvas = canvases[canvasIndex];
  eventToNdc(event, canvas);
  raycaster.setFromCamera(pointer, cameras[canvasIndex]);
  const hits = raycaster.intersectObjects([markers[canvasIndex].first, markers[canvasIndex].target], false);
  if(hits[0]?.object?.userData?.dragPoint) return hits[0].object.userData.dragPoint;
  const point = pointFromCanvas(event, canvasIndex);
  if(!point) return null;
  const firstDistance = Math.hypot(point.x - num('firstX'), point.z - num('firstZ'));
  const targetDistance = Math.hypot(point.x - num('targetX'), point.z - num('targetZ'));
  const nearest = firstDistance <= targetDistance ? 'first' : 'target';
  return Math.min(firstDistance, targetDistance) <= 0.22 ? nearest : null;
}
function applyDragPoint(pointName, point){
  const x = Math.max(-TABLE.width / 2, Math.min(TABLE.width / 2, point.x));
  const z = Math.max(-TABLE.length / 2, Math.min(TABLE.length / 2, point.z));
  if(pointName === 'first'){
    setValue('firstX', x.toFixed(2));
    setValue('firstY', TABLE.top.toFixed(2));
    setValue('firstZ', z.toFixed(2));
  }else if(pointName === 'target'){
    setValue('targetX', x.toFixed(2));
    setValue('targetY', TABLE.top.toFixed(2));
    setValue('targetZ', z.toFixed(2));
  }
  updateStudio();
}
function setupDragPoints(){
  canvases.forEach((canvas,index)=>{
    canvas.style.touchAction = 'none';
    canvas.addEventListener('pointerdown', event=>{
      const pointName = nearestDragPoint(event, index);
      if(!pointName) return;
      dragPoint = pointName;
      dragPointerId = event.pointerId;
      canvas.setPointerCapture(event.pointerId);
      canvas.classList.add('dragging');
      const point = pointFromCanvas(event, index);
      if(point) applyDragPoint(dragPoint, point);
    });
    canvas.addEventListener('pointermove', event=>{
      if(dragPointerId !== event.pointerId || !dragPoint) return;
      const point = pointFromCanvas(event, index);
      if(point) applyDragPoint(dragPoint, point);
    });
    canvas.addEventListener('pointerup', event=>{
      if(dragPointerId !== event.pointerId) return;
      dragPoint = null;
      dragPointerId = null;
      canvas.classList.remove('dragging');
      if(canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
    });
    canvas.addEventListener('pointercancel', event=>{
      if(dragPointerId !== event.pointerId) return;
      dragPoint = null;
      dragPointerId = null;
      canvas.classList.remove('dragging');
    });
  });
}

function setupMobileSteppers(){
  const panel = document.getElementById('stepperPanel');
  const title = document.getElementById('stepperTitle');
  const isMobileStepper = () => window.matchMedia('(max-width: 900px)').matches;
  const activateStepperInput = input => {
    activeStepperInput = input;
    const label = input.closest('.field')?.querySelector('label')?.textContent || input.id;
    title.textContent = label;
    panel.classList.add('active');
  };
  document.querySelectorAll('input[type="number"]:not([readonly])').forEach(input=>{
    input.addEventListener('pointerdown', event=>{
      if(!isMobileStepper()) return;
      event.preventDefault();
      activateStepperInput(input);
      input.blur();
    });
    input.addEventListener('focus', event=>{
      activateStepperInput(input);
      if(isMobileStepper()) event.target.blur();
    });
  });
  document.querySelectorAll('[data-step-delta]').forEach(button=>{
    button.addEventListener('pointerdown', event=>event.preventDefault());
    button.addEventListener('click', ()=>{
      if(!activeStepperInput) return;
      const delta = parseFloat(button.dataset.stepDelta);
      const current = parseFloat(activeStepperInput.value || '0') || 0;
      activeStepperInput.value = (current + delta).toFixed(2);
      activeStepperInput.dispatchEvent(new Event('input', {bubbles:true}));
      if(!isMobileStepper()) activeStepperInput.focus({preventScroll:true});
    });
  });
}

function analyze(base, variant, state){
  setValue('baseVx', base.baseVel.x.toFixed(3));
  setValue('baseVy', base.baseVel.y.toFixed(3));
  setValue('baseVz', base.baseVel.z.toFixed(3));
  const netClearance = variant.netY == null ? null : variant.netY - (TABLE.height + TABLE.net);
  const serveBounces = state.solve.targetMode === 'serve_bounces' ? getServeBounces(variant) : null;
  const landing = serveBounces?.first || variant.firstLanding;
  const secondLanding = serveBounces?.second || variant.bounces[1];
  const ground = variant.groundLanding || variant.points[variant.points.length - 1];
  const landingText = landing ? `${landing.x.toFixed(2)}, ${landing.z.toFixed(2)}` : '未落桌';
  const secondText = secondLanding ? `${secondLanding.x.toFixed(2)}, ${secondLanding.z.toFixed(2)}` : '未達第二跳';
  const groundText = ground ? `${ground.x.toFixed(2)}, ${ground.z.toFixed(2)}` : '未落地';
  const firstTarget = state.firstBounce || state.target;
  const secondTarget = state.target;
  const serveLineError = lineError(state.start, firstTarget, secondTarget);
  const outsideBaseline = state.start.z < -TABLE.length / 2;
  const firstError = landing ? Math.hypot(landing.x - firstTarget.x, landing.z - firstTarget.z) : null;
  const secondError = secondLanding ? Math.hypot(secondLanding.x - secondTarget.x, secondLanding.z - secondTarget.z) : null;
  const secondLegTime = landing && secondLanding ? secondLanding.t - landing.t : null;
  const targetSecondLegTime = state.solve.secondLegTime ?? state.solve.flightTime;
  const targetNetClearance = state.solve.netClearance ?? 0.03;
  const netDiff = netClearance == null ? null : netClearance - targetNetClearance;
  const timeDiff = secondLegTime == null ? null : secondLegTime - targetSecondLegTime;
  const profile = getServeLengthProfile(state);
  const actualLength = state.solve.targetMode === 'serve_bounces'
    ? classifyServeLength(variant)
    : {key:'unknown', label:'未判定', z:null};
  const horizontalSpeed = Math.hypot(base.baseVel.x, base.baseVel.z);
  const spinStrength = Math.hypot(state.variation.spin.topspin, state.variation.spin.sidespin);
  const solverIssues = [];
  if(state.solve.targetMode === 'serve_bounces'){
    if(base.baseVel.y > profile.vySoftMax + 0.08){
      solverIssues.push('發球 VY 向上過大');
    }
    if(horizontalSpeed > profile.speedHardMax){
      solverIssues.push(`水平速度過大：${horizontalSpeed.toFixed(2)} m/s`);
    }
    if(profile.key === 'short' && spinStrength < 0.45){
      solverIssues.push('短球旋轉偏弱');
    }
    if(profile.key !== actualLength.key && !(profile.key === 'long' && actualLength.key === 'half_out')){
      solverIssues.push(`實際長短：${actualLength.label}`);
    }
    if(netClearance == null){
      solverIssues.push('過網目標未達成：未測到過網高度');
    }else if(netDiff > 0.05){
      solverIssues.push(`過網目標未達成：偏高 ${(netDiff * 100).toFixed(1)} cm`);
    }else if(netDiff < -0.015){
      solverIssues.push(`過網目標未達成：偏低 ${Math.abs(netDiff * 100).toFixed(1)} cm`);
    }
    if(secondLegTime == null){
      solverIssues.push('第二段時間未達成：沒有第二跳');
    }else if(Math.abs(timeDiff) > 0.08){
      solverIssues.push(`第二段時間未達成：${timeDiff > 0 ? '偏慢' : '偏快'} ${Math.abs(timeDiff).toFixed(3)} s`);
    }
  }
  const solverTargetOk = solverIssues.length === 0;
  const solverIssueText = solverTargetOk ? '目標大致達成' : solverIssues.join(' / ');
  const firstOk = landing && firstError < 0.08;
  const secondOk = secondLanding && secondError < 0.1;
  const netOk = netClearance == null || netClearance > 0;
  const ok = state.solve.targetMode === 'serve_bounces'
    ? firstOk && secondOk && netOk
    : landing && Math.abs(landing.x) <= TABLE.width/2 && Math.abs(landing.z) <= TABLE.length/2 && netOk;
  const reason = !landing
    ? '未落桌'
    : !netOk
      ? '掛網風險'
      : state.solve.targetMode === 'serve_bounces' && !secondLanding
        ? '未達接球端第二跳'
        : state.solve.targetMode === 'serve_bounces' && (!firstOk || !secondOk)
          ? '落點偏離'
          : ok ? '有效落桌' : '出界';
  let tip = '參數可用';
  if(state.solve.targetMode === 'serve_bounces' && secondLanding){
    const secondLong = secondLanding.z - secondTarget.z;
    if(secondLong > 0.12) tip = '第二跳偏長：加下旋、降低彈跳，或縮短第二段時間';
    else if(secondLong < -0.12) tip = '第二跳偏短：減少下旋、提高彈跳，或拉長第二段時間';
    else if(!solverTargetOk) tip = '條件未完全達成：優先調整重力、第一跳、第二跳或發球高度，不要只怪單一參數';
    else if(netClearance != null && netClearance - targetNetClearance > 0.08) tip = '過網偏高：降低目標過網高度或縮短第二段時間';
    else if(netClearance != null && targetNetClearance - netClearance > 0.04) tip = '過網偏低：提高目標過網高度或拉長第二段時間';
  }
  if(state.solve.targetMode === 'serve_bounces' && !solverTargetOk){
    tip = '條件未完全達成：優先調整重力、第一跳、第二跳或發球高度，不要只怪單一參數';
  }
  document.getElementById('status').innerHTML = `
    <div>基礎速度：<strong class="mono">${base.baseVel.x.toFixed(2)}, ${base.baseVel.y.toFixed(2)}, ${base.baseVel.z.toFixed(2)}</strong></div>
    <div>變因後：<strong class="mono">${variant.velocity.x.toFixed(2)}, ${variant.velocity.y.toFixed(2)}, ${variant.velocity.z.toFixed(2)}</strong></div>
    <div>自動起點：<strong class="mono">${state.start.x.toFixed(2)}, ${state.start.y.toFixed(2)}, ${state.start.z.toFixed(2)}</strong> / ${outsideBaseline ? '底線外' : '仍在桌內'}</div>
    <div>平面共線誤差：<strong class="${serveLineError < 0.03 ? 'ok' : 'bad'}">${serveLineError.toFixed(3)} m</strong></div>
    <div>Length target: <strong>${profile.label}</strong> / actual: <strong class="${profile.key === actualLength.key || (profile.key === 'long' && actualLength.key === 'half_out') ? 'ok' : 'bad'}">${actualLength.label}${actualLength.z == null ? '' : ' ' + actualLength.z.toFixed(2)}</strong></div>
    <div>Horizontal speed: <strong class="${horizontalSpeed <= profile.speedHardMax ? 'ok' : 'bad'}">${horizontalSpeed.toFixed(2)} m/s</strong> / ideal ${profile.speedIdealMin.toFixed(1)}-${profile.speedIdealMax.toFixed(1)}</div>
    <div>Spin strength: <strong class="${profile.key !== 'short' || spinStrength >= 0.45 ? 'ok' : 'bad'}">${spinStrength.toFixed(2)}</strong>${profile.key === 'short' ? ' / short serve >= 0.45' : ''}</div>
    <div>過網高度：<strong class="${netClearance == null || netClearance >= 0 ? 'ok' : 'bad'}">${netClearance == null ? '未過網' : netClearance.toFixed(3) + ' m'}</strong> / 目標 ${targetNetClearance.toFixed(3)} m</div>
    <div>第二段時間：<strong>${secondLegTime == null ? '未達第二跳' : secondLegTime.toFixed(3) + ' s'}</strong> / 目標 ${targetSecondLegTime.toFixed(3)} s</div>
    <div>Solver 目標：<strong class="${solverTargetOk ? 'ok' : 'bad'}">${solverIssueText}</strong></div>
    <div>第一落點${state.solve.targetMode === 'serve_bounces' ? '（發球端）' : ''}：<strong>${landingText}</strong>${firstError == null ? '' : ` / 誤差 ${firstError.toFixed(3)} m`}</div>
    <div>第二落點${state.solve.targetMode === 'serve_bounces' ? '（接球端）' : ''}：<strong>${secondText}</strong>${secondError == null ? '' : ` / 誤差 ${secondError.toFixed(3)} m`}</div>
    <div>落地終點：<strong>${groundText}</strong></div>
    <div>判定：<strong class="${ok ? 'ok' : 'bad'}">${reason}</strong></div>
    <div>調整建議：<strong>${tip}</strong></div>
  `;
}

function setBallAtPathIndex(index){
  if(!currentPath.length) return;
  const safeIndex = Math.max(0, Math.min(currentPath.length - 1, index));

  balls.forEach(ball=>ball.position.set(p.x,p.y,p.z));

function stopPlayback(){
  if(animation) cancelAnimationFrame(animation);
  animation = null;
  isPlaying = false;
  document.getElementById('playBtn').textContent = '播放';
}
function play(){
  stopPlayback();
  updateStudio();
  if(!currentPath.length) return;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '播放中';
  setBallAtPathIndex(0);
  playStart = performance.now();
  function tick(now){
    if(!isPlaying || !currentPath.length) return;
    const elapsed = now - playStart;
    const progress = Math.min(1, elapsed / PLAY_MIN_DURATION_MS);
    const i = Math.min(currentPath.length - 1, Math.floor(progress * (currentPath.length - 1)));
    setBallAtPathIndex(i);
    if(progress < 1){
      animation = requestAnimationFrame(tick);
    }else{
      stopPlayback();
    }
  }
  animation = requestAnimationFrame(tick);
}
function replay(){
  stopPlayback();
  updateStudio();
  setBallAtPathIndex(0);
  play();
}
function makeScatter(){
  const state = readState();
  const paths = [];
  for(let i=0;i<12;i++){
    const jitter = {
      x: state.variation.velocity.x + (Math.random() - 0.5) * 0.28,
      y: state.variation.velocity.y + (Math.random() - 0.5) * 0.16,
      z: state.variation.velocity.z + (Math.random() - 0.5) * 0.24
    };
    paths.push(simulate(state, jitter));
  }
  addScatter(paths);
  renderAll();
}
function loadPresets(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(err){ return []; }
}
function savePresets(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function renderPresetOptions(){
  const select = document.getElementById('presetSelect');
  const list = loadPresets();
  select.innerHTML = list.length
    ? list.map((p,i)=>{
        const length = p.tagLabels?.length || PRESET_TAG_LABELS.length[p.tags?.length] || '未分類';
        const placement = p.tagLabels?.placement || PRESET_TAG_LABELS.placement[p.tags?.placement] || '';
        return `<option value="${i}">${p.label || p.id} · ${length} · ${placement}</option>`;
      }).join('')
    : '<option value="-1">尚未儲存</option>';
}
function saveCurrent(){
  const list = loadPresets();
  const state = readState();
  state.id = state.label.replace(/\s+/g, '_').toLowerCase();
  const index = list.findIndex(p=>p.id === state.id);
  if(index >= 0) list[index] = state;
  else list.push(state);
  savePresets(list);
  renderPresetOptions();
}
function loadSelected(){
  const list = loadPresets();
  const index = parseInt(document.getElementById('presetSelect').value, 10);
  if(list[index]) applyState(list[index]);
}
async function writeClipboard(text){
  try{ await navigator.clipboard.writeText(text); }
  catch(err){
    const area = document.getElementById('exportText');
    area.value = text;
    area.select();
    document.execCommand('copy');
  }
}
async function copyAllPresets(){
  const list = loadPresets();
  const text = exportPresetList(list);
  document.getElementById('exportText').value = text;
  await writeClipboard(text);
  const btn = document.getElementById('copyAllBtn');
  const old = btn.textContent;
  btn.textContent = '已複製';
  setTimeout(()=>btn.textContent = old, 1300);
}
function clearPresets(){
  if(!confirm('清空目前瀏覽器暫存的全部攝影棚 preset？')) return;
  savePresets([]);
  renderPresetOptions();
  updateExport(readState());
}
async function copyPrompt(){
  const text = document.getElementById('exportText').value;
  await writeClipboard(text);
  const btn = document.getElementById('copyBtn');
  const old = btn.textContent;
  btn.textContent = '已複製';
  setTimeout(()=>btn.textContent = old, 1300);
}

function getFilteredRepoPresets(){
  const query = (document.getElementById('presetSearch')?.value || '').trim().toLowerCase();
  if(!query) return repoPresets;
  return repoPresets.filter(preset=>{
    const text = [
      preset.id,
      preset.label,
      preset.tags?.spinType,
      preset.tags?.length,
      preset.tags?.placement,
      formatTagSummary(preset)
    ].filter(Boolean).join(' ').toLowerCase();
    return text.includes(query);
  });
}
function renderRepoPresetOptions(){
  const select = document.getElementById('repoPresetSelect');
  if(!select) return;
  const savedMap = getSavedPresetMap();
  const selected = new Set(Array.from(select.selectedOptions).map(option=>option.value));
  const filtered = getFilteredRepoPresets();
  select.innerHTML = filtered.length
    ? filtered.map(preset=>{
        const marker = savedMap.has(preset.id) ? ' [已存]' : '';
        return `<option value="${preset.id}">${preset.label || preset.id}${marker} | ${formatTagSummary(preset)}</option>`;
      }).join('')
    : '<option value="">沒有符合的 repo preset</option>';
  Array.from(select.options).forEach(option=>{
    if(selected.has(option.value)) option.selected = true;
  });
}
function renderPresetOptions(){
  const select = document.getElementById('presetSelect');
  const list = loadPresets();
  const tracker = loadTracker();
  select.innerHTML = list.length
    ? list.map((p,i)=>{
        const stamp = tracker.savedAt[p.id] ? ` | ${new Date(tracker.savedAt[p.id]).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}` : '';
        return `<option value="${i}">${p.label || p.id} | ${formatTagSummary(p)}${stamp}</option>`;
      }).join('')
    : '<option value="-1">尚未儲存任何 preset</option>';
}
function renderEditStatus(){
  const status = document.getElementById('editStatus');
  if(!status) return;
  const tracker = loadTracker();
  const savedMap = getSavedPresetMap();
  const label = document.getElementById('presetName').value.trim() || '未命名';
  const targetId = currentPresetId || normalizePresetId(label);
  const sourceText = currentPresetSource === 'repo' ? 'repo preset' : currentPresetSource === 'saved' ? '已存版本' : '手動建立';
  const savedAt = tracker.savedAt[targetId];
  const saveText = savedMap.has(targetId)
    ? `<span class="chip saved">已儲存${savedAt ? ` ${new Date(savedAt).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}` : ''}</span>`
    : '<span class="chip pending">尚未儲存</span>';
  status.innerHTML = `
    <div><strong>${label}</strong></div>
    <div class="queue-meta">
      <span class="chip repo">${sourceText}</span>
      <span class="chip">${targetId}</span>
      ${saveText}
    </div>
  `;
}
function renderIssueQueue(){
  const box = document.getElementById('issueQueue');
  if(!box) return;
  const tracker = loadTracker();
  const savedMap = getSavedPresetMap();
  if(!tracker.queue.length){
    box.innerHTML = '<div class="hint">還沒有待修球。先從上面的 repo preset 多選，按「加入待修」。</div>';
    return;
  }
  box.innerHTML = tracker.queue.map(id=>{
    const preset = getPresetById(id);
    const title = preset?.label || id;
    const summary = preset ? formatTagSummary(preset) : '找不到 preset';
    const chips = [
      currentPresetId === id ? '<span class="chip current">目前編輯</span>' : '',
      savedMap.has(id) ? '<span class="chip saved">已存</span>' : '<span class="chip pending">待修改</span>'
    ].filter(Boolean).join('');
    return `
      <div class="queue-item ${currentPresetId === id ? 'current' : ''}" data-queue-id="${id}">
        <div>
          <div class="queue-title">${title}</div>
          <div class="hint">${summary}</div>
          <div class="queue-meta">${chips}</div>
        </div>
        <div class="inline-actions">
          <button type="button" class="secondary" data-queue-action="load" data-id="${id}">載入</button>
          <button type="button" class="secondary" data-queue-action="remove" data-id="${id}">移除</button>
        </div>
      </div>
    `;
  }).join('');
}
function setCurrentPresetContext(id, source){
  currentPresetId = id || '';
  currentPresetSource = source || 'manual';
  renderEditStatus();
  renderIssueQueue();
}
function ensureQueueHas(id){
  if(!id) return;
  const tracker = loadTracker();
  if(!tracker.queue.includes(id)){
    tracker.queue.push(id);
    saveTracker(tracker);
  }
}
function removeFromQueue(id){
  const tracker = loadTracker();
  tracker.queue = tracker.queue.filter(item=>item !== id);
  saveTracker(tracker);
  renderIssueQueue();
}
function getSelectedRepoIds(){
  return Array.from(document.getElementById('repoPresetSelect').selectedOptions)
    .map(option=>option.value)
    .filter(Boolean);
}
function loadPresetForEditing(id, source='repo'){
  const preset = getPresetById(id, source === 'repo' ? 'repo_first' : 'saved_first');
  if(!preset){
    showToast(`找不到 preset: ${id}`, 'warn');
    return;
  }
  applyState(preset);
  setCurrentPresetContext(preset.id || id, source);
  showToast(`已載入 ${preset.label || preset.id}`);
}
function loadSelectedRepoPreset(){
  const ids = getSelectedRepoIds();
  if(!ids.length){
    showToast('請先選一顆 repo preset', 'warn');
    return;
  }
  loadPresetForEditing(ids[0], 'repo');
}
function queueSelectedPresets(){
  const ids = getSelectedRepoIds();
  if(!ids.length){
    showToast('請先多選要修的球', 'warn');
    return;
  }
  ids.forEach(ensureQueueHas);
  renderIssueQueue();
  showToast(`已加入待修 ${ids.length} 顆`);
}
function markPresetSaved(id){
  const tracker = loadTracker();
  tracker.savedAt[id] = new Date().toISOString();
  if(!tracker.queue.includes(id)) tracker.queue.push(id);
  saveTracker(tracker);
}
async function saveCurrent(options={}){
  const list = loadPresets();
  const state = readState();
  const targetId = currentPresetId || normalizePresetId(state.label);
  state.id = targetId;
  state.label = state.label || state.id || '未命名';
  const index = list.findIndex(p=>p.id === state.id);
  if(index >= 0) list[index] = state;
  else list.push(state);
  savePresets(list);
  markPresetSaved(state.id);
  setCurrentPresetContext(state.id, 'saved');
  renderPresetOptions();
  renderRepoPresetOptions();
  renderIssueQueue();
  renderEditStatus();
  updateExport(state);
  showToast(`已儲存 ${state.label}`);
  if(options.copy || document.getElementById('autoCopyOnSave').checked){
    const text = exportPrompt(state);
    document.getElementById('exportText').value = text;
    await writeClipboard(text);
    showToast(`已儲存並複製 ${state.label}`);
  }
}
function loadSelected(){
  const list = loadPresets();
  const index = parseInt(document.getElementById('presetSelect').value, 10);
  if(list[index]){
    applyState(list[index]);
    setCurrentPresetContext(list[index].id, 'saved');
  }
}
async function copyQueuePresets(){
  const tracker = loadTracker();
  const savedMap = getSavedPresetMap();
  const list = tracker.queue.map(id=>savedMap.get(id)).filter(Boolean);
  if(!list.length){
    showToast('待修清單裡還沒有已存好的球', 'warn');
    return;
  }
  const text = exportPresetList(list);
  document.getElementById('exportText').value = text;
  await writeClipboard(text);
  showToast(`已複製待修已存 ${list.length} 顆`);
}
async function copyAllPresets(){
  const list = loadPresets();
  const text = exportPresetList(list);
  document.getElementById('exportText').value = text;
  await writeClipboard(text);
  showToast(`已複製全部 ${list.length} 顆`);
}
function clearQueue(){
  if(!confirm('清空待修清單？已儲存的 preset 不會被刪掉。')) return;
  const tracker = loadTracker();
  tracker.queue = [];
  saveTracker(tracker);
  renderIssueQueue();
  showToast('已清空待修清單');
}
function clearPresets(){
  if(!confirm('清空目前瀏覽器暫存的全部攝影棚 preset？')) return;
  savePresets([]);
  const tracker = loadTracker();
  tracker.savedAt = {};
  saveTracker(tracker);
  renderPresetOptions();
  renderRepoPresetOptions();
  renderIssueQueue();
  renderEditStatus();
  updateExport(readState());
  showToast('已清空暫存');
}
async function copyPrompt(){
  const text = document.getElementById('exportText').value;
  await writeClipboard(text);
  showToast('已複製目前輸出');
}
async function fetchRepoPresets(){
  try{
    const response = await fetch('physics-presets.json', {cache:'no-store'});
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const json = await response.json();
    repoPresets = Array.isArray(json.serves) ? json.serves : [];
    renderRepoPresetOptions();
    renderIssueQueue();
    renderEditStatus();
  }catch(err){
    showToast(`讀取 physics-presets.json 失敗: ${err.message}`, 'warn');
  }
}

ids.forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener('input', ()=>{
    renderEditStatus();
    updateStudio();
  });
});
document.getElementById('spinUnit').addEventListener('change', handleSpinUnitChange);
document.getElementById('spinTemplateSelect').addEventListener('change', updateSpinTemplateStatus);
document.getElementById('applySpinTemplateBtn').addEventListener('click', applySelectedSpinTemplate);
document.getElementById('presetSearch').addEventListener('input', renderRepoPresetOptions);
document.getElementById('playBtn').addEventListener('click', play);
document.getElementById('resetBtn').addEventListener('click', replay);
document.getElementById('randomBtn').addEventListener('click', makeScatter);
document.getElementById('saveBtn').addEventListener('click', saveCurrent);
document.getElementById('saveCopyBtn').addEventListener('click', ()=>saveCurrent({copy:true}));
document.getElementById('loadBtn').addEventListener('click', loadSelected);
document.getElementById('loadRepoBtn').addEventListener('click', loadSelectedRepoPreset);
document.getElementById('queueSelectedBtn').addEventListener('click', queueSelectedPresets);
document.getElementById('copyBtn').addEventListener('click', copyPrompt);
document.getElementById('copyQueueBtn').addEventListener('click', copyQueuePresets);
document.getElementById('copyAllBtn').addEventListener('click', copyAllPresets);
document.getElementById('clearQueueBtn').addEventListener('click', clearQueue);
document.getElementById('clearPresetBtn').addEventListener('click', clearPresets);
document.getElementById('mobilePlayBtn').addEventListener('click', play);
document.getElementById('mobileResetBtn').addEventListener('click', replay);
document.getElementById('mobileSaveBtn').addEventListener('click', saveCurrent);
document.getElementById('mobileCopyBtn').addEventListener('click', copyPrompt);
document.getElementById('issueQueue').addEventListener('click', event=>{
  const button = event.target.closest('[data-queue-action]');
  if(!button) return;
  const {queueAction, id} = button.dataset;
  if(queueAction === 'load') loadPresetForEditing(id, 'repo');
  if(queueAction === 'remove'){
    removeFromQueue(id);
    showToast('已從待修清單移除');
  }
});
document.querySelectorAll('[data-view-target]').forEach(button=>{
  button.addEventListener('click', ()=>switchMobileView(button.dataset.viewTarget));
});

renderPresetOptions();
loadSpinUnitPreference();
renderEditStatus();
renderIssueQueue();
fetchRepoPresets();
setupMobileSteppers();
setupDragPoints();
resize();
updateStudio();
</script>
</body>
