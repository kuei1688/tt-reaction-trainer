<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>對決何爸｜完整賽局</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#080b10;
  --surface:#0f1318;
  --surface2:#161b22;
  --border:#21262d;
  --green:#3fb950;
  --yellow:#d29922;
  --red:#f85149;
  --blue:#58a6ff;
  --text:#e6edf3;
  --muted:#7d8590;
  --radius:10px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 40px;
}

.screen{width:100%;max-width:520px;}
.hidden{display:none!important;}

/* ── 浮動計分badge ── */
#float-score {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(15,19,24,0.92);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Roboto Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  z-index: 999;
  display: none;
  gap: 6px;
  align-items: center;
  backdrop-filter: blur(8px);
}
#float-score .fs-opp { color: var(--red); }
#float-score .fs-sep { color: var(--border); font-size: 12px; }
#float-score .fs-my  { color: var(--green); }

/* ── SETUP ── */
.setup-title{
  text-align:center;
  font-size:28px;font-weight:900;
  letter-spacing:-0.02em;
  margin-bottom:4px;
}
.setup-sub{
  text-align:center;
  font-size:13px;color:var(--muted);
  margin-bottom:28px;
}
.setup-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
}
.setup-section h3{
  font-size:10px;letter-spacing:0.14em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:14px;
}
.skills-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.skill-item{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;
  cursor:pointer;transition:border-color 0.12s;
}
.skill-item:hover{border-color:var(--green);}
.skill-item.checked{border-color:var(--green);background:rgba(63,185,80,0.08);}
.skill-check{
  width:16px;height:16px;
  border:1.5px solid var(--border);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--green);flex-shrink:0;
}
.skill-item.checked .skill-check{border-color:var(--green);}
.skill-text{font-size:13px;color:var(--text);}

.btn-primary{
  width:100%;background:var(--green);color:#080b10;
  border:none;border-radius:var(--radius);
  padding:16px;font-family:'Noto Sans TC',sans-serif;
  font-size:16px;font-weight:900;cursor:pointer;
  transition:opacity 0.15s;margin-top:4px;
}
.btn-primary:hover{opacity:0.88;}

/* scoreboard removed */
.serve-indicator{
  text-align:center;
  font-size:11px;letter-spacing:0.1em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:12px;
}
.serve-indicator span{color:var(--yellow);font-weight:700;}

/* ── PHASE BAR ── */
.phase-bar{display:flex;gap:4px;margin-bottom:12px;}
.ph{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background 0.3s;}
.ph.active{background:var(--green);}
.ph.done{background:var(--surface2);}

/* ── TIMER ── */
.timer-wrap{height:2px;background:var(--border);margin-bottom:16px;border-radius:1px;}
.timer-bar{height:100%;background:var(--green);border-radius:1px;transition:width 0.1s linear,background 0.3s;}
.timer-bar.warn{background:var(--yellow);}
.timer-bar.urgent{background:var(--red);}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px;
}
.card-body{padding:18px;}

/* ── SERVE CARD (遊戲一邏輯) ── */
.sit-label{
  font-size:10px;letter-spacing:0.14em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:10px;
}
.media-wrap{
  border-radius:6px;overflow:hidden;
  border:1px solid var(--border);
  margin-bottom:10px;text-align:center;
}
.media-wrap img,.media-wrap video{width:100%;display:block;}
.hint-text{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:12px;}

/* ── RALLY CARD (遊戲二邏輯) ── */
.rally-info{
  display:flex;flex-direction:column;gap:10px;
}
.my-last{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--muted);
}
.my-last-badge{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 16px;
  font-size:22px;font-weight:700;color:var(--yellow);
  letter-spacing:0.08em;
  animation:pulse-badge 2.4s ease-in-out infinite;
}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:0.45}}

.paddle-row{
  display:flex;align-items:center;gap:12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;
}
.paddle-info .face-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.paddle-info .face-name.black{color:#d1d5db;}
.paddle-info .face-name.red{color:var(--red);}
.paddle-info .face-rule{font-size:11px;color:var(--muted);}

.ball-tags{display:flex;gap:8px;flex-wrap:wrap;}
.ball-tag{
  padding:4px 12px;border-radius:20px;
  font-size:12px;font-weight:600;
}
.tag-fh{background:#1a2535;color:#7dd3fc;border:1px solid #1e40af;}
.tag-bh{background:#251a35;color:#c4b5fd;border:1px solid #5b21b6;}
.tag-short{background:#0f2a1a;color:#86efac;border:1px solid #166534;}
.tag-long{background:#0f1e2a;color:#93c5fd;border:1px solid #1d4ed8;}
.tag-high{background:#2a1f0a;color:var(--yellow);border:1px solid #92400e;}

.traj-canvas{width:100%;border-radius:6px;background:#000;}

/* ── OPTIONS ── */
.options{display:grid;gap:8px;margin-top:12px;}
.opt{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;padding:13px 14px;
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:14px;font-weight:500;
  cursor:pointer;transition:all 0.12s;
  text-align:left;display:flex;align-items:center;gap:10px;
}
.opt:hover:not(:disabled){border-color:var(--green);background:rgba(63,185,80,0.08);color:var(--green);}
.opt.correct{border-color:var(--green);background:rgba(63,185,80,0.12);color:var(--green);}
.opt.wrong{border-color:var(--red);background:rgba(248,81,73,0.10);color:var(--red);}
.opt.reveal{border-color:var(--green);background:rgba(63,185,80,0.06);color:var(--green);opacity:0.55;}
.opt:disabled{cursor:default;}
.opt-num{
  font-size:11px;background:var(--surface);
  border-radius:4px;padding:2px 7px;
  color:var(--muted);flex-shrink:0;
}

/* ── FEEDBACK ── */
.feedback{
  border-top:1px solid var(--border);
  padding:14px 18px;display:none;
}
.feedback.show{display:block;}
.fb-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.fb-icon{font-size:15px;}
.fb-title{font-size:14px;font-weight:700;}
.fb-title.ok{color:var(--green);}
.fb-title.bad{color:var(--red);}
.fb-title.timeout{color:var(--yellow);}
.fb-tip{
  background:rgba(88,166,255,0.07);
  border-left:3px solid var(--blue);
  border-radius:0 6px 6px 0;
  padding:8px 12px;
  font-size:12px;color:var(--blue);
  line-height:1.6;margin-bottom:12px;
}
.btn-continue{
  width:100%;background:var(--surface2);
  color:var(--red);border:1px solid var(--red);
  border-radius:8px;padding:12px;
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity 0.15s;display:none;
}
.btn-continue:hover{opacity:0.8;}

/* ── MY SERVE CARD ── */
.my-serve-card{
  text-align:center;padding:40px 20px;
}
.my-serve-icon{font-size:48px;margin-bottom:12px;}
.my-serve-title{font-size:22px;font-weight:900;margin-bottom:6px;}
.my-serve-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.score-update{
  display:flex;justify-content:center;gap:20px;
  margin-bottom:24px;
}
.score-update-item{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:12px 20px;text-align:center;
}
.score-update-item .val{
  font-family:'Roboto Mono',monospace;
  font-size:24px;font-weight:700;
}
.score-update-item .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── END SCREEN ── */
.end-hero{text-align:center;padding:32px 0 24px;}
.end-result{font-size:48px;margin-bottom:8px;}
.end-title{font-size:26px;font-weight:900;margin-bottom:4px;}
.end-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.final-score{
  font-family:'Roboto Mono',monospace;
  font-size:54px;font-weight:700;color:var(--green);
  margin:8px 0;
}
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:20px;
}
.stat-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
}
.stat-box .stat-title{
  font-size:10px;letter-spacing:0.12em;
  color:var(--muted);text-transform:uppercase;margin-bottom:8px;
}
.stat-row{
  display:flex;justify-content:space-between;
  font-size:12px;padding:3px 0;
  border-bottom:1px solid var(--border);
}
.stat-row:last-child{border-bottom:none;}
.stat-row .val{
  font-family:'Roboto Mono',monospace;
  font-weight:700;color:var(--text);
}
.stat-row .val.bad{color:var(--red);}

/* ── SERVE NOTICE ── */
.serve-notice{
  text-align:center;padding:20px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:14px;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div class="screen" id="setupScreen">
  <div style="text-align:center;font-size:40px;margin:24px 0 12px;">🏓</div>
  <div class="setup-title">對決何爸</div>
  <div class="setup-sub">完整賽局訓練｜11分制</div>

  <div class="setup-section">
    <h3>球種情境</h3>
    <div class="skills-grid">
      <div class="skill-item checked" id="sk-long" onclick="toggleSetup('long',this)">
        <div class="skill-check" id="sk-long-check">✓</div>
        <span class="skill-text">長球</span>
      </div>
      <div class="skill-item" id="sk-short" onclick="toggleSetup('short',this)">
        <div class="skill-check" id="sk-short-check"></div>
        <span class="skill-text">短球</span>
      </div>
    </div>
  </div>

  <div class="setup-section">
    <h3>我會的技術</h3>
    <div class="skills-grid">
      <div class="skill-item" id="sk-fhLoop" onclick="toggleSetup('fhLoop',this)">
        <div class="skill-check" id="sk-fhLoop-check"></div>
        <span class="skill-text">正手上旋拉球</span>
      </div>
      <div class="skill-item" id="sk-bhLoop" onclick="toggleSetup('bhLoop',this)">
        <div class="skill-check" id="sk-bhLoop-check"></div>
        <span class="skill-text">反手上旋拉球</span>
      </div>
      <div class="skill-item" id="sk-fhChopLoop" onclick="toggleSetup('fhChopLoop',this)">
        <div class="skill-check" id="sk-fhChopLoop-check"></div>
        <span class="skill-text">正手下旋拉球</span>
      </div>
      <div class="skill-item" id="sk-bhChopLoop" onclick="toggleSetup('bhChopLoop',this)">
        <div class="skill-check" id="sk-bhChopLoop-check"></div>
        <span class="skill-text">反手下旋拉球</span>
      </div>
    </div>
  </div>

  <button class="btn-primary" onclick="startMatch()">開始對決 →</button>
  <div style="margin-top:16px;text-align:center;">
    <span class="hint-text" style="cursor:pointer;" onclick="goToSettings()">⚙️ 發球設定</span>
    <span class="hint-text" style="margin:0 8px;">｜</span>
    <a class="hint-text" style="text-decoration:none;" href="match-about.html">？ 玩法說明</a>
  </div>
</div>

<!-- 浮動計分badge -->
<div id="float-score">
  <span class="fs-opp" id="fs-opp">0</span>
  <span class="fs-sep">:</span>
  <span class="fs-my" id="fs-my">0</span>
</div>

<!-- ══ MATCH ══ -->
<div class="screen hidden" id="matchScreen">
  <!-- 發球指示器（細bar） -->
  <div class="serve-indicator" id="serveIndicator" style="margin-bottom:8px;"></div>
  <!-- 隱藏的分數元素（保留給JS更新用） -->
  <span id="myScore" style="display:none">0</span>
  <span id="oppScore" style="display:none">0</span>

  <div class="phase-bar" id="phaseBar">
    <div class="ph" id="ph1"></div>
    <div class="ph" id="ph2"></div>
  </div>
  <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>

  <div id="cardArea"></div>
</div>

<!-- ══ END ══ -->
<div class="screen hidden" id="endScreen">
  <div class="end-hero">
    <div class="end-result" id="endResult"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-sub">最終比數</div>
    <div class="final-score" id="finalScore"></div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-title">接發球</div>
      <div id="statsServe"></div>
    </div>
    <div class="stat-box">
      <div class="stat-title">對打失誤</div>
      <div id="statsRally"></div>
    </div>
  </div>

  <button class="btn-primary" onclick="showSetup()">再來一局</button>
</div>

<script>
// ══════════════════════════════════════
//  影片題庫（遊戲一）
// ══════════════════════════════════════
const IMAGE_LIBRARY = {
  contact_sidetopspin: ['images/contact_sidetopspin/001.jpg','images/contact_sidetopspin/001.mp4','images/contact_sidetopspin/002.mp4','images/contact_sidetopspin/003.mp4','images/contact_sidetopspin/004.mp4','images/contact_sidetopspin/005.mp4'],
  contact_backspin:    ['images/contact_backspin/001.jpg','images/contact_backspin/001.mp4','images/contact_backspin/002.mp4','images/contact_backspin/003.mp4','images/contact_backspin/004.mp4','images/contact_backspin/005.mp4'],
  contact_sidespin:    ['images/contact_sidespin/001.jpg','images/contact_sidespin/001.mp4','images/contact_sidespin/002.mp4','images/contact_sidespin/003.mp4','images/contact_sidespin/004.mp4','images/contact_sidespin/005.mp4'],
  contact_nospin:      ['images/contact_nospin/001.jpg','images/contact_nospin/001.mp4','images/contact_nospin/002.mp4','images/contact_nospin/003.mp4'],
  backswing_low:       ['images/backswing_low/001.jpg'],
  backswing_mid:       ['images/backswing_mid/001.jpg'],
  backswing_high:      ['images/backswing_high/001.jpg'],
};
function getMedia(key){ const a=IMAGE_LIBRARY[key]; return a[Math.floor(Math.random()*a.length)]; }
function renderMedia(src,style){
  const ext=src.split('.').pop().toLowerCase();
  if(ext==='mp4'||ext==='webm') return `<video src="${src}" style="${style}" autoplay loop muted playsinline></video>`;
  return `<img src="${src}" style="${style}"/>`;
}

// ══════════════════════════════════════
//  發球情境（遊戲一）
// ══════════════════════════════════════
function goToSettings(){
  localStorage.setItem('tt_serve_return', window.location.pathname.split('/').pop() || 'match-trainer.html');
  window.location.href='serve-settings.html';
}

function getWeightedSpin(){
  let settings;
  try{
    settings=JSON.parse(localStorage.getItem('tt_serve_settings'));
  }catch(e){}
  if(!settings) settings={sidespin:45,nospin:25,sidetopspin:25,backspin:5};

  const pool=[];
  Object.entries(settings).forEach(([key,weight])=>{
    const n=Math.max(0,Number(weight)||0);
    for(let i=0;i<n;i++) pool.push(key);
  });
  const spinType=pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
  return SCENARIOS.find(s=>s.spinType===spinType)||SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
}
const SCENARIOS = [
  { id:'sidespin',    spin:'側旋',   spinType:'sidespin',    backswingKey:'high', hint:'高引拍，拍面立起往左側切',
    spinChoices:['側旋','下旋','側下旋','不轉'], correctSpin:0 },
  { id:'backspin',    spin:'下旋',   spinType:'backspin',    backswingKey:'low',  hint:'低引拍，拍面水平往下切球底部',
    spinChoices:['下旋','側旋','側下旋','不轉'], correctSpin:0 },
  { id:'sidetopspin', spin:'側下旋', spinType:'sidetopspin', backswingKey:'mid',  hint:'中引拍，拍面約45度斜，往左下方切',
    spinChoices:['側下旋','純下旋','側旋','不轉'], correctSpin:0 },
  { id:'nospin',      spin:'不轉',   spinType:'nospin',      backswingKey:'low',  hint:'低引拍，動作像下旋，但出手輕',
    spinChoices:['不轉','下旋','側下旋','側旋'], correctSpin:0 },
];

// ══════════════════════════════════════
//  顆粒對打邏輯（遊戲二）
// ══════════════════════════════════════
const SP={B:'back',N:'no'}, LN={S:'short',L:'long',H:'high'}, SD={F:'fh',B:'bh'};
const OPPONENT={name:'何爸',firstRedProb:2/3,stayRedProb:0.8,stayBlackProb:0.5};

function flip(s){ return s===SP.B?SP.N:SP.B; }
function mySpinOf(shot){ return shot==='cut'||shot==='cut-low'?SP.B:SP.N; }
function returnSpin(myShot,oppFace){ return oppFace==='red'?flip(mySpinOf(myShot)):mySpinOf(myShot); }

function rallyAnswer(sit){
  if(sit.len===LN.H) return 'move';
  const rs=returnSpin(sit.myShot,sit.oppFace);
  if(sit.len===LN.L){
    if(rs===SP.B){
      if(sit.myPos===SD.F&&SETUP.fhChopLoop) return 'fh-chop-loop';
      if(sit.myPos===SD.B&&SETUP.bhChopLoop) return 'bh-chop-loop';
      return 'cut';
    } else {
      if(sit.myPos===SD.F&&SETUP.fhLoop) return 'fh-loop';
      if(sit.myPos===SD.B&&SETUP.bhLoop) return 'bh-loop';
      return sit.myPos===SD.F?'fh-atk':'bh-push';
    }
  }
  if(rs===SP.B) return 'cut';
  return sit.myPos===SD.F?'fh-atk':'bh-push';
}

function rallyAnswer2(sit){
  return returnSpin(sit.myShot,sit.oppFace)===SP.B?'cut':'smash';
}

function nextShot(ans){
  if(ans==='cut'||ans==='cut-low') return 'cut';
  if(ans==='smash') return 'smash';
  if(ans==='fh-atk'||ans==='fh-loop'||ans==='fh-chop-loop') return 'fh-atk';
  return 'bh-push';
}

const shotLabel={cut:'切球','fh-atk':'正手攻球','bh-push':'反手平推',smash:'殺球',serve:'（接發球）','fh-loop':'正手上旋拉球','bh-loop':'反手上旋拉球','fh-chop-loop':'正手下旋拉球','bh-chop-loop':'反手下旋拉球'};
const ansLabel={
  move:'👟 先移動腳，找好球位',
  cut:'✂️ 切球','fh-atk':'🏓 正手攻球','bh-push':'➡️ 反手平推',
  'cut-low':'✂️ 等球落低，切球','smash':'💥 殺球｜不確定就穩定過渡',
  'fh-loop':'🔄 正手上旋拉球','bh-loop':'🔄 反手上旋拉球',
  'fh-chop-loop':'🔄 正手下旋拉球','bh-chop-loop':'🔄 反手下旋拉球',
};

// ══════════════════════════════════════
//  軌跡圖
// ══════════════════════════════════════
const TBL={x1:80,x2:180,y1:20,xb1:25,xb2:235,y2:130};
function toTrajPx(gx,gy,W,H){
  const t=Math.max(-0.3,Math.min(1.35,gy/10));
  const left=TBL.x1+(TBL.xb1-TBL.x1)*t;
  const right=TBL.x2+(TBL.xb2-TBL.x2)*t;
  return [left+(gx/10)*(right-left),TBL.y1+t*(TBL.y2-TBL.y1)];
}
function drawTraj(canvas,myPos,len,oppFace){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#3a3f50';ctx.lineWidth=1.5;
  const c=[[0,0],[10,0],[10,10],[0,10]].map(([gx,gy])=>toTrajPx(gx,gy,W,H));
  ctx.beginPath();ctx.moveTo(...c[0]);c.forEach(p=>ctx.lineTo(...p));ctx.closePath();ctx.stroke();
  const[tmx,tmy]=toTrajPx(5,0,W,H),[bmx,bmy]=toTrajPx(5,10,W,H);
  ctx.beginPath();ctx.moveTo(tmx,tmy);ctx.lineTo(bmx,bmy);ctx.stroke();
  const[nl,nly]=toTrajPx(0,5,W,H),[nr,nry]=toTrajPx(10,5,W,H);
  ctx.strokeStyle='#22c55e';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(nl,nly);ctx.lineTo(nr,nry);ctx.stroke();

  const isFH=myPos===SD.F;
  const isRed=oppFace==='red'; // 反手起點在右側x=8，正手起點在左側x=3
  let p1,p2,p3,bulge,color,label;

  if(len===LN.H){
    const hx=isRed?7:3;
    const[px,py]=toTrajPx(hx,6.5,W,H);
    ctx.fillStyle='#fbbf24';ctx.font='bold 20px sans-serif';
    ctx.textAlign='center';ctx.fillText('球冒高了!!',px,py);
    return;
  }

  if(len===LN.S){
    color='#f87171';label='短球';
    if(isRed){
      // 反手起點右側
      if(isFH){p1=[8,3];p2=[9,7];p3=[10,9];bulge=-55;}  // 反手打正手（直線往右下）
      else    {p1=[8,3];p2=[5,6];p3=[3,8];bulge=55;}    // 反手打反手（斜線往左下）
    } else {
      // 正手起點左側
      if(isFH){p1=[3,3];p2=[6,6];p3=[8,8];bulge=-45;}  // 正手打正手（斜線往右下）
      else    {p1=[3,3];p2=[2,7];p3=[1,9];bulge=45;}    // 正手打反手（直線往左下）
    }
  } else {
    color='#7dd3fc';label='長球';
    if(isRed){
      // 反手起點右側（檯外）
      if(isFH){p1=[8,-2];p2=[9,8];p3=[10,10.5];bulge=-55;} // 反手打正手（直線往右下）
      else    {p1=[8,-2];p2=[3,8];p3=[1,12];bulge=70;}      // 反手打反手（斜線往左下）
    } else {
      // 正手起點左側（檯外）
      if(isFH){p1=[3,-2];p2=[8,8];p3=[10,12];bulge=-70;}   // 正手打正手（斜線往右下）
      else    {p1=[3,-2];p2=[2,8];p3=[1,10.5];bulge=55;}    // 正手打反手（直線往左下）
    }
  }

  function arc(x1,y1,x2,y2,b,c){
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
    const cx=mx+(-dy/len)*b,cy=my+(dx/len)*b;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx,cy,x2,y2);
    ctx.strokeStyle=c;ctx.lineWidth=2.5;ctx.stroke();
  }
  const[x1,y1]=toTrajPx(...p1,W,H),[x2,y2]=toTrajPx(...p2,W,H),[x3,y3]=toTrajPx(...p3,W,H);
  arc(x1,y1,x2,y2,bulge,color);arc(x2,y2,x3,y3,bulge*0.85,color);
  ctx.beginPath();ctx.arc(x3,y3,8,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  const lx=isFH?8:2;
  const[lbx,lby]=toTrajPx(lx,6,W,H);
  ctx.fillStyle=color;ctx.font='bold 14px sans-serif';
  ctx.textAlign='center';ctx.fillText(label,lbx,lby);
}

// 球拍
function drawPaddle(canvas,face){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const isRed=face==='red';
  const cx=canvas.width/2,cy=canvas.height/2-4;
  ctx.beginPath();ctx.ellipse(cx,cy,34,22,0,0,Math.PI*2);
  ctx.fillStyle=isRed?'#b91c1c':'#3a3f50';ctx.fill();
  ctx.strokeStyle=isRed?'#7f1d1d':'#6b7280';ctx.lineWidth=2;ctx.stroke();
  const hw=28,hh=10;
  const hx=isRed?cx-34-hw+4:cx+34-4,hy=cy-hh/2;
  ctx.beginPath();ctx.roundRect(hx,hy,hw,hh,3);
  ctx.fillStyle='#7c4a1e';ctx.fill();
}

// ── 接球技術選擇（發球判斷對了之後）──
function getReceiveTech(spinType, landing, length) {
  const isBackspin = (spinType==='backspin'||spinType==='sidetopspin');
  if(length==='short'){
    // 短球：帶旋轉切球，不轉/側旋依落點攻球或平推
    if(isBackspin) return 'cut';
    return landing==='fh'?'fh-atk':'bh-push';
  }
  // 長球
  if(isBackspin){
    // 帶下旋：正手拉球或切球，反手切球
    if(landing==='fh') return SETUP.fhChopLoop?'fh-chop-loop':'cut';
    return SETUP.bhChopLoop?'bh-chop-loop':'cut';
  } else {
    // 不轉/側旋：正手攻球或上旋拉球，反手平推或上旋拉球
    if(landing==='fh') return SETUP.fhLoop?'fh-loop':'fh-atk';
    return SETUP.bhLoop?'bh-loop':'bh-push';
  }
}

function renderReceiveTech(sc, landing, length){
  // 用 OPPONENT 機率決定對打第一拍的拍面
  const firstOppFace = Math.random() < OPPONENT.firstRedProb ? 'red' : 'black';
  M.rallyLastFace = firstOppFace; // 存起來讓 makeRallySit 繼續接
  const correct = getReceiveTech(sc.spinType, landing, length);
  // 干擾選項
  const isBackspin = (sc.spinType==='backspin'||sc.spinType==='sidetopspin');
  let distractor;
  if(correct==='cut') distractor=landing==='fh'?'fh-atk':'bh-push';
  else if(correct==='fh-atk'||correct==='fh-loop'||correct==='fh-chop-loop') distractor='cut';
  else distractor='cut';
  const choices=[correct,distractor].sort(()=>Math.random()-0.5);
  const correctIdx=choices.indexOf(correct);

  // 右側換成落點圖＋技術選項，左側影片保留不動
  const rightPanel = document.querySelector('#cardArea .card-body > div > div:last-child');
  if(rightPanel){
    rightPanel.innerHTML=`
      <div style="font-size:10px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">你要怎麼接？</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
          background:${landing==='fh'?'#1a2535':'#251a35'};
          color:${landing==='fh'?'#7dd3fc':'#c4b5fd'};
          border:1px solid ${landing==='fh'?'#1e40af':'#5b21b6'};">
          ${landing==='fh'?'正手位':'反手位'}
        </span>
        <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
          background:${length==='short'?'#0f2a1a':'#0f1e2a'};
          color:${length==='short'?'#86efac':'#93c5fd'};
          border:1px solid ${length==='short'?'#166534':'#1d4ed8'};">
          ${length==='short'?'短球':'長球'}
        </span>
      </div>
      <canvas id="receiveTrajCanvas" width="260" height="170" style="width:100%;border-radius:6px;background:#000;margin-bottom:12px;"></canvas>
      <div style="display:flex;flex-direction:column;gap:8px;flex:1;" id="receiveOptions">
        ${choices.map((k,i)=>`<button class="opt" onclick="answerReceive(${i},${correctIdx},'${nextShot(k)}')" style="text-align:center;justify-content:center;font-size:13px;">${ansLabel[k]}</button>`).join('')}
      </div>`;
  }

  const canvas=document.getElementById('receiveTrajCanvas');
  drawTraj(canvas, landing==='fh'?SD.F:SD.B, length==='short'?LN.S:LN.L, firstOppFace);

  startTimer(()=>{
    document.querySelectorAll('#receiveOptions .opt').forEach(b=>b.disabled=true);
    showFeedback(false,'時間到','');
    losePoint();
  });
}

function answerReceive(idx, correctIdx, shotResult){
  stopTimer();

  document.querySelectorAll('#receiveOptions .opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===correctIdx) b.classList.add(ok?'correct':'reveal');
    else if(i===idx&&!ok) b.classList.add('wrong');
  });
  if(ok){
    M.rallyMyShot=shotResult;

}

function startRallyPhase(){

function makeRallySit(ballNum,myShot){
  let oppFace;
  if(M.rallyLastFace===null) oppFace=Math.random()<OPPONENT.firstRedProb?'red':'black';
  else if(M.rallyLastFace==='red') oppFace=Math.random()<OPPONENT.stayRedProb?'red':'black';
  else oppFace=Math.random()<OPPONENT.stayBlackProb?'black':'red';
  M.rallyLastFace=oppFace;
  const myPos=Math.random()<0.5?SD.F:SD.B;
  const lengths=[];
  if(SETUP.long) lengths.push(LN.L);
  if(SETUP.short) lengths.push(LN.S,LN.S);
  if(lengths.length===0) lengths.push(LN.L);
  const lenPool=ballNum<3?[...lengths,LN.H]:[...lengths];
  const len=lenPool[Math.floor(Math.random()*lenPool.length)];
  return{oppFace,myPos,len,myShot,ballNum};
}

function nextRallyBall(){
  if(M.rallyBall>=RALLY_MAX){ winPoint(); return; }
  M.rallySit=makeRallySit(M.rallyBall,M.rallyMyShot);
  M.rallyStep=1;M.rallyAnswered=false;
  renderRallyPhase1();
}

    const correct=rallyAnswer(s);
    if(correct==='cut') choices=['cut',s.myPos===SD.F?'fh-atk':'bh-push'];
    else if(correct==='fh-atk') choices=['fh-atk','cut'];
    else if(correct==='bh-push') choices=['bh-push','cut'];
    else if(correct==='fh-loop') choices=['fh-loop','fh-atk'];
    else if(correct==='bh-loop') choices=['bh-loop','bh-push'];
    else if(correct==='fh-chop-loop') choices=['fh-chop-loop','cut'];
    else if(correct==='bh-chop-loop') choices=['bh-chop-loop','cut'];
    else choices=['cut','fh-atk'];
  }
  const optDiv=document.createElement('div');
  optDiv.className='options';optDiv.id='rallyOptions';
  choices.forEach((k,i)=>{
    const b=document.createElement('button');
    b.className='opt';b.dataset.key=k;
    b.innerHTML=`<span class="opt-num">${i+1}</span>${ansLabel[k]}`;
    b.onclick=()=>answerRally(k,b);
    optDiv.appendChild(b);
  });
  document.querySelector('.rally-info').appendChild(optDiv);
  // feedback 區
  const fb=document.createElement('div');
  fb.className='feedback';fb.id='feedback';
  fb.innerHTML=`<div class="fb-header"><div class="fb-icon" id="fbIcon"></div><div class="fb-title" id="fbTitle"></div></div>
    <div class="fb-tip" id="fbTip"></div>
    <button class="btn-continue" id="btnContinue" onclick="afterRallyError()">看懂了，繼續 →</button>`;
  document.querySelector('.card').appendChild(fb);
  startTimer(()=>onRallyTimeout());
}

function answerRally(ans,btn){
  if(M.rallyAnswered) return;
  M.rallyAnswered=true;
  stopTimer();
  const s=M.rallySit;
  const correct=M.rallyStep===1?rallyAnswer(s):rallyAnswer2(s);
  const ok=ans===correct;
  document.querySelectorAll('#rallyOptions .opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.key===correct) b.classList.add(ok?'correct':'reveal');
  });
  if(!ok) btn.classList.add('wrong');
  if(ok){
    if(s.len===LN.H&&M.rallyStep===1){
      M.rallyStep=2;M.rallyAnswered=false;
      const opts=document.getElementById('rallyOptions');
      if(opts) opts.remove();
      setTimeout(()=>showRallyOptions(),500);
      return;
    }
    M.rallyMyShot=nextShot(ans);
    M.rallyBall++;
    setTimeout(()=>nextRallyBall(),600);
  } else {
    trackRallyError(s);
    showFeedback(false,`應該${ansLabel[correct]}`,'');
    losePoint();
  }
}

function onRallyTimeout(){
  M.rallyAnswered=true;
  const s=M.rallySit;
  const correct=M.rallyStep===1?rallyAnswer(s):rallyAnswer2(s);
  document.querySelectorAll('#rallyOptions .opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.key===correct) b.classList.add('reveal');
  });
  trackRallyError(s);
  showFeedback(false,'時間到','');
  losePoint();
}

function afterRallyError(){
  document.getElementById('btnContinue').style.display='none';
  M.totalPoints++;
  nextPoint();
}

function trackRallyError(s){
  if(s.len===LN.L) M.stats.rallyErrors.long++;
  else if(s.len===LN.S) M.stats.rallyErrors.short++;
  else M.stats.rallyErrors.high++;
  if(s.myPos===SD.F) M.stats.rallyErrors.fh++;
  else M.stats.rallyErrors.bh++;
}

// ── 得分失分 ──
function winPoint(){
  M.myScore++;M.totalPoints++;
  updateScoreboard();
  if(checkMatchEnd()) return;
  nextPoint();
}

function losePoint(){
  M.oppScore++;
  updateScoreboard();
  if(checkMatchEnd()) return;
  // 等玩家按繼續才加totalPoints（在 afterServeError/afterRallyError）
}

function checkMatchEnd(){
  const my=M.myScore,opp=M.oppScore;
  if((my>=11||opp>=11)&&Math.abs(my-opp)>=2){
    setTimeout(()=>showEnd(),1000);
    return true;
  }
  return false;
}

// ── 結果畫面 ──
function showEnd(){
  stopTimer();
  const won=M.myScore>M.oppScore;
  document.getElementById('endResult').textContent=won?'🏆':'💥';
  document.getElementById('endTitle').textContent=won?'贏了！':'輸了';
  document.getElementById('finalScore').textContent=`${M.myScore} : ${M.oppScore}`;

  const spinNames={sidespin:'側旋',backspin:'下旋',sidetopspin:'側下旋',nospin:'不轉'};
  const serveEl=document.getElementById('statsServe');
  serveEl.innerHTML=`
    <div class="stat-row"><span>答對率</span><span class="val">${M.stats.serveTotal?Math.round(M.stats.serveOk/M.stats.serveTotal*100)+'%':'—'}</span></div>
    ${Object.entries(M.stats.spinErrors).filter(([k,v])=>v>0).map(([k,v])=>`<div class="stat-row"><span>${spinNames[k]}</span><span class="val bad">${v}次</span></div>`).join('')}
  `;
  const rallyEl=document.getElementById('statsRally');
  const re=M.stats.rallyErrors;
  rallyEl.innerHTML=`
    <div class="stat-row"><span>長球失誤</span><span class="val ${re.long>0?'bad':''}">${re.long}</span></div>
    <div class="stat-row"><span>短球失誤</span><span class="val ${re.short>0?'bad':''}">${re.short}</span></div>
    <div class="stat-row"><span>高球失誤</span><span class="val ${re.high>0?'bad':''}">${re.high}</span></div>
    <div class="stat-row"><span>正手失誤</span><span class="val ${re.fh>0?'bad':''}">${re.fh}</span></div>
    <div class="stat-row"><span>反手失誤</span><span class="val ${re.bh>0?'bad':''}">${re.bh}</span></div>
  `;
  hide('matchScreen');show('endScreen');
  document.getElementById('float-score').style.display='none';
}

// ── 工具 ──
function showFeedback(ok,title,tip){
  const fb=document.getElementById('feedback');
  if(!fb) return;
  document.getElementById('fbIcon').textContent=ok?'✓':'✗';
  const t=document.getElementById('fbTitle');
  t.className='fb-title '+(ok?'ok':'bad');
  t.textContent=title;
  if(tip) document.getElementById('fbTip').textContent='💡 '+tip;
  else document.getElementById('fbTip').textContent='';
  fb.className='feedback show';
  const btn=document.getElementById('btnContinue');
  if(btn&&!ok) btn.style.display='block';
}

function setPhasebar(done,total){
  for(let i=1;i<=2;i++){
    const el=document.getElementById('ph'+i);
    if(!el) continue;
    if(i<=done) el.className='ph done';
    else if(i===done+1) el.className='ph active';
    else el.className='ph';
  }
}

function startTimer(onEnd){
  let elapsed=0;
  const bar=document.getElementById('timerBar');
  bar.style.width='100%';bar.className='timer-bar';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    elapsed+=TICK;
    const pct=Math.max(0,100-(elapsed/TIMER_MS)*100);
    bar.style.width=pct+'%';
    if(pct<25) bar.className='timer-bar urgent';
    else if(pct<55) bar.className='timer-bar warn';
    if(pct<=0){clearInterval(timerInterval);if(onEnd)onEnd();}
  },TICK);
}
function stopTimer(){clearInterval(timerInterval);}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function showSetup(){hide('endScreen');show('setupScreen');}

// 鍵盤
document.addEventListener('keydown',e=>{
  const i={'1':0,'2':1,'3':2}[e.key];
  if(i!=null){
    const btns=document.querySelectorAll('#spinOptions .opt, #rallyOptions .opt');
    if(btns[i]&&!btns[i].disabled) btns[i].click();
  }
});
</script>
</body>
</html>
