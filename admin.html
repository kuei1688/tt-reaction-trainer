<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發球影片管理</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;--radius:12px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;padding:18px}
h1{margin:0 0 16px;font-size:26px;font-weight:900}
.layout{display:grid;grid-template-columns:minmax(280px,380px) 1fr;gap:16px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel h2{font-size:15px;margin:0;padding:12px 14px;border-bottom:1px solid var(--border);color:var(--yellow)}
.list{max-height:76vh;overflow:auto;padding:10px}
.group{margin-bottom:12px}
.group-title{font-size:13px;color:var(--muted);font-weight:800;margin:8px 0}
.item{width:100%;text-align:left;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 10px;margin-bottom:6px;cursor:pointer;font-size:12px}
.item:hover,.item.active{border-color:var(--blue)}
.right{display:grid;gap:16px}
.preview{padding:14px}
video{width:100%;max-height:360px;background:#000;border-radius:10px}
.meta{font-size:13px;color:var(--muted);line-height:1.6;margin-top:10px}
.results{padding:14px;max-height:58vh;overflow:auto}
.review-section{border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;background:#0f141c}
.review-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0;padding:10px 12px;font-size:14px;font-weight:900;border-bottom:1px solid var(--border)}
.review-title.warning{color:var(--red);background:rgba(248,81,73,.08)}
.review-title.change{color:var(--yellow);background:rgba(210,153,34,.08)}
.review-title.delete{color:var(--red);background:rgba(248,81,73,.11)}
.review-title.approved{color:var(--green);background:rgba(63,185,80,.08);cursor:pointer}
.review-count{color:var(--muted);font-size:12px;font-weight:800}
.review-body{padding:4px 12px}
.result-row{border-bottom:1px solid var(--border);padding:9px 0;font-size:13px;line-height:1.5}
.result-row:last-child{border-bottom:0}
.result-src{color:var(--text);word-break:break-all}
.result-spin{color:var(--muted)}
details.review-section summary{list-style:none}
details.review-section summary::-webkit-details-marker{display:none}
.mobile-review-card,.mobile-fixed-actions{display:none}
.mobile-decision{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.mobile-action-row{display:grid;grid-template-columns:1fr auto;gap:8px}
.mobile-action,.copy-action{min-height:48px;font-size:15px}
.mobile-action.ok{background:var(--green);border-color:var(--green);color:#04130a}
.mobile-action.change{background:var(--yellow);border-color:var(--yellow);color:#171003}
.mobile-action.delete{background:rgba(248,81,73,.22);border-color:var(--red);color:var(--text)}
.mobile-spin-select{min-height:48px;min-width:120px;background:#080b10;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:0 10px;font-weight:800}
.decision-note{font-size:12px;color:var(--muted);min-height:16px}
.decision-note.active{color:var(--green)}
.modal-backdrop{position:fixed;inset:0;background:rgba(1,4,9,.78);display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}
.modal-backdrop[hidden]{display:none}
.modal-card{width:min(860px,100%);max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:900;color:var(--yellow)}
.modal-close{width:34px;height:34px;border-radius:50%;padding:0;display:grid;place-items:center;background:transparent;color:var(--text);border:1px solid var(--border);font-size:20px;line-height:1}
.modal-body{padding:14px}
button{border:1px solid var(--blue);background:var(--blue);color:#06111f;border-radius:10px;padding:12px 14px;font-weight:900;cursor:pointer}
textarea{width:100%;min-height:180px;background:#080b10;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:ui-monospace,Consolas,monospace;font-size:13px;line-height:1.5}
.error{border:1px solid var(--red);color:var(--red);background:rgba(248,81,73,.08);padding:12px;border-radius:10px;margin:0 0 12px;font-size:13px;line-height:1.5}
@media (max-width: 860px){.layout{grid-template-columns:1fr}.list{max-height:360px}}
@media (max-width: 767px){
  body{padding:12px 12px 88px}
  h1{font-size:22px;margin-bottom:12px}
  .layout{display:block}
  .layout>section.panel:first-child{display:none}
  .right{display:block}
  .right>.panel{border-radius:10px}
  .codex-panel{display:none}
  .results{max-height:none;overflow:visible;padding:10px}
  .review-section.change-section,.review-section.delete-section,.review-section.approved-section{display:none}
  .desktop-review-row{display:none}
  .mobile-review-card{display:block;border-bottom:1px solid var(--border);padding:8px 0}
  .mobile-review-card:last-child{border-bottom:0}
  .mobile-review-card summary{cursor:pointer;list-style:none;color:var(--text);font-size:13px;line-height:1.45;word-break:break-all}
  .mobile-review-card summary::-webkit-details-marker{display:none}
  .mobile-review-card summary::after{content:'展開';float:right;color:var(--blue);font-weight:900;margin-left:8px}
  .mobile-review-card[open] summary::after{content:'收合'}
  .mobile-review-card video{margin-top:10px;max-height:52vh}
  .mobile-current{margin-top:10px;font-size:13px;color:var(--muted)}
  .mobile-current strong{color:var(--text)}
  .mobile-fixed-actions{position:fixed;left:0;right:0;bottom:0;z-index:18;display:block;background:rgba(13,17,23,.96);border-top:1px solid var(--border);padding:10px 12px}
  .copy-action{width:100%}
}
</style>
</head>
<body>
<h1>發球影片管理</h1>
<div id="message"></div>
<div class="layout">
  <section class="panel">
    <h2>影片清單</h2>
    <div class="list" id="videoList">載入中...</div>
  </section>
  <section class="right">
    <div class="panel">
      <h2>Google Sheet 審核結果</h2>
      <div class="results" id="results">載入中...</div>
    </div>
    <div class="panel codex-panel">
      <h2>Codex 指令</h2>
      <div class="preview">
        <button onclick="generatePrompt()">產生 Codex 指令</button>
        <textarea id="prompt" readonly style="margin-top:12px;"></textarea>
      </div>
    </div>
  </section>
</div>

<div class="mobile-fixed-actions">
  <button class="copy-action" type="button" onclick="copyCodexPrompt()">產生並複製 Codex 指令</button>
</div>

<div class="modal-backdrop" id="previewModal" hidden onclick="handleModalBackdrop(event)">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="previewModalTitle">
    <div class="modal-head">
      <div class="modal-title" id="previewModalTitle">影片預覽</div>
      <button class="modal-close" type="button" onclick="closePreviewModal()" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      <video id="modalVideo" controls autoplay muted loop playsinline></video>
      <div class="meta" id="modalMeta"></div>
    </div>
  </div>
</div>

<script>
const REVIEW_READ_URL = 'https://script.google.com/macros/s/AKfycbwDBfVdP2BqIcKAzeTiKF7LQeAtAgBozahlYuq73Ku-rNJx-RLZ92nWJZ8wROI9SbYF/exec';
const LABELS = {
  contact_sidebackspin:'側下旋',
  contact_sidespin:'側旋',
  contact_backspin:'下旋',
  contact_nospin:'不轉',
  backswing_low:'低手備擺',
  backswing_mid:'中手備擺',
  backswing_high:'高手備擺'
};
let videos = [];
let reviews = [];
let mobileDecisions = {};

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'
  }[ch]));
}
function jsString(value){
  return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
function safeDomId(value){
  return String(value ?? '').replace(/[^a-zA-Z0-9_-]/g, '_');
}
function reviewStatus(row){
  const status = String(row.status || '').trim();
  if(status === 'discuss') return 'needs_discussion';
  if(['delete', 'remove', 'deleted', 'needs_delete'].includes(status)) return 'delete';
  return status;
}
function showError(text){
  document.getElementById('message').innerHTML = `<div class="error">${text}</div>`;
}
function groupBySpin(items){
  return items.reduce((acc,item)=>{
    (acc[item.spinType] ||= []).push(item);
    return acc;
  },{});
}
function renderList(){
  const grouped = groupBySpin(videos);
  document.getElementById('videoList').innerHTML = Object.entries(grouped).map(([spinType,items])=>`
    <div class="group">
      <div class="group-title">${LABELS[spinType] || spinType} (${items.length})</div>
      ${items.map(item=>`<button class="item" data-id="${escapeHtml(item.id)}" onclick="openPreviewModal(this.dataset.id)">${escapeHtml(item.id)}<br>${escapeHtml(item.src)}</button>`).join('')}
    </div>
  `).join('');
}
function openPreviewModal(id){
  document.querySelectorAll('.item').forEach(btn=>btn.classList.toggle('active', btn.dataset.id === id));
  const item = videos.find(v=>v.id===id);
  if(!item) return;
  const video = document.getElementById('modalVideo');
  video.src = item.src;
  document.getElementById('modalMeta').innerHTML = `
    <strong>${escapeHtml(LABELS[item.spinType] || item.spinType)}</strong><br>
    id: ${escapeHtml(item.id)}<br>
    src: ${escapeHtml(item.src)}<br>
    reviewStatus: ${escapeHtml(item.reviewStatus)}
  `;
  document.getElementById('previewModal').hidden = false;
}
function closePreviewModal(){
  const modal = document.getElementById('previewModal');
  const video = document.getElementById('modalVideo');
  video.pause();
  video.removeAttribute('src');
  video.load();
  modal.hidden = true;
}
function handleModalBackdrop(event){
  if(event.target.id === 'previewModal') closePreviewModal();
}
function normalizeSpinKey(value){
  return String(value || '')
    .replaceAll('contact_sidetopspin', 'contact_sidebackspin')
    .replaceAll('sidetopspin', 'sidebackspin');
}
function normalizeReviewRow(row){
  return {
    ...row,
    currentSpinType: normalizeSpinKey(row.currentSpinType),
    suggestedSpinType: normalizeSpinKey(row.suggestedSpinType)
  };
}
function normalizeReviews(raw){
  let rows = [];
  if(Array.isArray(raw)) rows = raw;
  else if(Array.isArray(raw.data)) rows = raw.data;
  else if(Array.isArray(raw.values)){
    const [header,...values] = raw.values;
    rows = values.map(row=>Object.fromEntries(header.map((key,i)=>[key,row[i]])));
  }
  return rows.map(normalizeReviewRow);
}
function getReviewKey(row){
  return row.id || row.src || '';
}
function getReviewVideo(row){
  const src = row.src || '';
  return videos.find(v => v.src === src || v.id === row.id) || {
    id: row.id || src,
    src,
    spinType: row.currentSpinType || ''
  };
}
function getMobileDecision(key){
  return mobileDecisions[key] || {};
}
function contactSpinOptions(selected){
  return Object.keys(LABELS)
    .filter(key => key.startsWith('contact_'))
    .map(key => `<option value="${escapeHtml(key)}"${key === selected ? ' selected' : ''}>${escapeHtml(LABELS[key])}</option>`)
    .join('');
}
function setMobileDecision(key, status, suggestedSpinType){
  mobileDecisions = {
    ...mobileDecisions,
    [key]: {status, suggestedSpinType}
  };
  renderReviews();
}
function getReviewBuckets(){
  const discussion = reviews.filter(r => reviewStatus(r) === 'needs_discussion');
  const reclassify = reviews.filter(r =>
    reviewStatus(r) === 'reclassify' &&
    r.suggestedSpinType &&
    r.currentSpinType &&
    r.suggestedSpinType !== r.currentSpinType
  );
  const approved = reviews.filter(r => reviewStatus(r) === 'approved');
  const deleteItems = reviews.filter(r => reviewStatus(r) === 'delete');
  return {discussion, reclassify, deleteItems, approved};
}
function renderReviewRows(items, mode){
  if(!items.length) return '<div class="result-row"><span class="result-spin">目前沒有項目</span></div>';
  return items.map((r,index)=>{
    const src = escapeHtml(r.src || '');
    const currentKey = r.currentSpinType || '';
    const suggestedKey = r.suggestedSpinType || '';
    const current = escapeHtml(LABELS[currentKey] || currentKey);
    const suggested = escapeHtml(LABELS[suggestedKey] || suggestedKey);
    const spinLine = mode === 'reclassify' ? `${current} → ${suggested}` : current;
    if(mode === 'discussion'){
      const rawKey = getReviewKey(r);
      const escapedKey = escapeHtml(jsString(rawKey));
      const domId = `${safeDomId(rawKey)}-${index}`;
      const video = getReviewVideo(r);
      const decision = getMobileDecision(rawKey);
      const selected = decision.suggestedSpinType || currentKey;
      const decisionText = decision.status === 'approved'
        ? '已標記：分類正確'
        : decision.status === 'reclassify'
          ? `已標記：改為 ${LABELS[decision.suggestedSpinType] || decision.suggestedSpinType}`
          : decision.status === 'delete'
            ? '已標記：建議刪除'
            : '尚未標記';
      return `
        <div class="result-row desktop-review-row">
          <div class="result-src">${src}</div>
          <div class="result-spin">${spinLine}</div>
        </div>
        <details class="mobile-review-card">
          <summary>${src}</summary>
          <video src="${escapeHtml(video.src || '')}" controls muted loop playsinline></video>
          <div class="mobile-current">目前分類：<strong>${current}</strong></div>
          <div class="mobile-decision">
            <button class="mobile-action ok" type="button" onclick="setMobileDecision('${escapedKey}','approved','${escapeHtml(jsString(currentKey))}')">✅ 分類正確</button>
            <div class="mobile-action-row">
              <button class="mobile-action change" type="button" onclick="setMobileDecision('${escapedKey}','reclassify',document.getElementById('spin-${domId}').value)">🔄 改為</button>
              <select class="mobile-spin-select" id="spin-${domId}">${contactSpinOptions(selected)}</select>
            </div>
            <button class="mobile-action delete" type="button" onclick="setMobileDecision('${escapedKey}','delete','${escapeHtml(jsString(currentKey))}')">🗑️ 建議刪除</button>
            <div class="decision-note ${decision.status ? 'active' : ''}">${escapeHtml(decisionText)}</div>
          </div>
        </details>
      `;
    }
    return `
      <div class="result-row">
        <div class="result-src">${src}</div>
        <div class="result-spin">${spinLine}</div>
      </div>
    `;
  }).join('');
}
function renderReviews(){
  const host = document.getElementById('results');
  if(!reviews.length){
    host.textContent = '目前沒有審核結果，或 REVIEW_READ_URL 尚未設定。';
    return;
  }
  const {discussion, reclassify, deleteItems, approved} = getReviewBuckets();
  host.innerHTML = `
    <section class="review-section discussion-section">
      <h3 class="review-title warning"><span>⚠️ 待討論</span><span class="review-count">${discussion.length}</span></h3>
      <div class="review-body">${renderReviewRows(discussion, 'discussion')}</div>
    </section>
    <section class="review-section change-section">
      <h3 class="review-title change"><span>🔄 需要重新分類</span><span class="review-count">${reclassify.length}</span></h3>
      <div class="review-body">${renderReviewRows(reclassify, 'reclassify')}</div>
    </section>
    <section class="review-section delete-section">
      <h3 class="review-title delete"><span>🗑️ 建議刪除</span><span class="review-count">${deleteItems.length}</span></h3>
      <div class="review-body">${renderReviewRows(deleteItems, 'delete')}</div>
    </section>
    <details class="review-section approved-section">
      <summary class="review-title approved"><span>✅ 已確認</span><span class="review-count">${approved.length}</span></summary>
      <div class="review-body">${renderReviewRows(approved, 'approved')}</div>
    </details>
  `;
}
function withQuery(url, params){
  const separator = url.includes('?') ? '&' : '?';
  return url + separator + new URLSearchParams(params).toString();
}
function loadReviewsJsonp(){
  return new Promise((resolve, reject)=>{
    const callbackName = '__reviewResults_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timeout = setTimeout(()=>{
      cleanup();
      reject(new Error('JSONP 載入逾時，請確認 Apps Script doGet 支援 callback 參數'));
    }, 10000);
    function cleanup(){
      clearTimeout(timeout);
      delete window[callbackName];
      script.remove();
    }
    window[callbackName] = raw=>{
      cleanup();
      resolve(raw);
    };
    script.onerror = ()=>{
      cleanup();
      reject(new Error('JSONP script 載入失敗'));
    };
    script.src = withQuery(REVIEW_READ_URL, {
      callback: callbackName,
      v: Date.now()
    });
    document.body.appendChild(script);
  });
}
async function loadReviews(){
  try{
    if(REVIEW_READ_URL === 'REVIEW_READ_URL') throw new Error('尚未設定 REVIEW_READ_URL');
    reviews = normalizeReviews(await loadReviewsJsonp());
  }catch(err){
    showError('Google Sheet 審核結果載入失敗：' + err.message);
    reviews = [];
  }
  renderReviews();
}
function getPromptChanges(){
  const {discussion, reclassify} = getReviewBuckets();
  const mobileChanges = discussion
    .map(r => {
      const decision = getMobileDecision(getReviewKey(r));
      return {
        ...r,
        status: decision.status,
        suggestedSpinType: decision.suggestedSpinType
      };
    })
    .filter(r =>
      r.status === 'reclassify' &&
      r.suggestedSpinType &&
      r.currentSpinType &&
      r.suggestedSpinType !== r.currentSpinType
    );
  const seen = new Set();
  return [...reclassify, ...mobileChanges].filter(r => {
    const key = getReviewKey(r);
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function getPromptApprovals(extraItems = []){
  const {discussion, approved} = getReviewBuckets();
  const mobileApprovals = discussion
    .map(r => {
      const decision = getMobileDecision(getReviewKey(r));
      return {
        ...r,
        status: decision.status,
        suggestedSpinType: decision.suggestedSpinType
      };
    })
    .filter(r => r.status === 'approved');
  const seen = new Set();
  return [...approved, ...mobileApprovals, ...extraItems].filter(r => {
    const key = getReviewKey(r);
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function getPromptDeletes(){
  const {discussion, deleteItems} = getReviewBuckets();
  const mobileDeletes = discussion
    .map(r => {
      const decision = getMobileDecision(getReviewKey(r));
      return {
        ...r,
        status: decision.status,
        suggestedSpinType: decision.suggestedSpinType
      };
    })
    .filter(r => r.status === 'delete');
  const seen = new Set();
  return [...deleteItems, ...mobileDeletes].filter(r => {
    const key = getReviewKey(r);
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function generatePrompt(){
  const changes = getPromptChanges();
  const approvals = getPromptApprovals(changes);
  const deletes = getPromptDeletes();
  const sections = [];
  const changeLines = changes.map(r=>`- ${r.src}: ${r.currentSpinType} -> ${r.suggestedSpinType}`);
  const approvalLines = approvals.map(r=>`- ${r.src}: reviewStatus -> approved`);
  const deleteLines = deletes.map(r=>`- ${r.src}: delete from videos.json`);
  if(changeLines.length){
    sections.push('將以下影片重新分類：\n' + changeLines.join('\n'));
  }
  if(approvalLines.length){
    sections.push('將以下影片標記為已確認，不要再出現在審核清單：\n' + approvalLines.join('\n'));
  }
  if(deleteLines.length){
    sections.push('刪除以下影片資料，因為它們無法提供有效訓練判斷：\n' + deleteLines.join('\n'));
  }
  const text = sections.length
    ? '請修改 videos.json：\n\n' + sections.join('\n\n')
    : '目前沒有需要重新分類、標記已確認或刪除的審核結果。';
  const prompt = document.getElementById('prompt');
  if(prompt) prompt.value = text;
  return text;
}
async function copyCodexPrompt(){
  const text = generatePrompt();
  const button = document.querySelector('.copy-action');
  const original = button ? button.textContent : '';
  try{
    await navigator.clipboard.writeText(text);
  }catch(err){
    const prompt = document.getElementById('prompt');
    if(prompt){
      prompt.select();
      document.execCommand('copy');
    }
  }
  if(button){
    button.textContent = '已複製 Codex 指令';
    setTimeout(()=>{ button.textContent = original; }, 1600);
  }
}
async function init(){
  try{
    const res = await fetch('videos.json?v=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const all = await res.json();
    videos = all.filter(item=>item.kind === 'video');
    renderList();
  }catch(err){
    showError('videos.json 載入失敗：' + err.message);
    document.getElementById('videoList').textContent = '載入失敗';
  }
  loadReviews();
}
init();
</script>
</body>
</html>
