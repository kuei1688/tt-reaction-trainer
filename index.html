<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌球接發球訓練</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@400;700&display=swap');

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border:  #30363d;
    --green:   #3fb950;
    --yellow:  #d29922;
    --red:     #f85149;
    --blue:    #58a6ff;
    --purple:  #bc8cff;
    --text:    #e6edf3;
    --muted:   #7d8590;
    --radius:  10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  /* ── SCREENS ── */
  .screen { width: 100%; max-width: 580px; }
  .hidden { display: none !important; }

  /* floating next button */
  .float-next {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--green);
    border: none;
    border-radius: 50px;
    padding: 12px 22px;
    color: #0d1117;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 999;
    transition: opacity 0.15s, transform 0.15s;
    display: none;
  }
  .float-next.show { display: block; }
  .float-next:hover { opacity: 0.88; transform: scale(1.04); }

  /* result flash overlay on answer area */
  .result-flash {
    font-size: 28px;
    font-weight: 900;
    text-align: center;
    padding: 20px 0;
    animation: flashIn 0.2s ease;
  }
  .result-flash.ok  { color: var(--green); }
  .result-flash.bad { color: var(--red); }
  .result-flash.time { color: var(--yellow); }
  @keyframes flashIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── START SCREEN ── */
  #startScreen { text-align: center; padding-top: 32px; }

  .logo-mark {
    width: 64px; height: 64px;
    background: var(--green);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }

  .start-title {
    font-size: 26px; font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .start-sub {
    font-size: 13px; color: var(--muted);
    margin-bottom: 28px; line-height: 1.6;
  }

  .principle-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: left;
    margin-bottom: 24px;
  }
  .principle-box h3 {
    font-size: 11px; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .principle-item {
    display: flex; gap: 12px;
    margin-bottom: 12px; align-items: flex-start;
  }
  .principle-item:last-child { margin-bottom: 0; }
  .p-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--green);
    flex-shrink: 0; margin-top: 1px;
  }
  .p-text { font-size: 13px; line-height: 1.6; color: var(--text); }
  .p-text strong { color: var(--green); font-weight: 700; }

  .start-btn {
    background: var(--green);
    border: none; border-radius: var(--radius);
    padding: 14px 40px;
    color: #0d1117;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.05em;
    transition: opacity 0.15s;
    width: 100%;
  }
  .start-btn:hover { opacity: 0.85; }

  /* ── GAME SCREEN ── */
  #gameScreen { width: 100%; max-width: 580px; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .top-bar h1 {
    font-size: 11px; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase;
  }
  .score-chips { display: flex; gap: 10px; }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 700;
    font-family: 'Roboto Mono', monospace;
  }
  .chip span { color: var(--muted); font-weight: 400; margin-right: 4px; }

  /* phase bar */
  .phase-bar {
    display: flex; gap: 4px;
    margin-bottom: 12px;
  }
  .ph {
    flex: 1; height: 3px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .ph.active { background: var(--green); }
  .ph.done { background: var(--surface2); }

  /* timer */
  .timer-wrap { height: 2px; background: var(--border); margin-bottom: 16px; border-radius: 1px; }
  .timer-bar { height: 100%; background: var(--green); border-radius: 1px; transition: width 0.1s linear, background 0.3s; }
  .timer-bar.warn { background: var(--yellow); }
  .timer-bar.urgent { background: var(--red); }

  /* card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 0;
  }

  .card-body { padding: 20px; }

  /* situation */
  .sit-label {
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 10px;
  }

  .serve-viz {
    display: flex; gap: 14px; align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }

  .body-icon { flex-shrink: 0; }
  .serve-info { flex: 1; }
  .serve-spin {
    font-size: 17px; font-weight: 700;
    margin-bottom: 3px;
  }
  .serve-hint { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* paddle SVG container */
  .paddle-wrap { flex-shrink: 0; }

  /* cue box */
  .cue-box {
    display: flex; align-items: center; gap: 10px;
    border-radius: 7px; padding: 10px 14px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  .cue-box.green { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.25); }
  .cue-box.yellow { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.25); }
  .cue-box.blue { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.25); }
  .cue-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .cue-box.green .cue-dot { background: var(--green); animation: pulse 1s infinite; }
  .cue-box.yellow .cue-dot { background: var(--yellow); }
  .cue-box.blue .cue-dot { background: var(--blue); }
  .cue-text { font-size: 13px; font-weight: 600; }
  .cue-box.green .cue-text { color: var(--green); }
  .cue-box.yellow .cue-text { color: var(--yellow); }
  .cue-box.blue .cue-text { color: var(--blue); }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.6); opacity: 0.4; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* question */
  .q-label {
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 16px; font-weight: 600;
    margin-bottom: 14px; line-height: 1.5;
  }

  /* options */
  .options { display: grid; gap: 8px; }
  .options.g2 { grid-template-columns: 1fr 1fr; }
  .options.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .options.g4 { grid-template-columns: 1fr 1fr; }

  .opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 12px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center; line-height: 1.4;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--green);
    background: rgba(63,185,80,0.08);
    color: var(--green);
  }
  .opt.correct { border-color: var(--green); background: rgba(63,185,80,0.12); color: var(--green); }
  .opt.wrong   { border-color: var(--red);   background: rgba(248,81,73,0.10);  color: var(--red); }
  .opt.reveal  { border-color: var(--green); background: rgba(63,185,80,0.06);  color: var(--green); opacity: 0.55; }
  .opt:disabled { cursor: default; }

  /* feedback */
  .feedback {
    border-top: 1px solid var(--border);
    padding: 18px 20px;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .feedback.show { display: block; }

  .fb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .fb-icon { font-size: 16px; }
  .fb-title { font-size: 14px; font-weight: 700; }
  .fb-title.ok  { color: var(--green); }
  .fb-title.bad { color: var(--red); }
  .fb-title.time { color: var(--yellow); }

  .fb-body { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 10px; }
  .fb-tip {
    background: rgba(88,166,255,0.07);
    border-left: 3px solid var(--blue);
    border-radius: 0 6px 6px 0;
    padding: 9px 13px;
    font-size: 12px; color: var(--blue);
    line-height: 1.6; margin-bottom: 14px;
  }

  .next-btn {
    width: 100%; background: var(--green);
    border: none; border-radius: 8px;
    padding: 12px; color: #0d1117;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  .next-btn:hover { opacity: 0.85; }

  /* ── END SCREEN ── */
  #endScreen { text-align: center; padding-top: 40px; }
  .end-title { font-size: 22px; font-weight: 900; margin-bottom: 20px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .result-box .rnum {
    font-family: 'Roboto Mono', monospace;
    font-size: 32px; font-weight: 700; color: var(--green);
  }
  .result-box .rlbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .end-msg { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
</style>
</head>
<body>

<!-- ════ START SCREEN ════ -->
<div class="screen" id="startScreen">
  <div class="logo-mark">🏓</div>
  <div class="start-title">接發球判斷訓練</div>
  <div class="start-sub">反手發球情境 · 第一版</div>

  <div class="principle-box">
    <h3>訓練原則</h3>
    <div class="principle-item">
      <div class="p-num">1</div>
      <div class="p-text"><strong>兩段式判斷：</strong>先看引拍高低預判旋轉族群，再看觸球瞬間拍面確認旋轉類型</div>
    </div>
    <div class="principle-item">
      <div class="p-num">2</div>
      <div class="p-text"><strong>果斷優先：</strong>猶豫打出去的球品質最差。判斷錯了果斷執行，遠比三心兩意好</div>
    </div>
    <div class="principle-item">
      <div class="p-num">3</div>
      <div class="p-text"><strong>限時的意義：</strong>不是製造壓力，而是讓「等彈跳再判斷」這個選項消失</div>
    </div>
  </div>

  <button class="start-btn" id="startBtn" type="button">開始訓練</button>
</div>

<!-- ════ GAME SCREEN ════ -->
<button class="float-next" id="floatNext" type="button">下一球 →</button>
<div id="gameScreen" class="hidden screen">
  <div class="top-bar">
    <h1>接發球判斷</h1>
    <div class="score-chips">
      <div class="chip"><span>答對</span><span id="scoreNum">0</span></div>
      <div class="chip"><span>題</span><span id="qNum">1</span>/<span id="qTotal">8</span></div>
      <div class="chip" style="color:var(--yellow)"><span>連續</span><span id="streakNum">0</span></div>
    </div>
  </div>

  <div class="phase-bar" id="phaseBar">
    <div class="ph" id="ph1"></div>
    <div class="ph" id="ph2"></div>
    <div class="ph" id="ph3"></div>
    <div class="ph" id="ph4"></div>
  </div>

  <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>

  <div class="card">
    <div class="card-body" id="cardBody"><!-- injected --></div>
    <div class="feedback" id="feedbackArea" style="padding:12px 20px;">
      <div class="fb-header">
        <div class="fb-icon" id="fbIcon"></div>
        <div class="fb-title" id="fbTitle"></div>
      </div>
      <div class="fb-tip" id="fbTip" style="margin-bottom:0;"></div>
    </div>
  </div>
</div>

<!-- ════ END SCREEN ════ -->
<div id="endScreen" class="hidden screen">
  <div class="end-title">訓練完成</div>
  <div class="result-grid">
    <div class="result-box"><div class="rnum" id="finalScore">0</div><div class="rlbl">答對題數</div></div>
    <div class="result-box"><div class="rnum" id="finalPct">0%</div><div class="rlbl">正確率</div></div>
  </div>
  <div class="end-msg" id="endMsg"></div>
  <button class="start-btn" id="restartBtn" type="button">再練一次</button>
</div>


<script>
const IMAGE_LIBRARY = {
  contact_sidetopspin: ['images/contact_sidetopspin/001.jpg', 'images/contact_sidetopspin/001.mp4', 'images/contact_sidetopspin/002.mp4'],
  contact_backspin:    ['images/contact_backspin/001.jpg', 'images/contact_backspin/001.mp4'],
  contact_sidespin:    ['images/contact_sidespin/001.jpg'],
  contact_nospin:      ['images/contact_nospin/001.jpg'],
  backswing_low:       ['images/backswing_low/001.jpg'],
  backswing_mid:       ['images/backswing_mid/001.jpg'],
  backswing_high:      ['images/backswing_high/001.jpg'],
};

function getImg(key) {
  const arr = IMAGE_LIBRARY[key];
  return arr[Math.floor(Math.random() * arr.length)];
}

// Render media: supports both jpg and mp4
function renderMedia(src, style) {
  const ext = src.split('.').pop().toLowerCase();
  if (ext === 'mp4' || ext === 'webm' || ext === 'mov') {
    return `<video src="${src}" style="${style}" autoplay loop muted playsinline></video>`;
  }
  return `<img src="${src}" style="${style}" />`;
}

const IMAGES = new Proxy({}, { get: (_, key) => getImg(key) });

const TABLE_SVG = {
  fh: `<svg width="100%" viewBox="0 0 240 210" role="img">
  <defs>
    <marker id="arr_fh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="10" y="20" width="220" height="150" rx="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="10" y="91" width="220" height="4" rx="1" fill="#555"/>
  <line x1="120" y1="20" x2="120" y2="170" stroke="#777" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="157" cy="14" r="6" fill="#888"/>
  <text x="157" y="7" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">對方</text>
  <circle cx="157" cy="32" r="7" fill="#e6edf3" opacity="0.9"/>
  <line x1="161" y1="38" x2="200" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#arr_fh)" opacity="0.85"/>
  <circle cx="83" cy="180" r="6" fill="#888"/>
  <text x="83" y="194" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">你</text>
  <text x="40" y="207" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">反手</text>
  <text x="195" y="207" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">正手</text>
</svg>`,
  bh: `<svg width="100%" viewBox="0 0 240 210" role="img">
  <defs>
    <marker id="arr_bh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="10" y="20" width="220" height="150" rx="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="10" y="91" width="220" height="4" rx="1" fill="#555"/>
  <line x1="120" y1="20" x2="120" y2="170" stroke="#777" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="157" cy="14" r="6" fill="#888"/>
  <text x="157" y="7" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">對方</text>
  <circle cx="157" cy="32" r="7" fill="#e6edf3" opacity="0.9"/>
  <line x1="153" y1="38" x2="50" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#arr_bh)" opacity="0.85"/>
  <circle cx="83" cy="180" r="6" fill="#888"/>
  <text x="83" y="194" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif">你</text>
  <text x="40" y="207" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">反手</text>
  <text x="195" y="207" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">正手</text>
</svg>`
};

// ═══ SERVE SCENE SVG ═══
// 正視角：對方面對你，右手在你視角右側
// 反手發球：右手在身體右側，拍頭朝右，往左前方揮出
// spinType: 'backspin' | 'sidespin' | 'sidetopspin' | 'nospin'
function serveSceneSVG(spinType, color) {

  // 手腕位置（反手：右手在身體右側）
  const wristX = 102, wristY = 50;

  let paddleG = '';
  let bsLabel = '';
  let bsColor = '';
  let motionHint = '';

  if (spinType === 'backspin') {
    // 下旋：拍面水平，拍頭朝右，往左前方切球底部
    bsLabel = '低引拍'; bsColor = '#f85149';
    motionHint = '往下切';
    paddleG = `
      <g transform="translate(${wristX},${wristY})">
        <line x1="0" y1="0" x2="-13" y2="-5" stroke="#9d9d9d" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="16" cy="2" rx="16" ry="8" fill="${color}" opacity="0.18" transform="rotate(-8,16,2)"/>
        <ellipse cx="16" cy="2" rx="16" ry="8" fill="none" stroke="${color}" stroke-width="2" transform="rotate(-8,16,2)"/>
        <line x1="4" y1="1" x2="-20" y2="-5" stroke="${color}" stroke-width="1.4" stroke-dasharray="3,2" opacity="0.6"/>
        <polygon points="-20,-2.5 -20,-7.5 -25,-5" fill="${color}" opacity="0.8"/>
      </g>`;
  } else if (spinType === 'sidespin') {
    // 側旋：拍面立起，拍頭朝右偏高，往左側切
    bsLabel = '高引拍'; bsColor = '#58a6ff';
    motionHint = '往左側切';
    paddleG = `
      <g transform="translate(${wristX},${wristY - 8})">
        <line x1="0" y1="0" x2="-10" y2="9" stroke="#9d9d9d" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="13" cy="-12" rx="8" ry="16" fill="${color}" opacity="0.18" transform="rotate(-10,13,-12)"/>
        <ellipse cx="13" cy="-12" rx="8" ry="16" fill="none" stroke="${color}" stroke-width="2" transform="rotate(-10,13,-12)"/>
        <line x1="3" y1="-8" x2="-22" y2="-12" stroke="${color}" stroke-width="1.4" stroke-dasharray="3,2" opacity="0.6"/>
        <polygon points="-22,-9.5 -22,-14.5 -27,-12" fill="${color}" opacity="0.8"/>
      </g>`;
  } else if (spinType === 'sidetopspin') {
    // 側下旋：拍面約45度，拍頭朝右偏低，往左下切
    bsLabel = '中引拍'; bsColor = '#d29922';
    motionHint = '斜向左下切';
    paddleG = `
      <g transform="translate(${wristX},${wristY})">
        <line x1="0" y1="0" x2="-12" y2="-5" stroke="#9d9d9d" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="12" cy="-6" rx="9" ry="16" fill="${color}" opacity="0.18" transform="rotate(45,12,-6)"/>
        <ellipse cx="12" cy="-6" rx="9" ry="16" fill="none" stroke="${color}" stroke-width="2" transform="rotate(45,12,-6)"/>
        <line x1="3" y1="-2" x2="-20" y2="8" stroke="${color}" stroke-width="1.4" stroke-dasharray="3,2" opacity="0.6"/>

function buildQueue() {
  const q = [...SCENARIOS, ...SCENARIOS]; // each scenario appears twice
  for (let i = q.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [q[i], q[j]] = [q[j], q[i]];
  }
  return q;
}

      <button class="opt" onclick="answerLanding('fh')" style="padding:6px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;flex:2;border-radius:10px;">
        ${side === 'bh' ? bhRightSVG : fhRightSVG}
        <span style="font-size:10px;font-weight:700;color:${side === 'fh' ? '#3fb950' : 'var(--text)'};">正手位</span>
      </button>
    </div>
  `;
  startTimer();
}

function renderTech(sc, landing) {
  gamePhase = 'tech';

  ['ph1','ph2','ph3','ph4'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'ph' + (i < 2 ? ' done' : i === 2 ? ' active' : '');
  });

  const correctTech = sc.techMap[landing];
  const wrongTechs = landing === 'fh'
    ? ['切球', '拉球', '撥球'].filter(t => t !== correctTech)
    : ['切球', '平推', '撥球'].filter(t => t !== correctTech);
  const allTechs = [correctTech, wrongTechs[0], wrongTechs[1]].sort(() => Math.random() - 0.5);
  const correctIdx = allTechs.indexOf(correctTech);

  // Store for answer checking
  window._currentTechs = allTechs;
  window._correctTechIdx = correctIdx;

  document.getElementById('answerArea').innerHTML = `
    <div class="cue-box blue" style="margin-bottom:10px;">
      <div class="cue-dot" style="background:var(--blue);animation:none;opacity:1;"></div>
      <div class="cue-text" style="color:var(--blue)">選擇技術</div>
    </div>
    <div class="q-label" style="margin-bottom:8px;">技術是？</div>
    <div style="display:flex;flex-direction:column;gap:8px;" id="techArea">
      ${allTechs.map((t, i) =>
        `<button class="opt" onclick="answerTech(${i})" style="width:100%;">${t}</button>`
      ).join('')}
    </div>
  `;
  startTimer();
}


function showNextControls() {
  document.getElementById('floatNext').classList.add('show');
  const area = document.getElementById('feedbackArea');
  let btn = document.getElementById('inlineNextBtn');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'inlineNextBtn';
    btn.type = 'button';
    btn.className = 'next-btn';
    btn.textContent = '下一球 →';
    btn.style.marginTop = '14px';
    btn.onclick = nextQuestion;
    area.appendChild(btn);
  }
  btn.style.display = 'block';
}

function hideNextControls() {
  document.getElementById('floatNext').classList.remove('show');
  const btn = document.getElementById('inlineNextBtn');
  if (btn) btn.style.display = 'none';
}

function autoNextQuestion(delay = 900) {
  hideNextControls();
  clearTimeout(window._autoNextTimer);
  window._autoNextTimer = setTimeout(nextQuestion, delay);
}

// ═══ ANSWERS ═══
function answerSpin(idx) {
  stopTimer();
  const sc = queue[qIndex];
  const correct = idx === sc.correctSpin;

  document.querySelectorAll('#optionsArea .opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === sc.correctSpin) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  if (!correct) {
    streak = 0;
    document.getElementById('streakNum').textContent = 0;
    showSpinFeedback(sc, false, false);
    return;
  }

  selectedSpin = sc.spinChoices[idx];
  // Proceed to landing after short delay
  setTimeout(() => renderLanding(sc), 400);
}

function answerLanding(side) {
  stopTimer();
  const sc = queue[qIndex];
  const correct = side === window._currentLandingSide;
  selectedLanding = window._currentLandingSide;

  document.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
  });

  if (!correct) {
    streak = 0;
    document.getElementById('streakNum').textContent = 0;
    const correctLabel = window._currentLandingSide === 'fh' ? '正手位' : '反手位';
    const area = document.getElementById('feedbackArea');
    document.getElementById('fbIcon').textContent = '✗';
    document.getElementById('fbTitle').className = 'fb-title bad';
    document.getElementById('fbTitle').textContent = '不對';
    document.getElementById('fbTip').textContent = '💡 看箭頭指向哪邊：往右下 → 正手位；往左下 → 反手位。';
    area.className = 'feedback show';
    showNextControls();
    return;
  }

  setTimeout(() => renderTech(sc, selectedLanding), 300);
}

function answerTech(idx) {
  stopTimer();
  const sc = queue[qIndex];
  const correct = idx === window._correctTechIdx;

  document.querySelectorAll('#techArea .opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === window._correctTechIdx) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  if (correct) {
    score++;
    streak++;
  } else {
    streak = 0;
    if (window._errors) window._errors[sc.spinType] = (window._errors[sc.spinType] || 0) + 1;
  }
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('streakNum').textContent = streak;

  ['ph1','ph2','ph3','ph4'].forEach((id, i) => {
    document.getElementById(id).className = 'ph' + (i < 3 ? ' done' : i === 3 ? ' active' : '');
  });

  showTechFeedback(sc, selectedLanding, correct);
}

function timeUp() {
  const sc = queue[qIndex];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  streak = 0;
  document.getElementById('streakNum').textContent = 0;

  const area = document.getElementById('feedbackArea');
  document.getElementById('fbIcon').textContent = '⏱';
  document.getElementById('fbTitle').className = 'fb-title time';
  document.getElementById('fbTitle').textContent = '來不及反應';
  document.getElementById('fbTip').textContent = '💡 果斷優先：就算判斷錯了，果斷執行遠比猶豫好。';
  area.className = 'feedback show';
  showNextControls();
}

function showSpinFeedback(sc, correct, timedOut) {
  const fb = sc.spinFeedback;
  const area = document.getElementById('feedbackArea');
  document.getElementById('fbIcon').textContent = correct ? '✓' : '✗';
  document.getElementById('fbTitle').className = 'fb-title ' + (correct ? 'ok' : 'bad');
  document.getElementById('fbTitle').textContent = correct ? '正確' : (timedOut ? '來不及' : '不對');
  document.getElementById('fbTip').textContent = '💡 ' + fb.tip;
  area.className = 'feedback show';
  // Show float next button
  showNextControls();
}

function showTechFeedback(sc, landing, correct) {
  const fb = TECH_FEEDBACK[sc.spinType][landing];
  const area = document.getElementById('feedbackArea');
  document.getElementById('fbIcon').textContent = correct ? '✓' : '✗';
  document.getElementById('fbTitle').className = 'fb-title ' + (correct ? 'ok' : 'bad');
  document.getElementById('fbTitle').textContent = correct ? '正確，下一球' : '不對';
  document.getElementById('fbTip').textContent = '💡 ' + fb.tip;
  area.className = 'feedback show';

  // 手機版節奏：答對自動進下一題；答錯才停下來顯示大按鈕。
  if (correct) autoNextQuestion(900);
  else showNextControls();
}

// ═══ TIMER ═══
function startTimer() {
  let elapsed = 0;
  const bar = document.getElementById('timerBar');
  bar.style.width = '100%';
  bar.className = 'timer-bar';
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    elapsed += TICK;
    const pct = Math.max(0, 100 - (elapsed / TIMER_MS) * 100);
    bar.style.width = pct + '%';
    if (pct < 25) bar.className = 'timer-bar urgent';
    else if (pct < 55) bar.className = 'timer-bar warn';
    if (pct <= 0) { clearInterval(timerInterval); timeUp(); }
  }, TICK);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerBar').style.width = '0%';
}

// ═══ FLOW ═══
function nextQuestion() {
  clearTimeout(window._autoNextTimer);
  hideNextControls();
  qIndex++;
  if (qIndex >= queue.length) endGame();
  else renderQuestion();
}

function startGame() {
  queue = buildQueue();
  qIndex = 0; score = 0; streak = 0;
  window._errors = { sidespin: 0, backspin: 0, sidetopspin: 0, nospin: 0 };
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('streakNum').textContent = 0;
  hideNextControls();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  renderQuestion();
}

function restartGame() {
  document.getElementById('endScreen').classList.add('hidden');
  startGame();
}

function endGame() {
  stopTimer();
  document.getElementById('gameScreen').classList.add('hidden');
  const pct = Math.round((score / queue.length) * 100);
  document.getElementById('finalScore').textContent = score + ' / ' + queue.length;
  document.getElementById('finalPct').textContent = pct + '%';

  const spinNames = { sidespin: '側旋', backspin: '下旋', sidetopspin: '側下旋', nospin: '不轉' };
  const errors = window._errors || {};
  const weakList = Object.entries(errors)
    .filter(([k, v]) => v > 0)
    .sort((a, b) => b[1] - a[1])
    .map(([k, v]) => spinNames[k] + '（' + v + '次）');

  let msg = '';
  if (pct >= 85) msg = '很好的判斷力。判斷鏈條已經開始自動化了。';
  else if (pct >= 60) msg = '有幾個情境需要再熟悉。重點在：低引拍→下旋族，高引拍→平球族。';
  else msg = '多跑幾遍就會熟。重複是讓判斷自動化的唯一方法。';

  if (weakList.length > 0) {
    msg += '\n\n需要加強：' + weakList.join('、');
  }

  document.getElementById('endMsg').textContent = msg;
  document.getElementById('endScreen').classList.remove('hidden');
}

// ═══ ROBUST BUTTON BINDINGS / ERROR DISPLAY ═══
window.addEventListener('error', function (event) {
  const start = document.getElementById('startScreen');
  if (!start) return;
  let box = document.getElementById('errorBox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errorBox';
    box.style.cssText = 'margin-top:14px;padding:12px;border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:12px;line-height:1.6;text-align:left;white-space:pre-wrap;';
    start.appendChild(box);
  }
  box.textContent = '程式啟動時發生錯誤：\n' + (event.message || event.error || '未知錯誤');
});

document.addEventListener('DOMContentLoaded', function () {
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const floatNextBtn = document.getElementById('floatNext');

  if (startBtn) startBtn.addEventListener('click', function (e) { e.preventDefault(); startGame(); });
  if (restartBtn) restartBtn.addEventListener('click', function (e) { e.preventDefault(); restartGame(); });
  if (floatNextBtn) floatNextBtn.addEventListener('click', function (e) { e.preventDefault(); nextQuestion(); });
});

</script>
</body>
</html>
