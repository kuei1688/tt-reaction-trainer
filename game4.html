<!DOCTYPE html>
<html lang="zh-TW" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Game 4 最小版</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#f0f6fc;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;
  --red:#ff7b72;--yellow:#d29922;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
body{display:grid;grid-template-rows:auto 1fr}
header{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);background:#0b1017}
h1{font-size:20px;margin:0}
.badge{color:var(--yellow);font-weight:800;font-size:13px}
main{display:grid;grid-template-columns:minmax(0,1fr) 320px;min-height:0}
.scene-wrap{position:relative;min-height:0;background:#05070a}
canvas{display:block;width:100%;height:100%;touch-action:manipulation}
.hud{position:absolute;left:12px;top:12px;display:grid;gap:8px;max-width:min(480px,calc(100% - 24px));pointer-events:none}
.hud-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pill{background:rgba(13,17,23,.85);border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.24)}
.pill.ok{border-color:rgba(63,185,80,.6);color:var(--green)}
.pill.bad{border-color:rgba(255,123,114,.65);color:var(--red)}
.pill.warn{border-color:rgba(210,153,34,.65);color:var(--yellow)}
.center-tip{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(13,17,23,.88);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-weight:800;color:var(--text);text-align:center;min-width:min(520px,calc(100% - 24px))}
.action-pad{position:absolute;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:1fr 2fr;gap:9px;align-items:end;pointer-events:none;opacity:0;visibility:hidden;transition:opacity 200ms ease, visibility 0s linear 200ms}
.action-pad.active{pointer-events:auto;opacity:1;visibility:visible;transition:opacity 150ms ease}
.action-zone{display:grid;grid-template-rows:auto 1fr;gap:7px;min-height:108px;padding:8px;border:1px solid rgba(88,166,255,.34);border-radius:8px;background:rgba(13,17,23,.34);box-shadow:0 10px 26px rgba(0,0,0,.22);backdrop-filter:blur(2px)}
.action-zone.forehand{border-color:rgba(63,185,80,.36)}
.zone-label{font-size:12px;font-weight:900;color:rgba(240,246,252,.72);text-shadow:0 1px 2px rgba(0,0,0,.7)}
.zone-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;align-content:end}
.zone-actions button{min-height:58px;font-size:16px;background:rgba(33,38,45,.72);box-shadow:0 8px 18px rgba(0,0,0,.22)}
.action-zone.backhand .zone-actions{grid-template-columns:1fr}
.zone-actions .technique-button{min-height:68px;padding:6px;background:rgba(13,17,23,.28);border-color:rgba(240,246,252,.18);overflow:hidden}
.zone-actions .technique-button:hover{background:rgba(13,17,23,.42)}
.zone-actions .technique-button.active{background:rgba(88,166,255,.18)}
.technique-button.charging{border-color:var(--green)}
.action-pad.loop-expired [data-return-technique="loop"]{opacity:0;pointer-events:none;transition:opacity 200ms ease}
.technique-button:disabled .technique-icon{opacity:.34;filter:grayscale(.25)}
.technique-icon{display:block;width:100%;height:58px;object-fit:contain;opacity:.78;filter:drop-shadow(0 7px 10px rgba(0,0,0,.42));transition:opacity .15s ease, transform .15s ease}
.technique-button:hover .technique-icon,.technique-button.active .technique-icon{opacity:1;transform:scale(1.03)}
.loop-icon{font-size:24px;line-height:58px;color:rgba(240,246,252,.88);text-shadow:0 7px 10px rgba(0,0,0,.42)}
aside{border-left:1px solid var(--border);background:var(--surface);min-height:0;overflow:auto}
.section{padding:12px;border-bottom:1px solid var(--border)}
h2{font-size:14px;margin:0 0 8px;color:var(--yellow)}
.list{display:grid;gap:7px}
button{width:100%;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:7px;padding:11px 12px;font-weight:900;font-size:15px;cursor:pointer}
button:hover{border-color:var(--blue)}
button.primary{background:var(--blue);color:#06101f;border-color:var(--blue)}
button.good{background:rgba(63,185,80,.18);border-color:rgba(63,185,80,.65)}
button.warn{background:rgba(210,153,34,.14);border-color:rgba(210,153,34,.65);color:var(--yellow)}
button.active{outline:2px solid var(--blue);background:rgba(88,166,255,.18)}
button:disabled{opacity:.45;cursor:not-allowed}
.tech-grid{display:grid;gap:8px}
.option-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:7px;background:rgba(13,17,23,.45);font-size:13px;font-weight:800;color:var(--text);cursor:pointer}
.option-row input{width:18px;height:18px;accent-color:var(--blue)}
.field-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:7px;background:rgba(13,17,23,.45)}
.field-row label{white-space:nowrap}
.field-row select{flex:1}
.meta{font-size:12px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
.result{font-size:16px;font-weight:900;line-height:1.45}
.result.ok{color:var(--green)}
.result.bad{color:var(--red)}
.small{font-size:12px;color:var(--muted)}
@media (max-width: 820px){
  html{overflow-y:auto}
  body{overflow:visible;min-height:100vh}
  main{grid-template-columns:1fr;grid-template-rows:50vh auto}
  aside{border-left:0;border-top:1px solid var(--border);overflow:visible;max-height:none;padding-bottom:128px}
  h1{font-size:18px}
  .center-tip{bottom:10px;min-width:calc(100% - 20px);font-size:13px}
  .action-pad{left:8px;right:8px;bottom:8px;gap:7px}
  .action-zone{min-height:96px;padding:7px}
  .zone-actions button{min-height:50px;font-size:14px;padding:7px}
  .zone-actions .technique-button{min-height:58px;padding:5px}
  .technique-icon{height:48px}
  #controlsSection{
    position:fixed;
    left:0;right:0;bottom:0;
    z-index:40;
    background:var(--surface);
    border-top:1px solid var(--border);
    border-bottom:0;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    box-shadow:0 -8px 22px rgba(0,0,0,.4);
  }
  #controlsSection h2{display:none}
  #controlsSection .list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  #controlsSection .option-row{grid-column:1 / -1;padding:6px 8px;font-size:12px}
  #controlsSection .field-row{grid-column:1 / -1;padding:6px 8px;font-size:12px}
  #controlsSection button{min-height:46px;font-size:14px;padding:8px}
}
</style>
</head>
<body translate="no" class="notranslate">
<header>
  <h1>Game 4 最小版</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="badge">Serve → Choice → Return</div>
    <div id="buildVersion" style="font-size:11px;color:#555;font-family:monospace" title="build version">-----</div>
  </div>
</header>
<main>
  <section class="scene-wrap">
    <canvas id="scene"></canvas>
    <div class="hud">
      <div class="hud-row">
        <div class="pill" id="serveName">載入中</div>
        <div class="pill" id="phaseText">準備</div>
      </div>
      <div class="hud-row">
        <div class="pill" id="choiceText">尚未選擇</div>
        <div class="pill" id="scoreText">成功 0 / 失分 0</div>
      </div>
    </div>
    <div class="action-pad" id="actionPad">
      <div class="action-zone backhand">
        <div class="zone-label">反手區 1/3</div>
        <div class="zone-actions">
          <button class="technique-button" type="button" data-return-side="backhand" data-return-technique="loop" title="反手拉球" aria-label="反手拉球"><span class="loop-icon">↻</span></button>
          <button class="technique-button" type="button" data-return-side="backhand" data-return-technique="backhand_attack" title="反手攻球" aria-label="反手攻球"><img class="technique-icon" src="images/techniques/attack.png" alt=""></button>
          <button class="technique-button" type="button" data-return-side="backhand" data-return-technique="push" title="反手切球" aria-label="反手切球"><img class="technique-icon" src="images/techniques/cut.png" alt=""></button>
        </div>
      </div>
      <div class="action-zone forehand">
        <div class="zone-label">正手區 2/3</div>
        <div class="zone-actions">
          <button class="technique-button" type="button" data-return-side="forehand" data-return-technique="loop" title="正手拉球" aria-label="正手拉球"><span class="loop-icon">↻</span></button>
          <button class="technique-button" type="button" data-return-side="forehand" data-return-technique="forehand_attack" title="正手攻球" aria-label="正手攻球"><img class="technique-icon" src="images/techniques/attack.png" alt=""></button>
          <button class="technique-button" type="button" data-return-side="forehand" data-return-technique="push" title="正手切球" aria-label="正手切球"><img class="technique-icon" src="images/techniques/cut.png" alt=""></button>
        </div>
      </div>
    </div>
    <div class="center-tip" id="centerTip">讀取 physics-presets.json...</div>
  </section>
  <aside>
    <div class="section">
      <h2>發球 Preset</h2>
      <div class="list" id="serveList"></div>
    </div>
    <div class="section">
      <h2>回擊技術</h2>
      <div class="small">球停在可回擊點時，直接用畫面下方的分區按鈕回擊。左側 1/3 是反手區，右側 2/3 是正手區。</div>
    </div>
    <div class="section" id="controlsSection">
      <h2>操作</h2>
      <div class="list">
        <button id="playBtn" class="primary">開始發球</button>
        <button id="nextBtn">下一球</button>
        <label class="option-row">
          <input id="trajectoryToggle" type="checkbox">
          <span>顯示軌跡</span>
        </label>
        <div class="field-row" id="speedRow">
          <label for="speedControl" style="font-size:12px;font-weight:800;color:var(--muted)">遊戲速度</label>
          <select id="speedControl">
            <option value="0.25">0.25x（很慢，測試回擊用）</option>
            <option value="0.5">0.5x（慢）</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x（正常）</option>
            <option value="1.5">1.5x（快）</option>
            <option value="2">2x（很快）</option>
          </select>
        </div>
        <div class="field-row" id="difficultyRow">
          <label for="difficultyControl" style="font-size:12px;font-weight:800;color:var(--muted)">難度</label>
          <select id="difficultyControl">
            <option value="beginner" selected>beginner（全提示）</option>
            <option value="practice">practice（只閃最高點）</option>
            <option value="match">match（關閉提示）</option>
          </select>
        </div>
      </div>
    </div>
    <div class="section">
      <h2>判定</h2>
      <div id="resultText" class="result">尚未開始</div>
      <div id="detailText" class="meta" style="margin-top:8px"></div>
    </div>
  </aside>
</main>

<script src="vendor/three.r128.min.js"></script>
<script>
const TABLE = {length:2.74, width:1.525, height:0.76, top:0.781, net:0.1525};
const BALL_RADIUS = 0.02;
const BALL_RENDER_RADIUS = 0.022;
const DT = 1 / 120;
const MAX_STEPS = 520;
const MAX_TABLE_BOUNCES = 8;
const RETURN_INPUT = {topspinExpireMs:1200, chargeTimeMs:600, slideThresholdPx:30};
const BALL_COLORS = {default:0xffd84d, rising:0x4488ff, sideRising:0x66bbff, apex:0xffffff, falling:0xef9f27};
const TIMING_HINT = {threshold:0.05, flashMs:100, sideRisingHoldMs:220};
const MISS_Y = TABLE.top - BALL_RADIUS;
const BUILD_VERSION = 'v8h69';
const BOUNCE_PHYSICS = {horizontalRestitution:0.98, topspinKick:0.30, sidespinKick:0.22};
const NET_COLLISION = {depth:0.012, zRestitution:0.16, xDamping:0.55, yDamping:0.35};
// 回擊公式：finalVel = incomingVel * PADDLE_RESTITUTION + techniqueVel
// incomingVel 是球到達擊球點當下的真實速度向量（來自發球模擬），techniqueVel 是固定的揮拍向量（方向/力量/旋轉修正）
const PADDLE_RESTITUTION = -0.9;
const TECHNIQUES = {
  forehand_attack: {label:'正手攻球', techniqueVel:{x:-1.4, y:0.65, z:-2.95}, spin:{topspin:0.15,sidespin:0.05}},
  backhand_attack: {label:'反手攻球', techniqueVel:{x:-0.2, y:1.05, z:-1.45}, spin:{topspin:0.15,sidespin:-0.05}},
  push: {label:'切球', techniqueVel:{x:-0.6, y:1.18, z:-0.65}, spin:{topspin:-0.8,sidespin:0}},
  loop: {label:'拉球', techniqueVel:{x:-0.6, y:1.0, z:-1.65}, spin:{topspin:0.9,sidespin:0}, bounceBoost:0.3}
};
let presets = [];
let selectedServeIndex = 0;
let phase = 'loading';
let selectedSide = null;
let selectedTechnique = null;
let servePath = [];
let serveVelocities = [];
let returnPath = [];
let currentPath = [];
let playStart = 0;
let animation = null;
let hitPoint = null;
let hitVel = null;
let returnAppearIndex = 0;
let returnHintStartIndex = 0;
let returnLandIndex = 0;
let returnMissIndex = 0;
let pendingReturn = null;
let inputWindowOpen = false;
let missResolved = false;
let loopExpireTimer = null;
let chargeState = null;
let score = {ok:0, fail:0};
let showTrajectories = false;
let GAME_SPEED = 1; // 動畫播放速度倍率，只影響球的播放節奏，不影響物理／落點
let DIFFICULTY_MODE = 'beginner';
let currentServePoint = null;
let currentServeVel = null;
let currentTimingPhase = 'unknown';
let timingHintActive = false;
let lastTimingPhase = 'unknown';
let timingFlashUntil = 0;
let timingSideRisingUntil = 0;

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070a);
scene.fog = new THREE.Fog(0x05070a, 7, 14);
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const light = new THREE.DirectionalLight(0xffffff, 0.9);
light.position.set(2,5,3);
scene.add(light);
const camera = new THREE.PerspectiveCamera(48, 1, 0.01, 30);
camera.position.set(0, 1.45, 3.25);
camera.lookAt(0, 0.5, 0.3);

// ── Camera follow state ────────────────────────────────────────────────────
const CAM_HOME_POS    = new THREE.Vector3(0, 1.45, 3.25);
let   CAM_INTERCEPT_Y = 1.45; // 由 camera-config.json 覆蓋
const CAM_LOOK_AT     = new THREE.Vector3(0, 0.5, 0.3);
let   CAM_CFG         = {}; // camera-config.json 載入後填入
const camPosTarget    = CAM_HOME_POS.clone();
const camLookTarget   = CAM_LOOK_AT.clone();
const camLookCurrent  = CAM_LOOK_AT.clone();
const hitPointVec     = new THREE.Vector3(); // 反手 lookAt 目標（預測落點）
let camRaf = null;
let camBounceTriggered = false; // 對方第一跳離地後是否已觸發
let camTriggerZ = -TABLE.length; // 觸發門檻 z（對方第一跳 z + margin）

const table = new THREE.Mesh(
  new THREE.BoxGeometry(TABLE.width, 0.04, TABLE.length),
  new THREE.MeshLambertMaterial({color:0x14723f})
);
table.position.set(0, TABLE.height, 0);
scene.add(table);
const edge = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(TABLE.width, 0.041, TABLE.length)),
  new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.55})
);
edge.position.copy(table.position);
scene.add(edge);
const centerLine = makeLine([{x:0,y:TABLE.top+0.003,z:-TABLE.length/2},{x:0,y:TABLE.top+0.003,z:TABLE.length/2}], 0xffffff, 0.3);
scene.add(centerLine);
const net = new THREE.Mesh(
  new THREE.BoxGeometry(TABLE.width, TABLE.net, 0.012),
  new THREE.MeshLambertMaterial({color:0xd9dee6, transparent:true, opacity:0.6})
);
net.position.set(0, TABLE.height + TABLE.net / 2, 0);
scene.add(net);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(7,7),
  new THREE.MeshLambertMaterial({color:0x11151c})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
const ballMaterial = new THREE.MeshLambertMaterial({color:BALL_COLORS.default});
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(BALL_RENDER_RADIUS, 24, 16),
  ballMaterial
);
scene.add(ball);
let pathLine = makeLine([], 0xffd84d, 0.9);
scene.add(pathLine);
let returnLine = makeLine([], 0x58a6ff, 0.85);
scene.add(returnLine);
setTrajectoryVisibility();

function makeLine(points, color, opacity){
  const geometry = new THREE.BufferGeometry().setFromPoints(points.map(p=>new THREE.Vector3(p.x,p.y,p.z)));
  const material = new THREE.LineBasicMaterial({color, transparent:true, opacity});
  return new THREE.Line(geometry, material);
}
function updateLine(line, points){
  line.geometry.dispose();
  line.geometry = new THREE.BufferGeometry().setFromPoints(points.map(p=>new THREE.Vector3(p.x,p.y,p.z)));
}
function setTrajectoryVisibility(){
  if(pathLine) pathLine.visible = showTrajectories;
  if(returnLine) returnLine.visible = showTrajectories;
}
// ── Camera follow helpers ──────────────────────────────────────────────────
function tickCamera(){
  const f = CAM_CFG.lerpFactor ?? 0.025;
  if(phase === 'serve'){
    if(!camBounceTriggered && ball.position.z > camTriggerZ && hitPoint){
      camBounceTriggered = true;
      camPosTarget.set(hitPoint.x, CAM_INTERCEPT_Y, CAM_HOME_POS.z);
    }
    camera.position.lerp(camPosTarget, f * 2);
    const tx = ball.position.x * 0.1;
    camLookCurrent.x += (tx - camLookCurrent.x) * f;
    camLookCurrent.y = CAM_LOOK_AT.y;
    camLookCurrent.z = CAM_LOOK_AT.z;
  } else if(phase === 'return'){
    camera.position.lerp(camPosTarget, f);
    if(selectedSide === 'backhand'){
      camLookCurrent.lerp(hitPointVec, f);
    } else {
      camLookCurrent.lerp(camLookTarget, f);
    }
  } else {
    camera.position.lerp(camPosTarget, f);
    camLookCurrent.lerp(CAM_LOOK_AT, f);
  }
  camera.position.y = CAM_INTERCEPT_Y;
  camera.lookAt(camLookCurrent);
}
function applyCamConfig(){
  CAM_INTERCEPT_Y = CAM_CFG.height ?? CAM_INTERCEPT_Y;
  CAM_HOME_POS.setY(CAM_INTERCEPT_Y);
  if(CAM_CFG.lookAt){
    CAM_LOOK_AT.set(CAM_CFG.lookAt.x ?? 0, CAM_CFG.lookAt.y ?? 0.5, CAM_CFG.lookAt.z ?? 0.3);
  }
  camera.position.y = CAM_INTERCEPT_Y;
  camera.lookAt(CAM_LOOK_AT);
}
function resetCam(hard){
  camBounceTriggered = false;
  camPosTarget.copy(CAM_HOME_POS);
  camLookTarget.copy(CAM_LOOK_AT);
  if(hard){
    camera.position.copy(CAM_HOME_POS);
    camLookCurrent.copy(CAM_LOOK_AT);
    camera.lookAt(CAM_LOOK_AT);
  }
}
function startCamReturn(){
  if(camRaf) cancelAnimationFrame(camRaf);
  function loop(){
    tickCamera();
    if(animation === null) render();
    const posDone  = camera.position.distanceTo(camPosTarget) < 0.002;
    const lookDone = camLookCurrent.distanceTo(CAM_LOOK_AT) < 0.002;
    camRaf = (posDone && lookDone) ? null : requestAnimationFrame(loop);
  }
  camRaf = requestAnimationFrame(loop);
}
function resize(){
  const rect = canvas.parentElement.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false);
  camera.aspect = rect.width / Math.max(1, rect.height);
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}
window.addEventListener('resize', resize);
if(window.ResizeObserver){
  new ResizeObserver(resize).observe(canvas.parentElement);
}

function solveVelocity(start, target, time, gravity){
  return {
    x:(target.x - start.x) / time,
    y:(target.y - start.y - 0.5 * gravity * time * time) / time,
    z:(target.z - start.z) / time
  };
}
function clone(v){ return {x:v.x,y:v.y,z:v.z}; }
function add(a,b){ return {x:a.x+b.x,y:a.y+b.y,z:a.z+b.z}; }
function clamp(value,min,max){ return Math.max(min, Math.min(max, value)); }
function isValidPoint(point){
  return point && Number.isFinite(point.x) && Number.isFinite(point.y) && Number.isFinite(point.z);
}
function applyBounceSpin(vel, spin, bounce){
  const speed = Math.hypot(vel.x, vel.z);
  const forward = speed > 0.001 ? {x:vel.x/speed, z:vel.z/speed} : {x:0,z:1};
  const side = {x:-forward.z, z:forward.x};
  let forwardSpeed = speed * BOUNCE_PHYSICS.horizontalRestitution + (spin.topspin || 0) * BOUNCE_PHYSICS.topspinKick;
  const sideSpeed = clamp((spin.sidespin || 0) * BOUNCE_PHYSICS.sidespinKick, -speed * 0.75, speed * 0.75);
  forwardSpeed = clamp(forwardSpeed, -speed * 0.55, speed * 1.35);
  vel.x = forward.x * forwardSpeed + side.x * sideSpeed;
  vel.z = forward.z * forwardSpeed + side.z * sideSpeed;
  vel.y = Math.abs(vel.y) * bounce;
}
function simulatePath(start, velocity, options){
  const gravity = options.gravity ?? -4.2;
  const spin = options.spin || {topspin:0,sidespin:0};

      const netTop = TABLE.height + TABLE.net;

        const impact = {
          x:prev.x + (pos.x - prev.x) * ratio,
          y:netY,
          z:0,
          t:i * DT + DT * ratio,
          index:points.length

        pos.x = impact.x;
        pos.y = impact.y;

      velocities.push(clone(vel));

  let bestYNudge = 0;
  let best = null;
  let bestScore = Infinity;

  function consider(time, yNudge){
    const candidate = makeServeAimCandidate(preset, first, time, yNudge);

    if(score < bestScore){
      bestTime = time;
      bestYNudge = yNudge;
      best = candidate;
      bestScore = score;
    }
  }

  for(const time of times){
    for(const yNudge of yNudges) consider(time, yNudge);

  if(!best){
    best = makeServeAimCandidate(preset, first, findServeBounceTime(preset), 0);
    bestScore = serveBounceScore(preset, best);
  }

  let yStep = 0.07;

    for(const dir of [-1,1]){
      const beforeScore = bestScore;
      consider(clamp(bestTime + timeStep * dir, 0.08, 1.05), bestYNudge);
      improved = improved || bestScore < beforeScore;
    }
    for(const dir of [-1,1]){
      const beforeScore = bestScore;
      consider(bestTime, clamp(bestYNudge + yStep * dir, -0.24, 0.24));

      speedIdealMax:5.2,
      speedHardMax:5.7,
      speedReject:6.4

      vySoftMax:0.18,
      vyHardMax:0.35,
      speedIdealMin:2.0,
      speedIdealMax:3.6,
      speedHardMax:4.1,
      speedReject:4.8

    yNudges:[-0.12, -0.05, 0, 0.08, 0.16, 0.28, 0.42, 0.58],
    vySoftMax:0.85,
    vyHardMax:1.15,

    const hardStop = nextBounce ? nextBounce.index : path.points.length;
    const start = receiverBounce.index + 1;
    for(let i = start; i < Math.min(hardStop, path.points.length - 1); i++){

    }

      if(path.points[i].y > TABLE.top && path.points[i + 1].y < path.points[i].y) return Math.min(i + 1, hardStop - 1);
    }
    return Math.min(hardStop - 1, start + 15);

    timingSideRisingUntil = 0;
    return;
  }
  if(currentTimingPhase === 'apex' && lastTimingPhase !== 'apex'){
    timingFlashUntil = now + TIMING_HINT.flashMs;
  }
  if(DIFFICULTY_MODE === 'beginner' && isSidespinServe() && currentTimingPhase === 'rising'){

  }
  lastTimingPhase = currentTimingPhase;
  if(now < timingFlashUntil){
    setBallColor(BALL_COLORS.apex);
    return;
  }
  if(DIFFICULTY_MODE === 'practice'){

    return;
  }
  if(now < timingSideRisingUntil) setBallColor(BALL_COLORS.sideRising);
  else if(currentTimingPhase === 'rising') setBallColor(BALL_COLORS.rising);

    const progress = clamp((now - chargeState.startTime) / RETURN_INPUT.chargeTimeMs, 0, 1);
    const green = Math.round(185 - progress * 105);
    const blue = Math.round(80 - progress * 35);
    button.style.borderColor = `rgb(63, ${green}, ${blue})`;
    if(progress >= 1){
      finish();
      return;
    }
    chargeState.raf = requestAnimationFrame(tick);
  };
  chargeState.raf = requestAnimationFrame(tick);
}
function moveLoopCharge(event){
  if(!chargeState) return;
  const dx = event.clientX - chargeState.startX;
  const dy = event.clientY - chargeState.startY;
  if(Math.hypot(dx, dy) < RETURN_INPUT.slideThresholdPx) return;
  const side = chargeState.side;
  const techniqueKey = switchTechniqueFromSlide(side, dx, dy);
  cancelCharge();
  chooseReturn(side, techniqueKey);
}
function returnBall(techniqueKey){
  if((phase !== 'choose_side' && phase !== 'choose_technique') || !hitPoint || !selectedSide) return;
  const contact = pendingReturn || {};
  const contactPoint = contact.hitPoint || hitPoint;
  const contactVel = contact.hitVel || hitVel;
  const contactPhase = contact.timingPhase || timingPhaseFromVelocity(contactVel);
  selectedTechnique = techniqueKey;
  document.querySelectorAll('[data-return-technique]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.returnTechnique === techniqueKey && btn.dataset.returnSide === selectedSide);
  });
  const tech = TECHNIQUES[techniqueKey];
  if(!tech){
    showResult(false, '找不到回擊技術', `技術代碼：${techniqueKey}`);
    setPhase('result');
    return;
  }
  const start = {...contactPoint, y:Math.max(contactPoint.y + 0.12, TABLE.top + 0.12)};
  const gravity = currentPreset().solve?.gravity ?? -4.2;
  const baseVel = makeReturnVelocity(contactVel, tech.techniqueVel);
  const result = simulatePath(start, baseVel, {
    gravity,
    spin:tech.spin,
    bounce:0.88,
    bounceBoost:tech.bounceBoost ?? 0
  });
  returnPath = result.points.filter(isValidPoint);
  updateLine(returnLine, returnPath);
  timingHintActive = false;
  resetBallColor();
  setPhase('return');
  document.getElementById('choiceText').textContent = `${selectedSide === 'forehand' ? '正手' : '反手'} / ${tech.label}`;
  document.getElementById('centerTip').textContent = '回球飛出';
  if(!returnPath.length){
    showResult(false, '回球軌跡產生失敗', '這組參數沒有產生可播放的球路，請按下一球再試。');
    setPhase('result');
    return;
  }
  animatePath(returnPath, ()=>judgeReturn(result, contactPhase), 7 / GAME_SPEED);
}
function makeReturnVelocity(incomingVel, techniqueVel){
  return {
    x: incomingVel.x * PADDLE_RESTITUTION + techniqueVel.x,
    y: incomingVel.y * PADDLE_RESTITUTION + techniqueVel.y,
    z: incomingVel.z * PADDLE_RESTITUTION + techniqueVel.z
  };
}
function judgeReturn(result, contactPhase){
  const firstBounce = result.bounces[0] || null;
  const netClearance = result.netY == null ? null : result.netY - (TABLE.height + TABLE.net);
  let ok = false;
  let reason = '出界';
  if(netClearance != null && netClearance < 0){
    reason = '掛網';
  }else if(firstBounce && firstBounce.z > 0){
    reason = '落在自己桌面';
  }else if(firstBounce && firstBounce.z < 0 && Math.abs(firstBounce.x) <= TABLE.width/2 && Math.abs(firstBounce.z) <= TABLE.length/2){
    ok = true;
    reason = '成功落在對方桌面';
  }
  const detail = [
    `第一落點：${firstBounce ? `${firstBounce.x.toFixed(2)}, ${firstBounce.z.toFixed(2)}` : '無'}`,
    `過網高度：${netClearance == null ? '未測到' : netClearance.toFixed(3) + ' m'}`,
    `擊球時機：${timingLabel(contactPhase)}`,
    `發球：${currentPreset().label}`
  ].join('\n');
  showResult(ok, reason, detail);
  setPhase('result');
  document.getElementById('centerTip').textContent = ok ? '成功，按下一球繼續' : `${reason}，按下一球再試`;
  // 階段三：歸位；正手先略超中軸再回
  if(selectedSide === 'forehand'){
    const arc = CAM_CFG.forehand?.returnArc ?? 0.1;
    camPosTarget.set(CAM_HOME_POS.x - arc, CAM_HOME_POS.y, CAM_HOME_POS.z);
    startCamReturn();
    setTimeout(()=>{ resetCam(false); startCamReturn(); }, 200);
  } else {
    resetCam(false);
    startCamReturn();
  }
}
function renderServeButtons(){
  const wrap = document.getElementById('serveList');
  wrap.innerHTML = presets.map((preset, index)=>`
    <button type="button" data-serve-index="${index}" class="${index === selectedServeIndex ? 'active' : ''}">
      ${preset.label}
    </button>
  `).join('');
  wrap.querySelectorAll('[data-serve-index]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectedServeIndex = parseInt(btn.dataset.serveIndex, 10);
      renderServeButtons();
      prepareServe();
    });
  });
}
async function loadPresets(){
  // 同時載入 physics-presets.json 和 camera-config.json
  const [presetsRes, camRes] = await Promise.all([
    fetch('physics-presets.json?v=' + Date.now()),
    fetch('camera-config.json?v=' + Date.now()).catch(() => null)
  ]);
  if(!presetsRes.ok) throw new Error('physics-presets.json 載入失敗');
  if(camRes?.ok){
    CAM_CFG = await camRes.json();
    applyCamConfig();
  }
  const data = await presetsRes.json();
  presets = data.serves || [];
  renderServeButtons();
  prepareServe();
}
document.getElementById('playBtn').addEventListener('click', playServe);
document.getElementById('trajectoryToggle').addEventListener('change', event=>{
  showTrajectories = event.target.checked;
  setTrajectoryVisibility();
  render();
});
document.getElementById('speedControl').addEventListener('change', event=>{
  GAME_SPEED = parseFloat(event.target.value) || 1;
});
document.getElementById('difficultyControl').addEventListener('change', event=>{
  DIFFICULTY_MODE = event.target.value || 'beginner';
  updateTimingHint(currentServeVel);
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  selectedServeIndex = (selectedServeIndex + 1) % Math.max(1, presets.length);
  renderServeButtons();
  prepareServe();
  playServe();
});
document.querySelectorAll('[data-return-technique]').forEach(btn=>{
  btn.disabled = true;
  btn.addEventListener('click', event=>event.preventDefault());
  btn.addEventListener('pointerdown', event=>{
    if(btn.disabled || !inputWindowOpen) return;
    const techniqueKey = btn.dataset.returnTechnique;
    if(techniqueKey === 'loop'){
      startLoopCharge(event, btn);
      return;
    }
    event.preventDefault();
    chooseReturn(btn.dataset.returnSide, techniqueKey);
  });
  btn.addEventListener('pointermove', moveLoopCharge);
  btn.addEventListener('pointerup', cancelCharge);
  btn.addEventListener('pointercancel', cancelCharge);
});
const buildVersionEl = document.getElementById('buildVersion');
buildVersionEl.textContent = Math.random().toString(36).slice(2, 7);
buildVersionEl.title = BUILD_VERSION;
resize();
updateScore();
loadPresets().catch(error=>{
  document.getElementById('centerTip').textContent = error.message;
  document.getElementById('resultText').textContent = '載入失敗';
  document.getElementById('resultText').className = 'result bad';
  document.getElementById('detailText').textContent = String(error);
});
</script>
</body>
