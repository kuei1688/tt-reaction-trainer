<!DOCTYPE html>
<html lang="zh-TW" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Game 4 最小版</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#f0f6fc;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;
  --red:#ff7b72;--yellow:#d29922;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
body{display:grid;grid-template-rows:auto 1fr}
header{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);background:#0b1017}
h1{font-size:20px;margin:0}
.badge{color:var(--yellow);font-weight:800;font-size:13px}
main{display:grid;grid-template-columns:minmax(0,1fr) 320px;min-height:0}
.scene-wrap{position:relative;min-height:0;background:#05070a}
canvas{display:block;width:100%;height:100%;touch-action:manipulation}
.hud{position:absolute;left:12px;top:12px;display:grid;gap:8px;max-width:min(480px,calc(100% - 24px));pointer-events:none}
.hud-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pill{background:rgba(13,17,23,.85);border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.24)}
.pill.ok{border-color:rgba(63,185,80,.6);color:var(--green)}
.pill.bad{border-color:rgba(255,123,114,.65);color:var(--red)}
.pill.warn{border-color:rgba(210,153,34,.65);color:var(--yellow)}
.center-tip{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(13,17,23,.88);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-weight:800;color:var(--text);text-align:center;min-width:min(520px,calc(100% - 24px))}
.action-pad{position:absolute;left:12px;right:12px;bottom:12px;display:none;grid-template-columns:1fr 2fr;gap:9px;align-items:end;pointer-events:none}
.action-pad.active{display:grid;pointer-events:auto}
.action-zone{display:grid;grid-template-rows:auto 1fr;gap:7px;min-height:108px;padding:8px;border:1px solid rgba(88,166,255,.34);border-radius:8px;background:rgba(13,17,23,.34);box-shadow:0 10px 26px rgba(0,0,0,.22);backdrop-filter:blur(2px)}
.action-zone.forehand{border-color:rgba(63,185,80,.36)}
.zone-label{font-size:12px;font-weight:900;color:rgba(240,246,252,.72);text-shadow:0 1px 2px rgba(0,0,0,.7)}
.zone-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;align-content:end}
.zone-actions button{min-height:58px;font-size:16px;background:rgba(33,38,45,.72);box-shadow:0 8px 18px rgba(0,0,0,.22)}
.action-zone.backhand .zone-actions{grid-template-columns:1fr}
aside{border-left:1px solid var(--border);background:var(--surface);min-height:0;overflow:auto}
.section{padding:12px;border-bottom:1px solid var(--border)}
h2{font-size:14px;margin:0 0 8px;color:var(--yellow)}
.list{display:grid;gap:7px}
button{width:100%;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:7px;padding:11px 12px;font-weight:900;font-size:15px;cursor:pointer}
button:hover{border-color:var(--blue)}
button.primary{background:var(--blue);color:#06101f;border-color:var(--blue)}
button.good{background:rgba(63,185,80,.18);border-color:rgba(63,185,80,.65)}
button.warn{background:rgba(210,153,34,.14);border-color:rgba(210,153,34,.65);color:var(--yellow)}
button.active{outline:2px solid var(--blue);background:rgba(88,166,255,.18)}
button:disabled{opacity:.45;cursor:not-allowed}
.tech-grid{display:grid;gap:8px}
.option-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:7px;background:rgba(13,17,23,.45);font-size:13px;font-weight:800;color:var(--text);cursor:pointer}
.option-row input{width:18px;height:18px;accent-color:var(--blue)}
.meta{font-size:12px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
.result{font-size:16px;font-weight:900;line-height:1.45}
.result.ok{color:var(--green)}
.result.bad{color:var(--red)}
.small{font-size:12px;color:var(--muted)}
@media (max-width: 820px){
  body{overflow:auto}
  main{grid-template-columns:1fr;grid-template-rows:58vh auto}
  aside{border-left:0;border-top:1px solid var(--border)}
  h1{font-size:18px}
  .center-tip{bottom:10px;min-width:calc(100% - 20px);font-size:13px}
  .action-pad{left:8px;right:8px;bottom:8px;gap:7px}
  .action-zone{min-height:96px;padding:7px}
  .zone-actions button{min-height:50px;font-size:14px;padding:7px}
}
</style>
</head>
<body translate="no" class="notranslate">
<header>
  <h1>Game 4 最小版</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="badge">Serve → Choice → Return</div>
    <div style="font-size:11px;color:#555;font-family:monospace" title="build version">v7a1b</div>
  </div>
</header>
<main>
  <section class="scene-wrap">
    <canvas id="scene"></canvas>
    <div class="hud">
      <div class="hud-row">
        <div class="pill" id="serveName">載入中</div>
        <div class="pill" id="phaseText">準備</div>
      </div>
      <div class="hud-row">
        <div class="pill" id="choiceText">尚未選擇</div>
        <div class="pill" id="scoreText">成功 0 / 失分 0</div>
      </div>
    </div>
    <div class="action-pad" id="actionPad">
      <div class="action-zone backhand">
        <div class="zone-label">反手區 1/3</div>
        <div class="zone-actions">
          <button type="button" data-return-side="backhand" data-return-technique="backhand_attack">反手攻球</button>
          <button type="button" data-return-side="backhand" data-return-technique="push">反手切球</button>
        </div>
      </div>
      <div class="action-zone forehand">
        <div class="zone-label">正手區 2/3</div>
        <div class="zone-actions">
          <button type="button" data-return-side="forehand" data-return-technique="forehand_attack">正手攻球</button>
          <button type="button" data-return-side="forehand" data-return-technique="push">正手切球</button>
        </div>
      </div>
    </div>
    <div class="center-tip" id="centerTip">讀取 physics-presets.json...</div>
  </section>
  <aside>
    <div class="section">
      <h2>發球 Preset</h2>
      <div class="list" id="serveList"></div>
    </div>
    <div class="section">
      <h2>回擊技術</h2>
      <div class="small">球停在可回擊點時，直接用畫面下方的分區按鈕回擊。左側 1/3 是反手區，右側 2/3 是正手區。</div>
    </div>
    <div class="section">
      <h2>操作</h2>
      <div class="list">
        <button id="playBtn" class="primary">開始發球</button>
        <button id="nextBtn">下一球</button>
        <label class="option-row">
          <input id="trajectoryToggle" type="checkbox">
          <span>顯示軌跡</span>
        </label>
      </div>
    </div>
    <div class="section">
      <h2>判定</h2>
      <div id="resultText" class="result">尚未開始</div>
      <div id="detailText" class="meta" style="margin-top:8px"></div>
    </div>
  </aside>
</main>

<script src="vendor/three.r128.min.js"></script>
<script>
const TABLE = {length:2.74, width:1.525, height:0.76, top:0.781, net:0.1525};
const BALL_RADIUS = 0.02;
const BALL_RENDER_RADIUS = 0.022;
const DT = 1 / 120;
const MAX_STEPS = 520;
const BOUNCE_PHYSICS = {horizontalRestitution:0.98, topspinKick:0.30, sidespinKick:0.22};
const TECHNIQUES = {
  forehand_attack: {label:'正手攻球', target:{x:-0.38,y:TABLE.top,z:-0.95}, time:0.62, spin:{topspin:0.55,sidespin:0.05}},
  backhand_attack: {label:'反手攻球', target:{x:0.28,y:TABLE.top,z:-0.9}, time:0.62, spin:{topspin:0.45,sidespin:-0.05}},
  push: {label:'切球', target:{x:0.05,y:TABLE.top,z:-0.45}, time:0.78, spin:{topspin:-0.75,sidespin:0}}
};
let presets = [];
let selectedServeIndex = 0;
let phase = 'loading';
let selectedSide = null;
let selectedTechnique = null;
let servePath = [];
let returnPath = [];
let currentPath = [];
let playStart = 0;
let animation = null;
let hitPoint = null;
let score = {ok:0, fail:0};
let showTrajectories = false;

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070a);
scene.fog = new THREE.Fog(0x05070a, 7, 14);
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const light = new THREE.DirectionalLight(0xffffff, 0.9);
light.position.set(2,5,3);
scene.add(light);
const camera = new THREE.PerspectiveCamera(48, 1, 0.01, 30);
camera.position.set(0, 1.72, 3.25);
camera.lookAt(0, TABLE.top + 0.02, -0.08);

// ── Camera follow state ────────────────────────────────────────────────────
const CAM_HOME_POS  = new THREE.Vector3(0, 1.72, 3.25);
const CAM_HOME_LOOK = new THREE.Vector3(0, TABLE.top + 0.02, -0.08);
const camPosTarget   = CAM_HOME_POS.clone();
const camLookTarget  = CAM_HOME_LOOK.clone();
const camLookCurrent = CAM_HOME_LOOK.clone();
let camRaf = null;

const table = new THREE.Mesh(
  new THREE.BoxGeometry(TABLE.width, 0.04, TABLE.length),
  new THREE.MeshLambertMaterial({color:0x14723f})
);
table.position.set(0, TABLE.height, 0);
scene.add(table);
const edge = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(TABLE.width, 0.041, TABLE.length)),
  new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.55})
);
edge.position.copy(table.position);
scene.add(edge);
const centerLine = makeLine([{x:0,y:TABLE.top+0.003,z:-TABLE.length/2},{x:0,y:TABLE.top+0.003,z:TABLE.length/2}], 0xffffff, 0.3);
scene.add(centerLine);
const net = new THREE.Mesh(
  new THREE.BoxGeometry(TABLE.width, TABLE.net, 0.012),
  new THREE.MeshLambertMaterial({color:0xd9dee6, transparent:true, opacity:0.6})
);
net.position.set(0, TABLE.height + TABLE.net / 2, 0);
scene.add(net);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(7,7),
  new THREE.MeshLambertMaterial({color:0x11151c})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(BALL_RENDER_RADIUS, 24, 16),
  new THREE.MeshLambertMaterial({color:0xffd84d})
);
scene.add(ball);
let pathLine = makeLine([], 0xffd84d, 0.9);
scene.add(pathLine);
let returnLine = makeLine([], 0x58a6ff, 0.85);
scene.add(returnLine);
setTrajectoryVisibility();

function makeLine(points, color, opacity){
  const geometry = new THREE.BufferGeometry().setFromPoints(points.map(p=>new THREE.Vector3(p.x,p.y,p.z)));
  const material = new THREE.LineBasicMaterial({color, transparent:true, opacity});
  return new THREE.Line(geometry, material);
}
function updateLine(line, points){
  line.geometry.dispose();
  line.geometry = new THREE.BufferGeometry().setFromPoints(points.map(p=>new THREE.Vector3(p.x,p.y,p.z)));
}
function setTrajectoryVisibility(){
  if(pathLine) pathLine.visible = showTrajectories;
  if(returnLine) returnLine.visible = showTrajectories;
}
// ── Camera follow helpers ──────────────────────────────────────────────────
function tickCamera(posFactor, lookFactor){
  camera.position.lerp(camPosTarget, posFactor || 0.05);
  camLookCurrent.lerp(camLookTarget, lookFactor || 0.08);
  camera.lookAt(camLookCurrent);
}
function resetCam(hard){
  camPosTarget.copy(CAM_HOME_POS);
  camLookTarget.copy(CAM_HOME_LOOK);
  if(hard){
    camera.position.copy(CAM_HOME_POS);
    camLookCurrent.copy(CAM_HOME_LOOK);
    camera.lookAt(camLookCurrent);
  }
}
function setCamForReturn(side, isLong){
  const xOff = side === 'forehand' ? -0.3 :  0.3;
  const zOff = isLong ? 0.3 : 0.6;
  camPosTarget.set(CAM_HOME_POS.x + xOff, CAM_HOME_POS.y, CAM_HOME_POS.z + zOff);
  if(hitPoint) camLookTarget.set(hitPoint.x, hitPoint.y + 0.1, hitPoint.z);
}
function startCamReturn(){
  if(camRaf) cancelAnimationFrame(camRaf);
  function loop(){
    // 球動畫正在跑時讓位，由 animatePath 負責渲染
    if(animation !== null){ camRaf = null; return; }
    tickCamera(0.06, 0.07);
    render();
    const done = camera.position.distanceTo(camPosTarget) < 0.002
              && camLookCurrent.distanceTo(camLookTarget) < 0.002;
    camRaf = done ? null : requestAnimationFrame(loop);
  }
  camRaf = requestAnimationFrame(loop);
}
function resize(){
  const rect = canvas.parentElement.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false);
  camera.aspect = rect.width / Math.max(1, rect.height);
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}
window.addEventListener('resize', resize);
if(window.ResizeObserver){
  new ResizeObserver(resize).observe(canvas.parentElement);
}

function solveVelocity(start, target, time, gravity){
  return {
    x:(target.x - start.x) / time,
    y:(target.y - start.y - 0.5 * gravity * time * time) / time,
    z:(target.z - start.z) / time
  };
}
function clone(v){ return {x:v.x,y:v.y,z:v.z}; }
function add(a,b){ return {x:a.x+b.x,y:a.y+b.y,z:a.z+b.z}; }
function clamp(value,min,max){ return Math.max(min, Math.min(max, value)); }
function isValidPoint(point){
  return point && Number.isFinite(point.x) && Number.isFinite(point.y) && Number.isFinite(point.z);
}
function applyBounceSpin(vel, spin, bounce){
  const speed = Math.hypot(vel.x, vel.z);
  const forward = speed > 0.001 ? {x:vel.x/speed, z:vel.z/speed} : {x:0,z:1};
  const side = {x:-forward.z, z:forward.x};
  let forwardSpeed = speed * BOUNCE_PHYSICS.horizontalRestitution + (spin.topspin || 0) * BOUNCE_PHYSICS.topspinKick;
  const sideSpeed = clamp((spin.sidespin || 0) * BOUNCE_PHYSICS.sidespinKick, -speed * 0.75, speed * 0.75);
  forwardSpeed = clamp(forwardSpeed, -speed * 0.55, speed * 1.35);
  vel.x = forward.x * forwardSpeed + side.x * sideSpeed;
  vel.z = forward.z * forwardSpeed + side.z * sideSpeed;
  vel.y = Math.abs(vel.y) * bounce;
}
function simulatePath(start, velocity, options){
  const gravity = options.gravity ?? -4.2;
  const spin = options.spin || {topspin:0,sidespin:0};
  const bounce = options.bounce ?? 0.95;
  const pos = clone(start);
  const vel = clone(velocity);
  const points = [clone(pos)];
  const bounces = [];
  let netY = null;
  let crossedNet = false;
  for(let i=0;i<MAX_STEPS;i++){
    const prev = clone(pos);
    vel.y += gravity * DT;
    pos.x += vel.x * DT;
    pos.y += vel.y * DT;
    pos.z += vel.z * DT;
    if(!crossedNet && ((prev.z < 0 && pos.z >= 0) || (prev.z > 0 && pos.z <= 0))){
      const ratio = (0 - prev.z) / (pos.z - prev.z || 1);
      netY = prev.y + (pos.y - prev.y) * ratio;
      crossedNet = true;
    }
    const crossedTableTop = prev.y >= TABLE.top && pos.y <= TABLE.top;
    if(crossedTableTop && vel.y < 0){
      const ratio = (TABLE.top - prev.y) / (pos.y - prev.y || 1);
      const impact = {
        x:prev.x + (pos.x - prev.x) * ratio,
        y:TABLE.top,
        z:prev.z + (pos.z - prev.z) * ratio,
        t:i * DT + DT * ratio
      };
      const onTable = Math.abs(impact.x) <= TABLE.width/2 && Math.abs(impact.z) <= TABLE.length/2;
      if(onTable){
        pos.x = impact.x;
        pos.y = TABLE.top;
        pos.z = impact.z;
        bounces.push({...impact, index:points.length});
        points.push(clone(pos));
        applyBounceSpin(vel, spin, bounce);
      }
    }
    if(pos.y <= BALL_RADIUS && prev.y > BALL_RADIUS){
      const ratio = (BALL_RADIUS - prev.y) / (pos.y - prev.y || 1);
      points.push({
        x:prev.x + (pos.x - prev.x) * ratio,
        y:BALL_RADIUS,
        z:prev.z + (pos.z - prev.z) * ratio
      });
      break;
    }
    points.push(clone(pos));
    if(Math.abs(pos.x) > 3 || Math.abs(pos.z) > 4) break;
  }
  return {points, bounces, netY};
}
function simulateServe(preset){
  const time = preset.solve?.timeToFirst ?? 0.3;
  const gravity = preset.solve?.gravity ?? -4.2;
  const velocity = solveVelocity(preset.start, preset.firstBounce, time, gravity);
  return simulatePath(preset.start, velocity, {
    gravity,
    spin:preset.variation?.spin,
    bounce:preset.variation?.bounce
  });
}
function findHitIndex(path){
  const receiverBounce = path.bounces.find(b=>b.z > 0);
  if(receiverBounce) return Math.min(path.points.length - 1, receiverBounce.index + 18);
  const fallback = path.points.findIndex(p=>p.z > 0.45 && p.y > TABLE.top);
  return fallback >= 0 ? fallback : Math.min(path.points.length - 1, 90);
}
function currentPreset(){ return presets[selectedServeIndex]; }
function setBall(point){
  if(!isValidPoint(point)) return;
  ball.position.set(point.x, point.y, point.z);
}
function render(){ renderer.render(scene, camera); }
function animatePath(points, onDone, speedMs){
  if(animation) cancelAnimationFrame(animation);
  const safePoints = (points || []).filter(isValidPoint);
  currentPath = safePoints;
  if(!safePoints.length){
    animation = null;
    onDone?.();
    return;
  }
  playStart = performance.now();
  const duration = Math.max(700, safePoints.length * (speedMs || 10));
  function tick(now){
    const progress = Math.min(1, (now - playStart) / duration);
    const index = Math.min(safePoints.length - 1, Math.floor(progress * (safePoints.length - 1)));
    setBall(safePoints[index]);
    try{
      camLookTarget.set(safePoints[index].x, safePoints[index].y, safePoints[index].z);
      tickCamera(0.05, 0.08);
    }catch(e){ /* 相機跟隨失敗不影響球動畫 */ }
    render();
    if(progress < 1){
      animation = requestAnimationFrame(tick);
    }else{
      animation = null;
      try{ startCamReturn(); }catch(e){}
      onDone?.();
    }
  }
  animation = requestAnimationFrame(tick);
}
function setPhase(next){
  phase = next;
  document.getElementById('phaseText').textContent = {
    idle:'準備',
    serve:'看球',
    choose_side:'選回擊',
    choose_technique:'選回擊',
    return:'回擊中',
    result:'結果'
  }[next] || next;
  const enableReturn = next === 'choose_side' || next === 'choose_technique';
  document.getElementById('actionPad').classList.toggle('active', enableReturn);
  document.getElementById('centerTip').style.display = enableReturn ? 'none' : '';
  document.querySelectorAll('[data-return-technique]').forEach(btn=>btn.disabled = !enableReturn);
}
function updateScore(){
  document.getElementById('scoreText').textContent = `成功 ${score.ok} / 失分 ${score.fail}`;
}
function showResult(ok, reason, detail){
  const el = document.getElementById('resultText');
  el.textContent = reason;
  el.className = 'result ' + (ok ? 'ok' : 'bad');
  document.getElementById('detailText').textContent = detail || '';
  if(ok) score.ok += 1;
  else score.fail += 1;
  updateScore();
}
function prepareServe(){
  resetCam(false);
  const preset = currentPreset();
  document.getElementById('serveName').textContent = preset?.label || '未選擇';
  selectedSide = null;
  selectedTechnique = null;
  document.getElementById('choiceText').textContent = '尚未選擇';
  document.querySelectorAll('[data-return-technique]').forEach(btn=>btn.classList.remove('active'));
  const serve = simulateServe(preset);
  const hitIndex = findHitIndex(serve);
  servePath = serve.points.slice(0, hitIndex + 1);
  hitPoint = servePath[servePath.length - 1];
  updateLine(pathLine, serve.points.slice(0, Math.min(serve.points.length, hitIndex + 36)));
  updateLine(returnLine, []);
  setBall(preset.start);
  render();
  document.getElementById('centerTip').textContent = '按「開始發球」看球飛來';
  setPhase('idle');
}
function playServe(){
  if(!presets.length) return;
  document.activeElement?.blur?.();
  resize();
  setPhase('serve');
  document.getElementById('resultText').textContent = '球飛來了';
  document.getElementById('resultText').className = 'result';
  document.getElementById('detailText').textContent = '';
  document.getElementById('centerTip').textContent = '看球落桌與彈起';
  animatePath(servePath, ()=>{
    setPhase('choose_side');
    document.getElementById('centerTip').textContent = '用下方分區直接選回擊';
  }, 9);
}
function chooseReturn(side, techniqueKey){
  if(phase !== 'choose_side' && phase !== 'choose_technique') return;
  selectedSide = side;
  const isLong = currentPreset()?.tags?.length !== 'short';
  setCamForReturn(side, isLong);
  startCamReturn();
  returnBall(techniqueKey);
}
function returnBall(techniqueKey){
  if((phase !== 'choose_side' && phase !== 'choose_technique') || !hitPoint || !selectedSide) return;
  selectedTechnique = techniqueKey;
  document.querySelectorAll('[data-return-technique]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.returnTechnique === techniqueKey && btn.dataset.returnSide === selectedSide);
  });
  const tech = TECHNIQUES[techniqueKey];
  if(!tech){
    showResult(false, '找不到回擊技術', `技術代碼：${techniqueKey}`);
    setPhase('result');
    return;
  }
  const start = {...hitPoint, y:Math.max(hitPoint.y + 0.12, TABLE.top + 0.12)};
  const gravity = currentPreset().solve?.gravity ?? -4.2;
  const target = {...tech.target};
  if(selectedSide === 'forehand') target.x -= 0.08;
  if(selectedSide === 'backhand') target.x += 0.08;
  const baseVel = solveVelocity(start, target, tech.time, gravity);
  const result = simulatePath(start, baseVel, {
    gravity,
    spin:tech.spin,
    bounce:0.88
  });
  returnPath = result.points.filter(isValidPoint);
  updateLine(returnLine, returnPath);
  setPhase('return');
  document.getElementById('choiceText').textContent = `${selectedSide === 'forehand' ? '正手' : '反手'} / ${tech.label}`;
  document.getElementById('centerTip').textContent = '回球飛出';
  if(!returnPath.length){
    showResult(false, '回球軌跡產生失敗', '這組參數沒有產生可播放的球路，請按下一球再試。');
    setPhase('result');
    return;
  }
  animatePath(returnPath, ()=>judgeReturn(result), 7);
}
function judgeReturn(result){
  const firstBounce = result.bounces[0] || null;
  const netClearance = result.netY == null ? null : result.netY - (TABLE.height + TABLE.net);
  let ok = false;
  let reason = '出界';
  if(netClearance != null && netClearance < 0){
    reason = '掛網';
  }else if(firstBounce && firstBounce.z > 0){
    reason = '落在自己桌面';
  }else if(firstBounce && firstBounce.z < 0 && Math.abs(firstBounce.x) <= TABLE.width/2 && Math.abs(firstBounce.z) <= TABLE.length/2){
    ok = true;
    reason = '成功落在對方桌面';
  }
  const detail = [
    `第一落點：${firstBounce ? `${firstBounce.x.toFixed(2)}, ${firstBounce.z.toFixed(2)}` : '無'}`,
    `過網高度：${netClearance == null ? '未測到' : netClearance.toFixed(3) + ' m'}`,
    `發球：${currentPreset().label}`
  ].join('\n');
  showResult(ok, reason, detail);
  setPhase('result');
  document.getElementById('centerTip').textContent = ok ? '成功，按下一球繼續' : `${reason}，按下一球再試`;
  // Camera return：正手先略超中軸再歸位，反手直接歸位
  if(selectedSide === 'forehand'){
    camPosTarget.set(-0.1, CAM_HOME_POS.y, CAM_HOME_POS.z);
    camLookTarget.copy(CAM_HOME_LOOK);
    startCamReturn();
    setTimeout(()=>{ resetCam(false); startCamReturn(); }, 220);
  } else {
    resetCam(false);
    startCamReturn();
  }
}
function renderServeButtons(){
  const wrap = document.getElementById('serveList');
  wrap.innerHTML = presets.map((preset, index)=>`
    <button type="button" data-serve-index="${index}" class="${index === selectedServeIndex ? 'active' : ''}">
      ${preset.label}
    </button>
  `).join('');
  wrap.querySelectorAll('[data-serve-index]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectedServeIndex = parseInt(btn.dataset.serveIndex, 10);
      renderServeButtons();
      prepareServe();
    });
  });
}
async function loadPresets(){
  const response = await fetch('physics-presets.json?v=' + Date.now());
  if(!response.ok) throw new Error('physics-presets.json 載入失敗');
  const data = await response.json();
  presets = (data.serves || []).slice(0, 4);
  renderServeButtons();
  prepareServe();
}
document.getElementById('playBtn').addEventListener('click', playServe);
document.getElementById('trajectoryToggle').addEventListener('change', event=>{
  showTrajectories = event.target.checked;
  setTrajectoryVisibility();
  render();
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  selectedServeIndex = (selectedServeIndex + 1) % Math.max(1, presets.length);
  renderServeButtons();
  prepareServe();
  playServe();
});
document.querySelectorAll('[data-return-technique]').forEach(btn=>{
  btn.disabled = true;
  btn.addEventListener('click', ()=>chooseReturn(btn.dataset.returnSide, btn.dataset.returnTechnique));
});
resize();
updateScore();
loadPresets().catch(error=>{
  document.getElementById('centerTip').textContent = error.message;
  document.getElementById('resultText').textContent = '載入失敗';
  document.getElementById('resultText').className = 'result bad';
  document.getElementById('detailText').textContent = String(error);
});
</script>
</body>
</html>
